- id: python
  title: Python
  description: Dasar-dasar pemrograman Python dari nol hingga mahir.
  modules:
    - id: intro
      title: 1. Pengenalan & Filosofi Python
      lessons:
        - id: what-is-python
          title: Apa itu Python? (Sebuah Pengantar)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Banyak bahasa pemrograman yang sulit dipelajari karena sintaksnya yang kaku dan penuh simbol rumit. Hal ini membuat pemula sering menyerah sebelum berhasil membuat program pertama mereka.
            **Analogi:** Mempelajari Python itu seperti belajar memasak menggunakan resep yang ditulis dengan bahasa sehari-hari, bukan dengan istilah kimia yang rumit. Kamu fokus pada "apa yang ingin dimasak", bukan "bagaimana cara kerja kompornya".

            ### 2. Learning Objectives
            Setelah menyelesaikan materi ini, kamu akan mampu **menguraikan** sejarah dan filosofi Python serta **mengidentifikasi** alasan mengapa Python menjadi standar industri saat ini.

            ### 3. Prerequisites
            - Tidak ada (Cocok untuk pemula total).

            ### 4. Core Material
            **The "What":** Python adalah bahasa pemrograman tingkat tinggi yang diciptakan oleh Guido van Rossum pada tahun 1991.
            **The "Why":** Mengapa Python sangat populer?
            1. **Keterbacaan Tinggi:** Menggunakan indentasi (spasi) bukan simbol rumit.
            2. **"Batteries Included":** Punya banyak pustaka standar untuk berbagai kebutuhan.
            3. **Ekosistem AI:** Standar industri untuk Data Science dan Artificial Intelligence.

            ### 5. Guided Implementation
            ```python
            # Filosofi Python (Zen of Python) bisa dilihat dengan:
            # import this

            print("Selamat datang di dunia Python!")
            ```
            **Expected Output:** `Selamat datang di dunia Python!`

            ### 6. Pro-Tips
            Python sangat ketat soal indentasi. Satu spasi yang salah bisa membuat programmu berhenti berjalan. Selalu konsisten gunakan 4 spasi!

            ### 7. Interactive Challenge
            Cobalah ubah teks di dalam `print()` menjadi nama lengkapmu dan jalankan.

            ### 8. Summary & Next Steps
            Python adalah bahasa yang manusiawi dan serbaguna. Selanjutnya, kita akan menyiapkan "bengkel" kerja kita!
          codeExample: |-
            # Ubah teks di bawah ini
            print("Halo, saya sedang belajar Python!")
          quiz:
            question: Apa filosofi utama yang ditekankan oleh pencipta Python?
            options:
              - Kode harus dieksekusi secepat mungkin oleh mesin.
              - Kode lebih sering dibaca daripada ditulis (keterbacaan).
              - Kode harus memiliki banyak simbol agar terlihat canggih.
              - Kode hanya boleh digunakan oleh ilmuwan data.
            correctAnswerIndex: 1
        - id: setup
          title: Persiapan Lingkungan Kerja (Environment)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Tanpa alat yang tepat, menulis kode akan terasa seperti menulis novel di kalkulator—sangat sulit dan tidak efisien.
            **Analogi:** Menjadi programmer tanpa IDE itu seperti teknisi mesin tanpa bengkel. Kamu butuh tempat yang punya semua peralatan (obeng, kunci inggris) di satu lokasi.

            ### 2. Learning Objectives
            Kamu akan mampu **menyiapkan** lingkungan kerja Python profesional dan **membedakan** fungsi antara Interpreter dan IDE.

            ### 3. Prerequisites
            - Komputer dengan akses Internet.

            ### 4. Core Material
            **The "What":** Kamu butuh dua hal utama:
            1. **Interpreter**: Mesin yang menjalankan kodemu (unduh di python.org).
            2. **IDE (Visual Studio Code)**: Tempat kamu mengetik kode dengan fitur pembantu (highlighting, error detection).

            **Virtual Environment:** Praktik terbaik untuk memisahkan pustaka antar proyek agar tidak bentrok.

            ### 5. Guided Implementation
            Di terminal/command prompt, ketik:
            ```bash
            python --version
            ```
            **Expected Output:** `Python 3.x.x` (jika sudah terinstal).

            ### 6. Pro-Tips
            Selalu instal ekstensi "Python" di VS Code untuk mendapatkan fitur *Autocomplete* yang akan mempercepat kerjamu.

            ### 7. Interactive Challenge
            Buka terminal di komputermu, dan pastikan perintah `python` atau `python3` sudah terdaftar.

            ### 8. Summary & Next Steps
            Bengkel sudah siap. Sekarang saatnya kita mulai memasukkan data ke dalam "kotak penyimpanan" bernama Variabel!
          codeExample: |-
            # Cek apakah environment sudah benar dengan mencetak versi
            import sys
            print(f"Versi Python: {sys.version}")
          quiz:
            question: Apa kegunaan utama dari 'Virtual Environment' dalam Python?
            options:
              - Mempercepat koneksi internet.
              - Memisahkan dependensi/library antar proyek agar tidak bentrok.
              - Mengubah tampilan tema VS Code.
              - Membuat komputer menjadi lebih dingin.
            correctAnswerIndex: 1
    - id: basics
      title: 2. Dasar-Dasar Pemrograman
      lessons:
        - id: variables
          title: Variabel & Tipe Data (Menyimpan Informasi)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Komputer punya ingatan yang sangat besar, tapi ia tidak tahu apa arti angka "25" jika kita tidak memberinya label. Apakah itu umur? Harga? Atau jumlah apel?
            **Analogi:** Bayangkan Variabel adalah kotak kardus. Kamu menuliskan label "Buku" di luar kotak, lalu memasukkan buku ke dalamnya. Kapanpun kamu butuh buku, kamu tinggal mencari kotak berlabel tersebut.

            ### 2. Learning Objectives
            Kamu akan mampu **mendeklarasikan** variabel dengan penamaan yang benar dan **mengategorikan** berbagai tipe data primitif di Python.

            ### 3. Prerequisites
            - Memahami konsep input/output sederhana.

            ### 4. Core Material
            **The "What":** Variabel adalah nama yang merujuk pada nilai di memori komputer.
            **Tipe Data Dasar:**
            1. `str` (String): Teks, diapit kutip `"Hello"`.
            2. `int` (Integer): Bilangan bulat, misal `42`.
            3. `float`: Bilangan desimal, misal `3.14`.
            4. `bool`: Logika `True` atau `False`.

            ### 5. Guided Implementation
            ```python
            nama = "Andi"      # str
            umur = 25          # int
            tinggi = 175.5     # float
            is_mahasiswa = True # bool

            print(f"{nama} berumur {umur} tahun.")
            ```
            **Expected Output:** `Andi berumur 25 tahun.`

            ### 6. Pro-Tips
            Gunakan *snake_case* (huruf kecil semua, pisahkan dengan garis bawah) untuk menamai variabel. Jangan gunakan angka di depan nama variabel!

            ### 7. Interactive Challenge
            Buatlah variabel `berat_badan` dan isi dengan angka desimal, lalu cetak tipenya menggunakan `print(type(berat_badan))`.

            ### 8. Summary & Next Steps
            Sekarang kamu sudah tahu cara menyimpan data. Selanjutnya, kita akan belajar cara memanipulasi data tersebut dengan Operator!
          codeExample: |-
            # Definisikan variabelmu di sini
            nama_produk = "Laptop"
            harga = 15000000.0
            stok = 10
            
            print(f"Produk: {nama_produk}, Stok: {stok}")
          quiz:
            question: Manakah penamaan variabel yang benar menurut standar Python (PEP 8)?
            options:
              - 1nama_pengguna
              - nama pengguna
              - nama_pengguna
              - NAMA-PENGGUNA
            correctAnswerIndex: 2
        - id: operators
          title: Operator Matematika & Logika
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Data yang hanya disimpan tidak akan berguna. Kita butuh cara untuk menjumlahkan harga belanjaan, membagi rata nilai ujian, atau mengecek apakah seseorang sudah cukup umur.
            **Analogi:** Operator adalah "simbol sakti" layaknya tombol pada kalkulator.

            ### 2. Learning Objectives
            Kamu akan mampu **melakukan** operasi aritmatika dasar dan **menyimpulkan** hasil perbandingan logika menggunakan operator Python.

            ### 3. Prerequisites
            - Memahami konsep Variabel.

            ### 4. Core Material
            **Aritmatika:** `+`, `-`, `*`, `/`, `//` (pembagian bulat), `%` (sisa bagi), `**` (pangkat).
            **Perbandingan:** `==` (sama dengan), `!=` (tidak sama dengan), `>`, `<`.
            **Logika:** `and`, `or`, `not`.

            ### 5. Guided Implementation
            ```python
            a = 10
            b = 3
            
            print(a // b) # Hasil: 3 (angka dibelakang koma dibuang)
            print(a % b)  # Hasil: 1 (sisa bagi)
            
            # Logika
            print(a > 5 and b < 5) # True, karena keduanya benar
            ```

            ### 6. Pro-Tips
            Hati-hati: `=` digunakan untuk mengisi nilai variabel (*assignment*), sedangkan `==` digunakan untuk membandingkan dua nilai (*equality*).

            ### 7. Interactive Challenge
            Hitunglah sisa bagi dari `25` dibagi `4` menggunakan operator `%` dan tampilkan hasilnya.

            ### 8. Summary & Next Steps
            Selamat! Kamu sudah bisa menghitung. Selanjutnya, kita akan belajar cara membuat program mengambil keputusan dengan Percabangan!
          codeExample: |-
            angka1 = 15
            angka2 = 4
            
            # Lakukan operasi di sini
            hasil = angka1 * angka2
            print(f"Hasil perkalian: {hasil}")
          quiz:
            question: Apa hasil dari operasi 10 % 3 di Python?
            options:
              - 3
              - 3.33
              - 1
              - 0
            correctAnswerIndex: 2
    - id: control-flow
      title: 3. Alur Kontrol (Pengambilan Keputusan)
      lessons:
        - id: if-else
          title: Percabangan (If, Elif, Else)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Program yang berjalan lurus dari atas ke bawah sangatlah membosankan dan tidak pintar. Bagaimana jika kita ingin aplikasi kita hanya memberikan diskon jika total belanja di atas Rp 100.000?
            **Analogi:** Bayangkan kamu sedang mengemudi dan bertemu persimpangan jalan. Jika lampu hijau, kamu jalan. Jika merah, kamu berhenti. Percabangan adalah "lampu lalu lintas" bagi kodemu.

            ### 2. Learning Objectives
            Setelah menyelesaikan materi ini, kamu akan mampu **mengonstruksi** logika pengkondisian yang kompleks menggunakan `if`, `elif`, dan `else`.

            ### 3. Prerequisites
            - Paham tipe data `bool` (True/False).
            - Mengerti Operator Perbandingan (`>`, `<`, `==`).

            ### 4. Core Material
            **The "What":** Percabangan memungkinkan kode berjalan hanya jika kondisi tertentu terpenuhi.
            **The "Why":** Tanpa ini, aplikasi tidak bisa melakukan validasi (seperti cek password) atau logika bisnis.

            **Struktur:**
            ```python
            if kondisi_a:
                # jalan jika A benar
            elif kondisi_b:
                # jalan jika A salah tapi B benar
            else:
                # jalan jika semua salah
            ```

            ### 5. Guided Implementation
            ```python
            nilai = 75
            if nilai >= 90:
                print("Lulus dengan pujian!")
            elif nilai >= 60:
                print("Lulus!")
            else:
                print("Silahkan coba lagi.")
            ```
            **Expected Output:** `Lulus!`

            ### 6. Pro-Tips
            **Pitfall:** Lupa indentasi (spasi menjorok). Python menggunakan spasi untuk menandakan "milik" siapa blok kode tersebut. Selalu gunakan 4 spasi!

            ### 7. Interactive Challenge
            Buatlah variabel `suhu = 38`. Jika suhu di atas 37, cetak "Kamu demam", jika tidak, cetak "Kamu sehat".

            ### 8. Summary & Next Steps
            Sekarang programmu sudah bisa memilih. Selanjutnya, kita akan belajar cara melakukan hal yang sama berulang kali tanpa lelah dengan Loop!
          codeExample: |-
            # Uji logika pengkondisianmu
            umur = 18
            if umur >= 17:
                print("Bisa buat KTP")
            else:
                print("Belum bisa buat KTP")
          quiz:
            question: Apa yang terjadi jika kita lupa memberikan indentasi setelah pernyataan 'if'?
            options:
              - Program berjalan normal.
              - Program akan menghasilkan 'IndentationError'.
              - Hasil output akan menjadi terbalik.
              - Program akan menghapus file tersebut.
            correctAnswerIndex: 1
        - id: loops
          title: Perulangan (For & While Loops)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bagaimana cara mencetak kalimat "Saya tidak akan telat lagi" sebanyak 1000 kali? Menulisnya manual adalah hukuman, bukan pemrograman.
            **Analogi:** Bayangkan kincir ria di taman bermain. Ia terus berputar selama mesinnya menyala (while) atau berputar sebanyak 10 putaran lalu berhenti (for).

            ### 2. Learning Objectives
            Kamu akan mampu **mengotomatisasi** tugas berulang menggunakan `for` dan `while` serta **mengontrol** alur loop dengan `break` dan `continue`.

            ### 3. Prerequisites
            - Paham konsep Percabangan (`if`).

            ### 4. Core Material
            **1. For Loop:** Digunakan saat kita tahu jumlah pengulangannya (misal: isi sebuah list).
            **2. While Loop:** Digunakan selama suatu kondisi masih benar (hati-hati dengan loop tak berujung!).

            ### 5. Guided Implementation
            ```python
            # Mencetak angka 0 sampai 4
            for i in range(5):
                print(f"Iterasi ke-{i}")

            # Menggunakan while
            stok = 3
            while stok > 0:
                print(f"Menjual barang, sisa: {stok}")
                stok -= 1
            ```

            ### 6. Pro-Tips
            Gunakan `break` untuk keluar dari loop secara paksa jika sebuah target sudah ditemukan, agar program lebih efisien.

            ### 7. Interactive Challenge
            Gunakan `for loop` dan `range()` untuk mencetak angka ganjil dari 1 sampai 10.

            ### 8. Summary & Next Steps
            Luar biasa! Kamu sudah menguasai alur kontrol. Selanjutnya, kita akan belajar cara membungkus kode-kode ini agar bisa dipakai ulang dengan Fungsi!
          codeExample: |-
            # Cobalah range(start, stop, step)
            for i in range(2, 11, 2):
                print(f"Angka genap: {i}")
          quiz:
            question: Apa fungsi dari perintah 'break' di dalam sebuah perulangan?
            options:
              - Memulai ulang loop dari awal.
              - Melompati iterasi saat ini dan lanjut ke iterasi berikutnya.
              - Menghentikan perulangan dan keluar dari blok loop sepenuhnya.
              - Membuat komputer menjadi lambat.
            correctAnswerIndex: 2
    - id: functions
      title: 4. Fungsi
      lessons:
        - id: intro-functions
          title: Mengenal Fungsi
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bayangkan kamu punya kode sepanjang 50 baris untuk menghitung pajak. Jika kamu butuh menghitung pajak di 10 tempat berbeda, apakah kamu akan menyalin kode itu 10 kali? Jika ada rumus yang salah, kamu harus memperbaikinya di 10 tempat!
            **Analogi:** Fungsi adalah seperti "Resep Masakan". Kamu menulis cara memasak nasi goreng sekali saja di buku resep. Kapan pun kamu ingin makan, kamu tinggal memanggil resep tersebut tanpa harus menulis ulang langkah-langkahnya.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **membangun** fungsi modular dengan parameter dan **mengimplementasikan** prinsip DRY (Don't Repeat Yourself).

            ### 3. Prerequisites
            - Dasar-dasar Alur Kontrol.

            ### 4. Core Material
            **The "What":** Fungsi adalah blok kode yang hanya berjalan saat dipanggil.
            **The "Why":** Agar kode rapi, mudah diperbaiki, dan bisa digunakan kembali.

            **Sintaks:**
            ```python
            def nama_fungsi(parameter):
                # isi kode
            ```

            ### 5. Guided Implementation
            ```python
            def sapa(nama):
                print(f"Halo {nama}, selamat belajar!")

            sapa("Andi")
            sapa("Budi")
            ```
            **Expected Output:** 
            `Halo Andi, selamat belajar!`
            `Halo Budi, selamat belajar!`

            ### 6. Pro-Tips
            **Common Pitfall:** Mendefinisikan fungsi tapi lupa memanggilnya. Fungsi layaknya mobil di garasi; ia tidak akan jalan jika tidak kamu nyalakan!

            ### 7. Interactive Challenge
            Buatlah fungsi `cek_genap(angka)` yang mencetak "Genap" jika angka habis dibagi 2, dan "Ganjil" jika tidak.

            ### 8. Summary & Next Steps
            Fungsi membuat kodemu jauh lebih profesional. Selanjutnya, kita akan belajar cara "mengambil hasil" dari fungsi dengan Return!
          codeExample: |-
            def tambah_lima(angka):
                hasil = angka + 5
                print(f"Hasil: {hasil}")

            tambah_lima(10)
          quiz:
            question: Kata kunci apa yang digunakan untuk mendefinisikan fungsi di Python?
            options:
              - function
              - func
              - def
              - define
            correctAnswerIndex: 2
        - id: return-values
          title: Nilai Balik (Return)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Terkadang kita tidak ingin fungsi hanya mencetak hasil ke layar. Kita ingin fungsi memberikan hasil hitungannya kepada kita untuk disimpan di database atau dihitung kembali.
            **Analogi:** Bayangkan kamu menyuruh asisten untuk membeli kopi. Kamu ingin asisten itu **kembali** membawa kopi, bukan hanya berteriak "Saya sudah beli kopinya!".

            ### 2. Learning Objectives
            Kamu akan mampu **menghasilkan** nilai balik dari fungsi dan **mengelola** output fungsi ke dalam variabel.

            ### 3. Prerequisites
            - Mengenal cara mendefinisikan fungsi.

            ### 4. Core Material
            **`return`** adalah kata kunci untuk mengirimkan nilai dari dalam fungsi ke pemanggilnya. Begitu `return` dieksekusi, fungsi langsung berhenti.

            ### 5. Guided Implementation
            ```python
            def kuadrat(x):
                return x * x

            hasil = kuadrat(4)
            print(f"Hasil 4 kuadrat adalah {hasil}")
            ```
            **Expected Output:** `Hasil 4 kuadrat adalah 16`

            ### 6. Pro-Tips
            Fungsi di Python bisa mengembalikan lebih dari satu nilai sekaligus! Nilai tersebut akan dibungkus otomatis menjadi sebuah *Tuple*.

            ### 7. Interactive Challenge
            Buatlah fungsi `gabung_nama(depan, belakang)` yang mengembalikan gabungan kedua nama tersebut dengan spasi di tengahnya.

            ### 8. Summary & Next Steps
            Sekarang fungsimu sudah sangat berguna. Selanjutnya, kita akan mengeksplorasi cara menyimpan banyak data sekaligus dalam Struktur Data!
          codeExample: |-
            def hitung_diskon(harga):
                return harga * 0.1

            total = 100000
            potongan = hitung_diskon(total)
            print(f"Potongan Anda: {potongan}")
          quiz:
            question: Apa yang terjadi setelah pernyataan 'return' dalam sebuah fungsi dieksekusi?
            options:
              - Fungsi berlanjut ke baris berikutnya.
              - Fungsi berhenti dan mengirimkan nilai kembali.
              - Fungsi akan mengulang dari awal.
              - Komputer akan restart.
            correctAnswerIndex: 1
    - id: data-structures
      title: 5. Struktur Data
      lessons:
        - id: lists
          title: List (Daftar)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bayangkan kamu harus menyimpan nama 100 siswa. Apakah kamu akan membuat 100 variabel seperti `siswa1`, `siswa2`, dst? Itu sangat merepotkan!
            **Analogi:** List adalah seperti sebuah "Rak Sepatu". Kamu punya satu tempat besar (Rak), tapi di dalamnya kamu bisa menaruh banyak sepatu secara berurutan.

            ### 2. Learning Objectives
            Kamu akan mampu **mengonstruksi** list untuk menyimpan data jamak dan **memanipulasi** isinya menggunakan metode bawaan Python.

            ### 3. Prerequisites
            - Memahami Variabel dan Tipe Data Dasar.

            ### 4. Core Material
            **The "What":** List adalah wadah yang menyimpan banyak item dalam urutan tertentu.
            **The "Why":** List memungkinkan kita mengolah kumpulan data (seperti daftar belanja atau riwayat chat) dengan satu variabel saja.

            ### 5. Guided Implementation
            ```python
            buah = ["Apel", "Jeruk", "Mangga"]
            
            # Tambah item
            buah.append("Pisang")
            
            # Akses berdasarkan indeks (mulai dari 0)
            print(f"Buah kedua: {buah[1]}")
            ```
            **Expected Output:** `Buah kedua: Jeruk`

            ### 6. Pro-Tips
            Ingat, indeks Python dimulai dari **0**. Jadi item pertama adalah `list[0]`, bukan `list[1]`.

            ### 7. Interactive Challenge
            Buatlah list `warna = ["Merah", "Kuning"]`. Tambahkan warna "Hijau" ke dalam list tersebut, lalu hapus "Merah" menggunakan `.remove()`.

            ### 8. Summary & Next Steps
            List sangat hebat untuk data berurutan. Selanjutnya, kita akan belajar cara menyimpan data yang memiliki "nama" atau "label" dengan Dictionary!
          codeExample: |-
            angka = [10, 20, 30]
            angka[0] = 100 # Mengubah item pertama
            print(angka)
          quiz:
            question: Bagaimana cara menambahkan item baru ke posisi paling akhir dalam sebuah List?
            options:
              - list.add("item")
              - list.insert("item")
              - list.append("item")
              - list.push("item")
            correctAnswerIndex: 2
        - id: dictionaries
          title: Dictionary (Kamus)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Di dalam list, kita mencari data berdasarkan nomor urut (indeks). Tapi bagaimana jika kita ingin mencari harga barang berdasarkan "Nama Barang"? Mencari nomor urut satu per satu akan lambat.
            **Analogi:** Seperti "Buku Kontak" di HP-mu. Kamu tidak mencari nomor temanmu berdasarkan urutan ke berapa dia disimpan, tapi berdasarkan "Nama Teman"-nya.

            ### 2. Learning Objectives
            Kamu akan mampu **memetakan** data menggunakan pasangan Kunci-Nilai (Key-Value) dan **mengintegrasikan** Dictionary ke dalam aplikasi.

            ### 3. Prerequisites
            - Memahami List.

            ### 4. Core Material
            **Dictionary** menyimpan data dalam format `{ "kunci": "nilai" }`. Kunci harus unik dan tidak boleh kembar.

            ### 5. Guided Implementation
            ```python
            kontak = {
                "nama": "Andi",
                "telp": "081234",
                "kota": "Jakarta"
            }

            print(f"Kota Andi: {kontak['kota']}")
            ```
            **Expected Output:** `Kota Andi: Jakarta`

            ### 6. Pro-Tips
            Jika kamu mencoba mengakses kunci yang tidak ada (misal: `kontak['alamat']`), Python akan error. Gunakan `.get('alamat')` agar program tidak mati dan memberikan hasil `None`.

            ### 7. Interactive Challenge
            Buatlah dictionary `laptop` yang berisi kunci `merk` dan `harga`. Tambahkan kunci baru `ram` dengan nilai `16GB`.

            ### 8. Summary & Next Steps
            Dictionary adalah tulang punggung data di web (JSON). Selanjutnya, kita akan mengenal tipe data "kaku" dan "unik": Tuple & Set!
          codeExample: |-
            user = {"id": 1, "username": "python_pro"}
            user["is_active"] = True
            print(user)
          quiz:
            question: Manakah simbol yang digunakan untuk mengapit data dalam sebuah Dictionary?
            options:
              - "[ ] (Kurung siku)"
              - "( ) (Kurung biasa)"
              - "{ } (Kurung kurawal)"
              - "< > (Kurung sudut)"
            correctAnswerIndex: 2
        - id: tuples-sets
          title: Tuple & Set
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Terkadang kita butuh data yang "tidak boleh berubah sama sekali" (Tuple) atau data yang "tidak boleh ada duplikatnya" (Set).
            **Analogi:** 
            - **Tuple:** Seperti "Akta Kelahiran". Tanggal lahirmu tidak akan pernah berubah.
            - **Set:** Seperti "Daftar Hadir". Satu orang hanya boleh diabsen satu kali, tidak boleh double.

            ### 2. Learning Objectives
            Kamu akan mampu **membedakan** kegunaan Tuple dan Set serta **mengoptimalkan** pemrosesan data unik menggunakan Set.

            ### 3. Prerequisites
            - Memahami List.

            ### 4. Core Material
            - **Tuple:** `(1, 2, 3)`. Bersifat *Immutable* (tidak bisa diubah setelah dibuat).
            - **Set:** `{1, 2, 3}`. Item unik dan tidak berurutan. Sangat cepat untuk mengecek "apakah item X ada di sini?".

            ### 5. Guided Implementation
            ```python
            # Tuple: Aman dari perubahan
            titik_koordinat = (10, 20)

            # Set: Membuang duplikat otomatis
            nomor = {1, 2, 2, 3, 3, 3}
            print(nomor) 
            ```
            **Expected Output:** `{1, 2, 3}`

            ### 6. Pro-Tips
            Gunakan `Set` jika kamu ingin menghilangkan duplikat dari sebuah `List` secara instan: `unique_list = list(set(my_list))`.

            ### 7. Interactive Challenge
            Buatlah set `hobi = {"coding", "gaming"}`. Tambahkan hobi "coding" lagi ke dalamnya dan lihat apakah isinya bertambah atau tetap.

            ### 8. Summary & Next Steps
            Selamat! Kamu sudah menguasai semua struktur data dasar. Selanjutnya, kita akan masuk ke dunia profesional: Pemrograman Berorientasi Objek (OOP)!
          codeExample: |-
            angka_unik = {1, 1, 2, 2, 3}
            print(f"Jumlah item: {len(angka_unik)}")
          quiz:
            question: Manakah pernyataan yang benar tentang 'Tuple' di Python?
            options:
              - Tuple isinya bisa ditambah kapan saja.
              - Tuple menggunakan kurung siku [ ].
              - Tuple bersifat immutable (tidak bisa diubah isinya).
              - Tuple akan menghapus duplikat secara otomatis.
            correctAnswerIndex: 2
    - id: oop
      title: 6. Pemrograman Berorientasi Objek (OOP)
      lessons:
        - id: classes-objects
          title: Class & Object
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Kita sudah belajar variabel dan fungsi. Tapi bagaimana jika kita ingin membuat sistem "Game Mobil" yang punya ribuan mobil dengan kecepatan dan warna berbeda-beda? Mengelola ribuan variabel dan fungsi akan sangat kacau.
            **Analogi:** Class adalah "Cetakan Kue", sedangkan Object adalah "Kue"-nya. Dengan satu cetakan yang sama, kamu bisa membuat ratusan kue dengan rasa (atribut) yang berbeda.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **merancang** cetak biru objek menggunakan Class dan **menginstansiasi** objek tersebut di dalam memori.

            ### 3. Prerequisites
            - Memahami Fungsi dan Dictionary.

            ### 4. Core Material
            **The "What":** Class adalah struktur yang membungkus Data (Atribut) dan Perilaku (Method) menjadi satu kesatuan.
            **`self`**: Adalah cara objek menunjuk ke dirinya sendiri.

            ### 5. Guided Implementation
            ```python
            class Robot:
                def __init__(self, nama):
                    self.nama = nama # Atribut

                def sapa(self): # Method
                    print(f"Halo, saya {self.nama}!")

            # Membuat objek
            bot1 = Robot("Astro")
            bot1.sapa()
            ```
            **Expected Output:** `Halo, saya Astro!`

            ### 6. Pro-Tips
            `__init__` adalah fungsi spesial yang otomatis berjalan saat objek diciptakan. Gunakan ini untuk memberikan "identitas" awal pada objekmu.

            ### 7. Interactive Challenge
            Buatlah class `Mobil` dengan atribut `merk`. Buat dua objek mobil: `mobil1` merk "Toyota" dan `mobil2` merk "Honda".

            ### 8. Summary & Next Steps
            OOP membuat kodemu sangat rapi dan mirip dunia nyata. Selanjutnya, kita akan belajar cara "mewariskan" sifat antar Class!
          codeExample: |-
            class Kucing:
                def __init__(self, nama):
                    self.nama = nama
                def meong(self):
                    print(f"{self.nama}: Meong!")

            my_cat = Kucing("Kitty")
            my_cat.meong()
          quiz:
            question: Apa kegunaan dari parameter 'self' di dalam metode sebuah class?
            options:
              - Untuk menghapus objek dari memori.
              - Untuk merujuk pada instance (wujud nyata) dari objek itu sendiri.
              - Untuk menghubungkan kode ke internet.
              - Untuk mengganti nama class secara otomatis.
            correctAnswerIndex: 1
        - id: inheritance
          title: Pewarisan (Inheritance)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bayangkan kamu membuat class `Hewan`. Lalu kamu ingin membuat class `Kucing` dan `Anjing`. Keduanya adalah hewan, jadi mereka punya kemiripan (punya kaki, bisa makan). Haruskah kita menulis ulang kode "makan" di setiap class?
            **Analogi:** Seperti warisan dari orang tua ke anak. Anak mendapatkan sifat orang tuanya (warna mata, tinggi badan) tanpa harus "menciptakan" sifat itu sendiri dari nol.

            ### 2. Learning Objectives
            Kamu akan mampu **mengimplementasikan** hierarki class dan **menggabungkan** fungsionalitas antar class menggunakan Inheritance.

            ### 3. Prerequisites
            - Memahami Class & Object.

            ### 4. Core Material
            Pewarisan memungkinkan Class Anak (*Child*) memiliki semua kemampuan Class Induk (*Parent*). Ini sangat menghemat waktu penulisan kode.

            ### 5. Guided Implementation
            ```python
            class Hewan:
                def bernapas(self):
                    print("Sedang menghirup oksigen...")

            class Ikan(Hewan): # Ikan mewarisi Hewan
                def berenang(self):
                    print("Berenang di air.")

            nemo = Ikan()
            nemo.bernapas() # Bisa bernapas karena warisan!
            nemo.berenang()
            ```

            ### 6. Pro-Tips
            Jika Class Anak punya fungsi dengan nama yang sama dengan Class Induk, maka fungsi milik Anak-lah yang akan dijalankan. Ini disebut *Method Overriding*.

            ### 7. Interactive Challenge
            Buatlah class induk `Kendaraan` dengan method `jalan()`. Lalu buat class anak `Pesawat` yang punya method tambahan `terbang()`.

            ### 8. Summary & Next Steps
            Luar biasa! Kamu sudah menguasai fondasi utama Python. Selanjutnya, kita akan melompat ke materi tingkat lanjut untuk persiapan menjadi Developer Profesional!
          codeExample: |-
            class Person:
                def halo(self):
                    print("Halo!")

            class Student(Person):
                pass

            s = Student()
            s.halo()
          quiz:
            question: Dalam kode 'class Mobil(Kendaraan):', mana yang bertindak sebagai Class Induk (Parent)?
            options:
              - Mobil
              - Kendaraan
              - class
              - Tidak ada induknya
            correctAnswerIndex: 1
    - id: advanced
      title: 7. Topik Lanjutan
      lessons:
        - id: error-handling
          title: Penanganan Error (Try Except)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bayangkan kamu membuat aplikasi kalkulator. Jika user memasukkan huruf saat diminta angka, programmu akan langsung mati (crash). Ini akan membuat user kesal.
            **Analogi:** Seperti "Jaring Pengaman" di bawah pemain sirkus. Jika pemain itu jatuh (terjadi error), jaring akan menangkapnya sehingga ia tidak terluka dan pertunjukan bisa lanjut.

            ### 2. Learning Objectives
            Kamu akan mampu **mengantisipasi** kesalahan runtime dan **membangun** aplikasi yang tahan banting menggunakan blok `try...except`.

            ### 3. Prerequisites
            - Memahami Tipe Data dan Operasi Dasar.

            ### 4. Core Material
            **Exception Handling** memungkinkan kita menangkap error sebelum ia menghentikan program.
            - `try`: Kode yang mungkin error.
            - `except`: Kode yang jalan jika terjadi error.
            - `finally`: Kode yang SELALU jalan (misal: tutup koneksi).

            ### 5. Guided Implementation
            ```python
            try:
                angka = int(input("Masukkan angka: "))
                hasil = 10 / angka
                print(f"Hasil: {hasil}")
            except ZeroDivisionError:
                print("Error: Tidak bisa membagi dengan nol!")
            except ValueError:
                print("Error: Kamu harus memasukkan angka, bukan teks!")
            ```

            ### 6. Pro-Tips
            Hindari menggunakan `except Exception:` secara umum tanpa alasan kuat. Selalu tangkap error yang spesifik agar kamu tahu persis apa yang salah.

            ### 7. Interactive Challenge
            Buatlah blok `try...except` untuk menangkap `FileNotFoundError` saat mencoba membuka file yang tidak ada.

            ### 8. Summary & Next Steps
            Programmu sekarang sudah "tahan banting". Selanjutnya, kita akan belajar cara "berkomunikasi" dengan hardisk melalui File Handling!
          codeExample: |-
            try:
                items = [1, 2, 3]
                print(items[5])
            except IndexError:
                print("Index di luar jangkauan!")
          quiz:
            question: Blok kode mana yang digunakan untuk menangkap error yang terjadi di dalam blok 'try'?
            options:
              - catch
              - except
              - handle
              - stop
            correctAnswerIndex: 1
        - id: file-handling
          title: Bekerja dengan File
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Variabel hanya menyimpan data di RAM. Saat komputer dimatikan, data hilang. Bagaimana jika kita ingin menyimpan skor tertinggi pemain game selamanya?
            **Analogi:** Seperti menulis di buku catatan. Kamu membuka buku (open), menulis (write) atau membaca (read), lalu menutupnya kembali (close).

            ### 2. Learning Objectives
            Kamu akan mampu **mengelola** operasi baca-tulis file secara permanen dan **menerapkan** *context manager* (`with`) untuk keamanan data.

            ### 3. Prerequisites
            - Memahami Penanganan Error.

            ### 4. Core Material
            Python menggunakan fungsi `open()` untuk mengakses file.
            - `'r'`: Read (Membaca).
            - `'w'`: Write (Menulis - menimpa isi).
            - `'a'`: Append (Menambah di akhir).

            ### 5. Guided Implementation
            ```python
            # Menulis file (Otomatis ditutup oleh 'with')
            with open("test.txt", "w") as f:
                f.write("Halo, ini disimpan di file!")

            # Membaca file
            with open("test.txt", "r") as f:
                konten = f.read()
                print(konten)
            ```

            ### 6. Pro-Tips
            Selalu gunakan `with open(...)`. Jika kamu menggunakan `f = open()` tanpa `f.close()`, file tersebut bisa terkunci atau korup jika program error di tengah jalan.

            ### 7. Interactive Challenge
            Buatlah file bernama `catatan.txt` dan isi dengan 3 hobi favoritmu, masing-masing di baris baru.

            ### 8. Summary & Next Steps
            Data sekarang tersimpan aman. Selanjutnya, kita akan belajar fitur "keren" Python untuk memodifikasi fungsi: Decorator!
          codeExample: |-
            with open("halo.txt", "w") as file:
                file.write("Belajar Python itu asyik!")
          quiz:
            question: Apa fungsi dari pernyataan 'with' saat membuka file di Python?
            options:
              - Membuat proses penulisan lebih cepat.
              - Memastikan file otomatis tertutup meskipun terjadi error.
              - Mengenkripsi isi file.
              - Menghapus file secara otomatis setelah dibaca.
            correctAnswerIndex: 1
        - id: decorators
          title: Decorator
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bayangkan kamu punya 20 fungsi dan ingin mencatat waktu berapa lama masing-masing fungsi berjalan. Apakah kamu akan menambahkan kode pencatat waktu di setiap fungsi tersebut? Melelahkan!
            **Analogi:** Seperti menambahkan "Casing" pada HP. Kamu tidak mengubah mesin HP-nya, tapi kamu menambah perlindungan atau hiasan di luarnya.

            ### 2. Learning Objectives
            Kamu akan mampu **mengonstruksi** fungsi tingkat tinggi (Higher-Order Functions) dan **memodifikasi** perilaku fungsi tanpa menyentuh kode aslinya.

            ### 3. Prerequisites
            - Memahami Fungsi dan Nilai Balik.

            ### 4. Core Material
            **Decorator** adalah fungsi yang menerima fungsi lain sebagai input dan mengembalikan fungsi baru dengan tambahan fitur. Ditandai dengan simbol `@` di atas fungsi.

            ### 5. Guided Implementation
            ```python
            def info_decorator(func):
                def wrapper():
                    print("--- Fungsi akan dijalankan ---")
                    func()
                    print("--- Fungsi selesai ---")
                return wrapper

            @info_decorator
            def say_hi():
                print("Halo Dunia!")

            say_hi()
            ```

            ### 6. Pro-Tips
            Decorator sangat sering digunakan di framework web (seperti Flask/FastAPI) untuk mengatur rute URL atau mengecek apakah user sudah login.

            ### 7. Interactive Challenge
            Buatlah decorator `tebal_decorator` yang mencetak garis putus-putus `----------` sebelum dan sesudah fungsi dijalankan.

            ### 8. Summary & Next Steps
            Decorator membuat kodemu sangat "bersih". Selanjutnya, kita akan belajar cara mengolah data raksasa secara hemat memori dengan Generator!
          codeExample: |-
            def bismillah_decorator(func):
                def wrapper():
                    print("Bismillah...")
                    func()
                return wrapper

            @bismillah_decorator
            def kerja():
                print("Sedang menulis kode.")

            kerja()
          quiz:
            question: Simbol apa yang digunakan di atas fungsi untuk menerapkan sebuah Decorator?
            options:
              - "$"
              - "#"
              - "@"
              - "&"
            correctAnswerIndex: 2
        - id: generators
          title: Generator
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Jika kamu ingin mengolah 1 miliar angka, menyimpannya di dalam sebuah `List` akan langsung membuat RAM komputermu penuh dan aplikasi mati.
            **Analogi:** Seperti "Prasmanan" vs "Pelayan". List adalah Prasmanan (semua makanan ditaruh di meja sekaligus). Generator adalah Pelayan (makanan diberikan satu per satu hanya saat kamu memintanya).

            ### 2. Learning Objectives
            Kamu akan mampu **merancang** fungsi generator yang hemat memori dan **mengimplementasikan** iterasi pada dataset besar.

            ### 3. Prerequisites
            - Memahami Perulangan (`for`) dan Fungsi.

            ### 4. Core Material
            **Generator** menggunakan kata kunci `yield`. Ia tidak mengembalikan semua nilai sekaligus, tapi "menunda" eksekusi dan memberikan nilai satu per satu.

            ### 5. Guided Implementation
            ```python
            def hitung_mundur(n):
                while n > 0:
                    yield n
                    n -= 1

            gen = hitung_mundur(3)
            print(next(gen)) # 3
            print(next(gen)) # 2
            print(next(gen)) # 1
            ```

            ### 6. Pro-Tips
            Gunakan generator jika kamu bekerja dengan data dari database atau file log yang ukurannya sangat besar agar aplikasimu tetap ringan.

            ### 7. Interactive Challenge
            Buatlah generator `angka_genap(batas)` yang menghasilkan angka genap mulai dari 0 sampai batas yang ditentukan.

            ### 8. Summary & Next Steps
            Luar biasa! Kamu sudah menguasai teknik Python tingkat tinggi. Selanjutnya, kita akan melihat bagaimana cara memanfaatkan karya orang lain di seluruh dunia: PIP & Ekosistem!
          codeExample: |-
            def generator_ku():
                yield "Pertama"
                yield "Kedua"

            for teks in generator_ku():
                print(teks)
          quiz:
            question: Kata kunci apa yang membedakan fungsi Generator dengan fungsi biasa?
            options:
              - return
              - yield
              - output
              - send
            correctAnswerIndex: 1
    - id: ecosystem
      title: 8. Ekosistem & Library
      lessons:
        - id: pip-modules
          title: PIP & Modul
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Kamu ingin membuat aplikasi yang bisa memprediksi cuaca atau mendeteksi wajah. Menulis algoritmanya dari nol akan memakan waktu bertahun-tahun.
            **Analogi:** Seperti membangun rumah. Kamu tidak perlu membuat batu bata dan semen sendiri. Kamu tinggal membelinya di toko bangunan (Ekosistem Python) dan merakitnya.

            ### 2. Learning Objectives
            Kamu akan mampu **mengelola** paket eksternal menggunakan PIP dan **memanfaatkan** modul bawaan Python untuk mempercepat pengembangan.

            ### 3. Prerequisites
            - Memahami Dasar-dasar Fungsi.

            ### 4. Core Material
            - **Modul**: File `.py` tunggal.
            - **Library/Package**: Kumpulan modul.
            - **PIP**: Alat untuk mengunduh library dari internet (PyPI).

            ### 5. Guided Implementation
            Buka terminalmu dan coba instal library `requests`:
            ```bash
            pip install requests
            ```
            Lalu gunakan di Python:
            ```python
            import requests
            response = requests.get("https://www.google.com")
            print(response.status_code)
            ```

            ### 6. Pro-Tips
            Selalu gunakan file `requirements.txt` untuk mencatat semua library yang kamu gunakan, agar orang lain bisa menjalankan kodemu dengan mudah.

            ### 7. Interactive Challenge
            Coba impor modul bawaan `math` dan gunakan `math.sqrt(64)` untuk menghitung akar dari 64.

            ### 8. Summary & Next Steps
            Kamu sekarang punya akses ke jutaan kode hebat. Selanjutnya, kita akan membahas konsep-konsep penting dalam pengembangan software modern!
          codeExample: |-
            import math
            import random

            print(f"Akar 100: {math.sqrt(100)}")
            print(f"Angka acak: {random.randint(1, 6)}")
          quiz:
            question: Perintah terminal apa yang digunakan untuk menginstal library Python dari internet?
            options:
              - python get
              - install-pkg
              - pip install
              - npm install
            correctAnswerIndex: 2
    - id: dev-concepts
      title: 9. Konsep Pengembangan (API, MCP, SDK, dll)
      lessons:
        - id: api-concept
          title: Apa itu API?
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bayangkan kamu ingin menampilkan peta di aplikasimu. Apakah kamu harus memotret seluruh dunia dari satelit sendiri? Tentu tidak. Kamu butuh cara untuk "meminjam" data peta dari Google atau Mapbox.
            **Analogi:** Seperti "Pelayan Restoran". Kamu (Client) tidak perlu masuk ke dapur (Server) untuk memasak. Kamu cukup memesan melalui Pelayan (API), dan Pelayan akan membawakan makananmu.

            ### 2. Learning Objectives
            Kamu akan mampu **menguraikan** cara kerja API dan **membedakan** peran antara Client dan Server dalam pertukaran data.

            ### 3. Prerequisites
            - Memahami Dasar Networking (HTTP).

            ### 4. Core Material
            **API (Application Programming Interface)** adalah protokol yang memungkinkan dua aplikasi saling berkomunikasi. Ia bertindak sebagai perantara yang aman.

            ### 5. Guided Implementation
            ```python
            # Konsep Request API
            # URL: https://api.exchangerate.host/latest
            # Method: GET
            # Response: { "base": "USD", "rates": { "IDR": 15000 } }
            ```

            ### 6. Pro-Tips
            Gunakan alat seperti **Postman** atau **Insomnia** untuk mencoba API sebelum kamu menulis kode Python-nya. Ini akan menghemat banyak waktu debugging.

            ### 7. Interactive Challenge
            Cari sebuah API publik (misal: JSONPlaceholder) dan coba bayangkan informasi apa saja yang bisa kamu ambil dari sana.

            ### 8. Summary & Next Steps
            API adalah cara aplikasi "berbicara". Selanjutnya, kita akan mengenal protokol terbaru yang membuat AI menjadi sangat sakti: MCP!
          codeExample: |-
            # Simulasi respon API
            api_response = {"status": "success", "data": "Peta Jakarta"}
            print(f"Respon dari server: {api_response['data']}")
          quiz:
            question: Dalam analogi restoran, siapakah yang bertindak sebagai API?
            options:
              - Koki di dapur
              - Pelanggan yang lapar
              - Pelayan yang mencatat pesanan
              - Buku menu
            correctAnswerIndex: 2
        - id: mcp-concept
          title: Apa itu MCP?
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** AI zaman sekarang pintar bicara, tapi seringkali mereka "terkurung" di dalam kotak chat. Mereka tidak bisa membaca file rahasiamu atau menjalankan program di komputermu tanpa integrasi yang rumit dan berbeda-beda setiap aplikasi.
            **Analogi:** Seperti "USB Port" untuk AI. Dulu, printer punya kabel sendiri, keyboard punya kabel sendiri. Sekarang, semua menggunakan USB. MCP adalah port standar agar AI bisa terhubung ke alat (tools) apapun dengan satu cara yang sama.

            ### 2. Learning Objectives
            Kamu akan mampu **mengidentifikasi** kegunaan Model Context Protocol (MCP) dalam ekosistem AI modern.

            ### 3. Prerequisites
            - Memahami konsep API dasar.

            ### 4. Core Material
            **MCP (Model Context Protocol)** adalah standar terbuka yang memungkinkan AI (seperti Claude/Gemini) untuk mengakses data, file, dan tools milik pengguna secara aman dan terstandarisasi.

            ### 5. Guided Implementation
            Struktur MCP biasanya melibatkan:
            1. **MCP Server**: Aplikasi yang punya data (misal: Database).
            2. **MCP Client**: Aplikasi AI yang ingin pakai data itu.

            ### 6. Pro-Tips
            MCP sedang menjadi tren besar di industri. Memahami ini sekarang akan memberimu nilai tambah besar sebagai Developer AI di masa depan.

            ### 7. Interactive Challenge
            Bayangkan satu tugas membosankan di komputermu yang ingin kamu serahkan ke AI melalui MCP (misal: merangkum semua email masuk).

            ### 8. Summary & Next Steps
            MCP menghubungkan AI dengan dunia nyata. Selanjutnya, kita akan melihat "kotak peralatan" lengkap untuk Developer: SDK!
          codeExample: |-
            # Konsep MCP: AI meminta akses ke list_files
            mcp_instruction = "AI can now use tool: list_files_in_directory"
            print(mcp_instruction)
          quiz:
            question: Apa tujuan utama dari pembuatan standar MCP (Model Context Protocol)?
            options:
              - Menggantikan bahasa pemrograman Python.
              - Membuat standar agar AI bisa mengakses data dan tools dari berbagai aplikasi dengan cara yang sama.
              - Mempercepat proses pengetikan teks oleh manusia.
              - Menghapus kebutuhan akan listrik pada server AI.
            correctAnswerIndex: 1
        - id: sdk-concept
          title: Apa itu SDK?
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Menggunakan API secara mentah (raw) terkadang sulit karena kamu harus mengatur header, autentikasi, dan format data secara manual.
            **Analogi:** Seperti "Paket Siap Rakit" dari IKEA. Kamu tidak hanya mendapatkan kayu (data), tapi kamu juga mendapatkan baut, obeng, dan buku petunjuk dalam satu kotak.

            ### 2. Learning Objectives
            Kamu akan mampu **membedakan** antara API dan SDK serta **memilih** kapan harus menggunakan SDK dalam proyekmu.

            ### 3. Prerequisites
            - Memahami konsep API.

            ### 4. Core Material
            **SDK (Software Development Kit)** adalah kumpulan alat pengembangan dalam satu paket. Isinya biasanya: Library, Dokumentasi, Debugger, dan Contoh Kode.

            ### 5. Guided Implementation
            Contoh SDK populer di Python:
            - `boto3` (SDK untuk AWS)
            - `google-cloud-storage` (SDK untuk Google Cloud)

            ### 6. Pro-Tips
            Gunakan SDK jika tersedia! Developer pembuat layanan tersebut sudah mengoptimalkan SDK agar lebih mudah digunakan daripada memanggil API-nya secara manual.

            ### 7. Interactive Challenge
            Coba cari di internet "Firebase Admin SDK Python" dan lihat betapa lengkapnya fitur yang ditawarkan dalam satu paket tersebut.

            ### 8. Summary & Next Steps
            Sekarang kamu tahu cara membangun aplikasi dengan bantuan tools luar. Selanjutnya, kita akan membahas perdebatan abadi: Library vs Framework!
          codeExample: |-
            # Contoh penggunaan SDK (Simulasi)
            # import cloud_sdk
            # client = cloud_sdk.Client(api_key="SECRET")
            # client.upload_file("foto.jpg")
            print("SDK memudahkan interaksi dengan layanan pihak ketiga.")
          quiz:
            question: Mana yang biasanya berisi lebih banyak alat (Tools, Debugger, Dokumentasi)?
            options:
              - API
              - SDK
              - URL
              - Token
            correctAnswerIndex: 1
        - id: library-framework
          title: Library vs Framework
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Banyak pemula tertukar antara Library dan Framework. Salah memilih bisa berakibat pada struktur kode yang kaku atau justru terlalu bebas hingga berantakan.
            **Analogi:** 
            - **Library:** Seperti pergi ke IKEA untuk beli meja. Kamu yang memutuskan di mana naruh mejanya di rumahmu. (Kamu yang pegang kendali).
            - **Framework:** Seperti tinggal di Hotel. Peraturannya sudah ada, jam sarapan sudah ditentukan, kamu tinggal mengikuti aturannya. (Framework yang pegang kendali).

            ### 2. Learning Objectives
            Kamu akan mampu **menganalisis** perbedaan *Inversion of Control* dan **memutuskan** kapan menggunakan Framework untuk proyek skala besar.

            ### 3. Prerequisites
            - Pernah menggunakan `import` di Python.

            ### 4. Core Material
            - **Library:** Kamu memanggil fungsi di dalamnya kapanpun kamu butuh.
            - **Framework:** Framework memanggil kodemu pada waktu yang sudah ditentukan oleh sistem mereka.

            ### 5. Guided Implementation
            - **Library:** `math`, `requests`, `pandas`.
            - **Framework:** `Django`, `FastAPI`, `Flask`.

            ### 6. Pro-Tips
            Jangan terjebak dalam "Framework War". Pilihlah alat berdasarkan kebutuhan proyek, bukan karena tren semata.

            ### 7. Interactive Challenge
            Sebutkan satu project yang menurutmu lebih cocok pakai Library saja, dan satu project yang wajib pakai Framework!

            ### 8. Summary & Next Steps
            Luar biasa! Pengetahuanmu tentang pengembangan software sudah sangat luas. Selanjutnya, kita akan belajar cara mengirim data-data ini dalam berbagai format: JSON, YAML, dll!
          codeExample: |-
            # Library: Kamu panggil dia
            import math
            print(math.pi)

            # Framework: Dia panggil fungsi kamu (Konsep)
            # @app.route("/")
            # def home(): return "Welcome"
          quiz:
            question: Apa istilah teknis untuk perbedaan utama di mana Framework-lah yang mengatur alur jalannya aplikasi Anda?
            options:
              - Data Science
              - Inversion of Control (IoC)
              - Binary Search
              - Multi Processing
            correctAnswerIndex: 1
    - id: data-formats
      title: 10. Format Data (JSON, YAML, XML, LaTeX)
      lessons:
        - id: json-format
          title: JSON (JavaScript Object Notation)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bagaimana cara mengirim data dari aplikasi Python ke aplikasi yang dibuat dengan Java atau JavaScript? Mereka punya struktur variabel yang berbeda. Kita butuh bahasa "Universal".
            **Analogi:** Seperti "Bahasa Inggris" di dunia komunikasi. Apapun bahasa ibumu, kita semua bicara bahasa Inggris agar saling mengerti. JSON adalah bahasa Inggris bagi data.

            ### 2. Learning Objectives
            Kamu akan mampu **mengonversi** (serialize) data Python menjadi format JSON dan sebaliknya.

            ### 3. Prerequisites
            - Memahami Dictionary dan List di Python.

            ### 4. Core Material
            **JSON** adalah format teks yang sangat mirip dengan Dictionary Python. Ia adalah standar de-facto untuk pertukaran data di web saat ini.

            ### 5. Guided Implementation
            ```python
            import json

            data = {"nama": "Andi", "hobi": ["coding", "musik"]}
            
            # Ubah Dict ke String JSON (Serialization)
            json_string = json.dumps(data)
            print(json_string)

            # Ubah String JSON kembali ke Dict (Deserialization)
            data_kembali = json.loads(json_string)
            ```

            ### 6. Pro-Tips
            Gunakan argumen `indent=4` pada `json.dumps()` agar hasil teks JSON-nya rapi dan mudah dibaca oleh manusia.

            ### 7. Interactive Challenge
            Buatlah dictionary berisi data dirimu, lalu cetak dalam format JSON yang rapi (berindentasi).

            ### 8. Summary & Next Steps
            JSON sangat populer di web. Namun untuk file konfigurasi yang lebih bersih, orang lebih suka memakai YAML. Yuk kita bahas!
          codeExample: |-
            import json
            user_json = '{"id": 1, "name": "Budi"}'
            user_dict = json.loads(user_json)
            print(user_dict["name"])
          quiz:
            question: Library bawaan Python apa yang digunakan untuk mengolah data format JSON?
            options:
              - math
              - os
              - json
              - requests
            correctAnswerIndex: 2
        - id: yaml-format
          title: YAML (YAML Ain't Markup Language)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** JSON terkadang sulit ditulis manual karena banyak tanda kurung `{}` dan koma `,`. Salah satu koma saja bisa bikin error.
            **Analogi:** Seperti menulis "Daftar Belanja" di kertas. Tidak perlu kurung-kurung rumit, cukup tulis poin-poinnya saja dengan indentasi yang rapi.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **membaca** struktur file YAML dan **menjelaskan** mengapa format ini dipilih untuk konfigurasi sistem (seperti Docker).

            ### 3. Prerequisites
            - Memahami format JSON.

            ### 4. Core Material
            **YAML** sangat mengandalkan indentasi (spasi), mirip seperti Python. Ia sangat bersih dan enak dilihat mata manusia.

            ### 5. Guided Implementation
            ```yaml
            # Contoh struktur YAML
            person:
              name: Andi
              hobbies:
                - coding
                - gaming
            ```

            ### 6. Pro-Tips
            Hati-hati! YAML sangat sensitif terhadap spasi. Jangan pernah mencampur Spasi dan Tab dalam satu file YAML karena akan menyebabkan error yang sulit dicari.

            ### 7. Interactive Challenge
            Coba buat struktur YAML sederhana untuk mendeskripsikan sebuah "Mobil" (merk, warna, dan daftar fitur).

            ### 8. Summary & Next Steps
            YAML adalah raja konfigurasi. Selanjutnya, kita akan mengenal format "Klasik" dan format "Ilmiah": XML & LaTeX!
          codeExample: |-
            # YAML ke Python (Pseudo-code)
            # import yaml
            # data = yaml.safe_load(yaml_string)
            print("YAML menggunakan indentasi untuk menentukan struktur data.")
          quiz:
            question: Apa yang digunakan format YAML untuk menentukan struktur atau hierarki datanya (mirip seperti Python)?
            options:
              - Tanda kurung kurawal { }
              - Indentasi spasi
              - Tanda titik koma ;
              - Tag pembuka dan penutup < >
            correctAnswerIndex: 1
        - id: xml-latex
          title: XML & LaTeX
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** 
            - **XML:** Bagaimana sistem perbankan lama bertukar data?
            - **LaTeX:** Bagaimana ilmuwan menulis rumus matematika yang sangat rumit agar terlihat cantik dan rapi di jurnal ilmiah?
            **Analogi:** 
            - **XML:** Seperti mengisi formulir kertas yang sangat formal dengan banyak kotak-kotak label.
            - **LaTeX:** Seperti menggunakan mesin cetak buku profesional untuk membuat skripsi atau tesis.

            ### 2. Learning Objectives
            Kamu akan mampu **mengenali** struktur XML dan **mengidentifikasi** kegunaan LaTeX dalam dunia penulisan ilmiah.

            ### 3. Prerequisites
            - Memahami dasar format data teks.

            ### 4. Core Material
            - **XML:** Menggunakan "Tags" seperti `<nama>Andi</nama>`. Sangat detail tapi boros karakter.
            - **LaTeX:** Bahasa markup untuk typesetting dokumen. Sangat kuat dalam merender rumus matematika kompleks.

            ### 5. Guided Implementation
            - **XML:** Digunakan di file Excel (`.xlsx`) dan sistem integrasi lama.
            - **LaTeX:** Digunakan oleh mahasiswa tingkat akhir dan peneliti di seluruh dunia.

            ### 6. Pro-Tips
            Meskipun XML mulai digantikan JSON, kamu wajib tahu cara membacanya karena banyak sistem pemerintahan dan perbankan masih menggunakannya.

            ### 7. Interactive Challenge
            Coba tulis rumus Pythagoras sederhana `a^2 + b^2 = c^2` dalam bayanganmu, lalu cari bagaimana LaTeX merendernya dengan cantik!

            ### 8. Summary & Next Steps
            Selamat! Kamu sudah menguasai berbagai format data. Selanjutnya, kita akan belajar cara mengirim data-data ini melalui jaringan internet: Web & Networking!
          codeExample: |-
            # XML: <user><id>1</id><name>Budi</name></user>
            # LaTeX: \sqrt{a^2 + b^2}
            print("XML untuk struktur kaku, LaTeX untuk dokumen cantik.")
          quiz:
            question: Format data mana yang sangat unggul dalam merender rumus matematika kompleks secara profesional?
            options:
              - JSON
              - YAML
              - XML
              - LaTeX
            correctAnswerIndex: 3
    - id: web-networking
      title: 11. Web & Networking
      lessons:
        - id: http-requests
          title: HTTP Request & cURL
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bayangkan kamu ingin mendownload harga saham atau berita terbaru secara otomatis setiap jam. Kamu tidak mungkin membuka browser dan klik tombol download manual setiap saat. Kamu butuh cara agar kodemu bisa "meminta" data ke server internet.
            **Analogi:** Seperti "Mengirim Surat". Kamu menulis alamat tujuan (URL), memasukkan isi surat (Body), menempelkan perangko (API Key), lalu mengirimnya melalui pak pos (Protokol HTTP).

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** konsep dasar protokol HTTP dan **mendemonstrasikan** pengambilan data menggunakan library `requests` di Python.

            ### 3. Prerequisites
            - Memahami konsep API dan JSON.

            ### 4. Core Material
            **HTTP (Hypertext Transfer Protocol)** adalah bahasa utama internet.
            **Metode Utama:**
            - `GET`: Mengambil data.
            - `POST`: Mengirim data baru.
            - `PUT`: Memperbarui data.
            - `DELETE`: Menghapus data.

            ### 5. Guided Implementation
            ```python
            import requests

            # Mengambil data profil GitHub (Public API)
            url = "https://api.github.com/users/octocat"
            response = requests.get(url)

            if response.status_code == 200:
                print(f"Nama: {response.json()['name']}")
            ```
            **Expected Output:** `Nama: The Octocat`

            ### 6. Pro-Tips
            Selalu cek `status_code`. Kode `200` berarti berhasil, `404` berarti data tidak ketemu, and `500` berarti server lawan sedang error.

            ### 7. Interactive Challenge
            Gunakan library `requests` untuk memanggil URL `https://jsonplaceholder.typicode.com/todos/1` dan cetak judul tugasnya.

            ### 8. Summary & Next Steps
            Sekarang kamu bisa mengambil data dari internet. Selanjutnya, kita akan belajar cara menangani aliran data yang tidak pernah berhenti: Streaming & WebSocket!
          codeExample: |-
            import requests
            r = requests.get("https://google.com")
            print(f"Status: {r.status_code}")
          quiz:
            question: Metode HTTP mana yang paling tepat digunakan jika kita ingin 'mengirim data baru' (seperti mendaftar akun) ke server?
            options:
              - GET
              - POST
              - HEAD
              - OPTIONS
            correctAnswerIndex: 1
        - id: http-streaming-websocket
          title: HTTP Streaming & WebSocket
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** HTTP biasa bersifat "Tanya-Jawab". Kamu tanya, server jawab, lalu putus. Tapi bagaimana dengan aplikasi Chat atau Dashboard Saham? Kamu tidak ingin terus-menerus bertanya "Ada pesan baru?" setiap detik (Polling). Kamu ingin server "berteriak" saat ada data baru.
            **Analogi:** 
            - **HTTP:** Seperti mengirim SMS. Kamu kirim, lalu nunggu balasan.
            - **WebSocket:** Seperti menelepon. Jalur komunikasi terbuka terus, kedua pihak bisa bicara kapan saja tanpa harus menutup telepon.

            ### 2. Learning Objectives
            Kamu akan mampu **membedakan** antara HTTP Polling, Streaming, dan WebSocket untuk kebutuhan aplikasi real-time.

            ### 3. Prerequisites
            - Memahami dasar HTTP Request.

            ### 4. Core Material
            - **HTTP Streaming:** Server mengirim data secara bertahap dalam satu koneksi yang lama (misal: nonton video).
            - **WebSocket:** Koneksi dua arah yang tetap terbuka. Server bisa mengirim data ke Client tanpa diminta terlebih dahulu.

            ### 5. Guided Implementation
            Biasanya menggunakan library seperti `websockets` atau `socket.io` di Python.
            ```python
            # Konsep koneksi
            # ws = connect("wss://stream.binance.com:9443/ws/btcusdt@ticker")
            # data = ws.recv() # Menunggu data dari server secara real-time
            ```

            ### 6. Pro-Tips
            WebSocket sangat boros sumber daya server jika penggunanya jutaan. Gunakan hanya jika kamu benar-benar butuh fitur real-time (seperti Chat atau Game Online).

            ### 7. Interactive Challenge
            Coba cari tahu apa itu "Long Polling" dan mengapa ia dianggap sebagai "nenek moyang" sebelum adanya WebSocket.

            ### 8. Summary & Next Steps
            Real-time communication sudah dikuasai. Selanjutnya, kita akan belajar cara mengatur jutaan pesan agar tidak berantakan menggunakan Message Brokers!
          quiz:
            question: Manakah dari berikut ini yang paling cocok menggunakan WebSocket?
            options:
              - Membaca artikel blog yang statis.
              - Mengirim email mingguan.
              - Aplikasi chat real-time yang membutuhkan respon instan.
              - Mengunduh file gambar ukuran besar.
            correctAnswerIndex: 2
        - id: message-brokers
          title: Message Brokers
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bayangkan kamu punya aplikasi seperti Gojek. Saat pesanan masuk, ribuan hal harus terjadi: kirim notif ke driver, cek promo, update database, dll. Jika satu hal gagal atau lambat, apakah seluruh aplikasi harus ikutan macet?
            **Analogi:** Seperti "Kantor Pos". Kamu tidak perlu memberikan surat langsung ke tangan temanmu. Kamu cukup taruh di kotak pos (Message Broker), dan temanmu akan mengambilnya saat dia siap.

            ### 2. Learning Objectives
            Kamu akan mampu **menguraikan** fungsi Message Broker (Redis/RabbitMQ) dalam memisahkan beban kerja aplikasi (Decoupling).

            ### 3. Prerequisites
            - Memahami konsep Client-Server.

            ### 4. Core Material
            **Message Broker** adalah perantara pesan.
            - **Publisher**: Si pengirim pesan.
            - **Subscriber**: Si penerima pesan.
            - **Queue**: Antrean pesan yang menunggu diproses.

            ### 5. Guided Implementation
            Teknologi populer:
            - **Redis**: Paling cepat, cocok untuk pesan ringan.
            - **RabbitMQ**: Sangat handal untuk antrean kompleks.
            - **Kafka**: Untuk data raksasa (Big Data).

            ### 6. Pro-Tips
            Gunakan Message Broker untuk tugas-tugas berat yang tidak harus selesai detik itu juga (seperti kirim email atau generate laporan PDF) agar user tidak menunggu lama di aplikasi.

            ### 7. Interactive Challenge
            Bayangkan sistem sebuah bank. Tugas apa yang menurutmu harus masuk ke antrean (Message Broker) daripada diproses langsung?

            ### 8. Summary & Next Steps
            Arsitektur sistemmu sekarang sudah canggih. Selanjutnya, kita akan belajar cara membangun "rumah" bagi API-mu: Web Server Frameworks!
          quiz:
            question: Apa manfaat utama menggunakan Message Broker dalam arsitektur sistem?
            options:
              - Membuat aplikasi berjalan lebih cepat di satu komputer.
              - Menghubungkan berbagai layanan secara asinkron (tidak harus menunggu satu sama lain).
              - Menghapus kebutuhan akan database.
              - Mengurangi biaya langganan internet.
            correctAnswerIndex: 1
        - id: web-frameworks
          title: Web Server Frameworks
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Membuat server web dari nol menggunakan socket sangatlah sulit. Kamu harus menangani keamanan, routing URL, dan parsing data secara manual.
            **Analogi:** Seperti membangun restoran. Kamu tidak perlu membuat kompor, meja, dan kursi sendiri. Kamu bisa membeli paket "Interior Restoran" yang sudah siap pakai (Framework).

            ### 2. Learning Objectives
            Kamu akan mampu **membandingkan** tiga framework web besar di Python (FastAPI, Flask, Django) dan **memilih** yang paling tepat untuk proyekmu.

            ### 3. Prerequisites
            - Memahami Dasar Python dan HTTP.

            ### 4. Core Material
            1. **Flask:** Minimalis, kamu yang atur semuanya. Cocok untuk belajar.
            2. **Django:** "Batteries Included". Lengkap, aman, tapi berat. Cocok untuk web besar.
            3. **FastAPI:** Modern, sangat cepat, dan otomatis membuat dokumentasi API.

            ### 5. Guided Implementation
            Contoh kode minimal FastAPI:
            ```python
            from fastapi import FastAPI

            app = FastAPI()

            @app.get("/")
            def home():
                return {"message": "Halo dari FastAPI!"}
            ```

            ### 6. Pro-Tips
            Jika kamu baru belajar, cobalah **FastAPI**. Ia sangat populer saat ini di dunia AI dan Data Science karena kecepatannya.

            ### 7. Interactive Challenge
            Coba cari tahu apa yang dimaksud dengan "Asynchronous" (async/await) dan mengapa FastAPI sangat mengandalkan fitur tersebut.

            ### 8. Summary & Next Steps
            Selamat! Kamu sudah siap jadi Backend Developer. Tapi tunggu, di mana kita akan menyimpan data user? Yuk, kita pelajari Database & ORM!
          quiz:
            question: Framework Python mana yang dikenal memiliki fitur 'Batteries Included' (Sangat Lengkap)?
            options:
              - Flask
              - FastAPI
              - Django
              - NumPy
            correctAnswerIndex: 2
    - id: database-orm
      title: 12. Database & ORM
      lessons:
        - id: db-intro
          title: Apa itu Database?
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** File teks (`.txt`) atau CSV sulit digunakan untuk menyimpan jutaan data yang saling berhubungan. Mencari satu data di antara jutaan baris teks akan memakan waktu lama.
            **Analogi:** Seperti "Perpustakaan Raksasa". Database bukan hanya tumpukan buku, tapi buku yang ditata rapi di rak tertentu, lengkap dengan katalog pencarian agar buku bisa ketemu dalam hitungan detik.

            ### 2. Learning Objectives
            Kamu akan mampu **mengategorikan** perbedaan antara Database SQL dan NoSQL serta **menentukan** kapan harus menggunakan masing-masing jenis tersebut.

            ### 3. Prerequisites
            - Memahami konsep Variabel dan Struktur Data.

            ### 4. Core Material
            - **SQL (Relational):** Data rapi dalam tabel (baris & kolom). Sangat aman untuk transaksi uang. Contoh: PostgreSQL, MySQL.
            - **NoSQL (Non-Relational):** Data fleksibel (seperti JSON). Sangat cepat untuk data raksasa. Contoh: MongoDB, Redis.

            ### 5. Guided Implementation
            Bayangkan tabel `Users`:
            | id | username | email |
            |----|----------|-------|
            | 1  | andi     | a@b.com|

            ### 6. Pro-Tips
            Gunakan **SQLite** untuk belajar. Ia adalah database asli (built-in) Python yang tidak perlu instalasi server rumit. Datanya disimpan dalam satu file kecil saja.

            ### 7. Interactive Challenge
            Sebutkan satu aplikasi yang menurutmu wajib pakai SQL, dan satu aplikasi yang lebih cocok pakai NoSQL!

            ### 8. Summary & Next Steps
            Database adalah gudang datamu. Selanjutnya, kita akan belajar cara "berbicara" dengan gudang tersebut menggunakan bahasa SQL!
          quiz:
            question: Kapan sebaiknya Anda memilih database SQL dibandingkan NoSQL?
            options:
              - Saat data tidak memiliki struktur yang jelas.
              - Saat membutuhkan keamanan transaksi yang sangat ketat (ACID compliance).
              - Saat ingin menyimpan data dalam format gambar saja.
              - Saat ingin database yang paling murah.
            correctAnswerIndex: 1
        - id: sql-queries
          title: Query & CRUD
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Kamu punya gudang data, tapi bagaimana cara mengambilnya? Kamu butuh "Bahasa Perintah" yang dimengerti oleh database.
            **Analogi:** Seperti memesan kopi di kafe. Kamu harus bilang "Saya minta Kopi Hitam, satu, tanpa gula". SQL adalah cara kamu memesan data.

            ### 2. Learning Objectives
            Kamu akan mampu **menyusun** perintah SQL dasar untuk melakukan operasi CRUD (Create, Read, Update, Delete).

            ### 3. Prerequisites
            - Memahami konsep tabel database.

            ### 4. Core Material
            **CRUD** adalah 4 fungsi dasar manajemen data:
            1. **C**reate: `INSERT` (Tambah data).
            2. **R**ead: `SELECT` (Ambil data).
            3. **U**pdate: `UPDATE` (Ubah data).
            4. **D**elete: `DELETE` (Hapus data).

            ### 5. Guided Implementation
            ```sql
            -- Ambil semua user yang namanya 'Andi'
            SELECT * FROM users WHERE nama = 'Andi';

            -- Tambah user baru
            INSERT INTO users (nama, umur) VALUES ('Budi', 20);
            ```

            ### 6. Pro-Tips
            Hati-hati dengan perintah `DELETE`. Jika kamu lupa menambahkan `WHERE`, kamu bisa menghapus SELURUH data di tabel tersebut secara tidak sengaja!

            ### 7. Interactive Challenge
            Tuliskan perintah SQL (di bayanganmu) untuk mengambil data "harga" dari tabel "produk" yang stoknya lebih dari 0.

            ### 8. Summary & Next Steps
            SQL sangat sakti tapi sulit ditulis di dalam Python. Selanjutnya, kita akan belajar cara mengendalikan database seolah-olah mereka adalah objek Python biasa: ORM!
          quiz:
            question: Apa singkatan dari operasi CRUD dalam database?
            options:
              - Clear, Read, Update, Delete.
              - Create, Read, Update, Delete.
              - Create, Remove, Under, Data.
              - Change, Read, Upload, Delete.
            correctAnswerIndex: 1
        - id: orm-concept
          title: ORM (Object Relational Mapping)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Menulis kode SQL panjang di tengah-tengah kode Python terasa sangat berantakan dan rawan error. Bagaimana jika kita bisa memperlakukan tabel database seperti Class Python biasa?
            **Analogi:** Seperti "Penerjemah Bahasa". Kamu bicara bahasa Python, dan ORM akan menerjemahkannya menjadi bahasa SQL untuk database secara otomatis.

            ### 2. Learning Objectives
            Kamu akan mampu **mengintegrasikan** database ke dalam aplikasi Python menggunakan teknik ORM (seperti SQLAlchemy).

            ### 3. Prerequisites
            - Memahami OOP (Class & Object) dan SQL.

            ### 4. Core Material
            **ORM** adalah jembatan.
            - Tabel Database -> Menjadi **Class**.
            - Baris Data -> Menjadi **Object**.
            - Kolom Tabel -> Menjadi **Atribut**.

            ### 5. Guided Implementation
            ```python
            # Menggunakan ORM (Konsep)
            # andi = User.query.filter_by(name="Andi").first()
            # andi.umur = 26
            # db.session.commit()
            ```

            ### 6. Pro-Tips
            ORM melindungimu dari serangan **SQL Injection** (hacker yang mencoba merusak databasemu melalui form input) secara otomatis.

            ### 7. Interactive Challenge
            Coba bandingkan: Mana yang lebih mudah dibaca, perintah SQL `INSERT INTO...` atau perintah Python `db.add(user_baru)`?

            ### 8. Summary & Next Steps
            Database sudah beres. Selanjutnya, kita akan belajar cara mengelola perubahan struktur database secara profesional: Migration & Seed!
          codeExample: |-
            # Menggunakan SQLAlchemy (Pseudo-code)
            
            # 1. Mengambil data (SELECT)
            user = session.query(User).filter_by(nama="Andi").first()
            
            # 2. Mengubah data (UPDATE)
            user.umur = 26
            session.commit() # Simpan ke database
          quiz:
            question: Apa keuntungan utama menggunakan ORM dibanding menulis SQL manual?
            options:
              - Membuat aplikasi menjadi lebih berat.
              - Melindungi dari SQL Injection dan membuat kode lebih Pythonic (rapi).
              - Menghapus kebutuhan akan database.
              - Membuat internet menjadi lebih cepat.
            correctAnswerIndex: 1
        - id: migration-seed
          title: Migration & Seed
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bayangkan kamu bekerja dalam tim. Kamu menambah kolom "No HP" di databasemu. Bagaimana cara memastikan teman setimmu mendapatkan perubahan struktur yang sama di komputer mereka?
            **Analogi:** 
            - **Migration:** Seperti "Git" untuk database. Ia mencatat setiap perubahan struktur (tambah kolom, hapus tabel) dalam file sejarah.
            - **Seed:** Seperti "Mengisi Rak Toko". Sebelum toko buka (aplikasi live), kamu harus mengisi barang-barang contoh agar pembeli tidak melihat toko kosong.

            ### 2. Learning Objectives
            Kamu akan mampu **mengelola** perubahan skema database secara terorganisir dan **menyiapkan** data awal (dummy data) untuk keperluan testing.

            ### 3. Prerequisites
            - Memahami ORM.

            ### 4. Core Material
            - **Migration:** Skrip untuk mengubah struktur database secara otomatis.
            - **Seed:** Skrip untuk memasukkan data awal ke dalam tabel.

            ### 5. Guided Implementation
            Biasanya menggunakan alat seperti `Alembic` atau fitur bawaan Django/FastAPI.
            ```bash
            # Perintah umum
            migrate upgrade head
            seed run InitialUsers
            ```

            ### 6. Pro-Tips
            Jangan pernah mengisi data awal (seeding) ke database "Production" (asli) jika datanya hanya data bohong/dummy untuk tes!

            ### 7. Interactive Challenge
            Kenapa kita butuh Seed data? Bayangkan jika kamu login ke aplikasi sosial media tapi tidak ada postingan sama sekali karena databasenya kosong.

            ### 8. Summary & Next Steps
            Hebat! Kamu sudah paham cara mengelola data skala profesional. Selanjutnya, kita akan masuk ke era Python modern: Type Hints & Pydantic!
          quiz:
            question: Apa fungsi utama dari sistem Migration?
            options:
              - Mempercepat performa pencarian database.
              - Mencatat dan menerapkan perubahan struktur database secara terorganisir.
              - Menghapus data yang tidak penting secara otomatis.
              - Mengubah database SQL menjadi NoSQL.
            correctAnswerIndex: 1
    - id: modern-python
      title: 13. Modern Python (Type Hints & Pydantic)
      lessons:
        - id: type-hints
          title: Type Hints (Petunjuk Tipe)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Di proyek besar, kamu sering bingung sebuah variabel isinya apa. Apakah `total` itu angka atau teks? Salah memberikan data bisa menyebabkan program error di saat yang paling tidak tepat.
            **Analogi:** Seperti "Label pada Botol Bumbu". Tanpa label, garam dan gula terlihat sama. *Type Hints* adalah label yang memberi tahu kita (dan editor kode) apa isi botol tersebut.

            ### 2. Learning Objectives
            Kamu akan mampu **mengintegrasikan** petunjuk tipe data ke dalam fungsi dan **meningkatkan** kualitas deteksi kesalahan menggunakan *static analysis*.

            ### 3. Prerequisites
            - Memahami Dasar Fungsi dan Variabel.

            ### 4. Core Material
            **Type Hints** (Python 3.5+) memungkinkan kita mendeklarasikan tipe data yang diharapkan.
            - `nama: str` (Variabel harus string).
            - `-> int` (Fungsi mengembalikan integer).

            ### 5. Guided Implementation
            ```python
            def hitung_diskon(harga: float, persen: int) -> float:
                return harga * (persen / 100)

            hasil: float = hitung_diskon(1000.0, 10)
            print(hasil)
            ```

            ### 6. Pro-Tips
            Python sendiri tidak melarangmu memasukkan tipe yang salah (tetap jalan), tapi editor seperti VS Code akan memberikan garis merah peringatan. Gunakan alat bernama `mypy` untuk pengecekan yang lebih ketat.

            ### 7. Interactive Challenge
            Ubah fungsi `sapa(nama)` agar menggunakan Type Hints untuk parameter `nama` (str) dan nilai baliknya (str).

            ### 8. Summary & Next Steps
            Type Hints dasar sangat membantu. Selanjutnya, kita akan belajar cara menangani struktur yang lebih rumit dengan Modul Typing!
          codeExample: |-
            def jumlahkan(a: int, b: int) -> int:
                return a + b
            
            print(jumlahkan(5, 10))
          quiz:
            question: Apakah Python akan otomatis menghentikan program (crash) jika kita memasukkan data dengan tipe yang berbeda dari Type Hint?
            options:
              - Ya, Python akan error.
              - Tidak, Type Hint hanya bersifat petunjuk dan tidak memaksa di runtime.
              - Tergantung kecepatan internet.
              - Hanya jika menggunakan komputer Apple.
            correctAnswerIndex: 1
        - id: typing-module
          title: Modul Typing
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bagaimana cara memberi tahu bahwa sebuah variabel adalah "List yang isinya hanya Angka" atau "Dictionary yang kuncinya Teks dan nilainya desimal"? Type hints standar tidak cukup detail untuk ini.
            **Analogi:** Seperti "Label Spesifik". Bukan cuma label "Makanan", tapi "Makanan -> Kaleng -> Ikan". Lebih detail, lebih aman.

            ### 2. Learning Objectives
            Kamu akan mampu **mengonstruksi** tipe data kompleks menggunakan modul `typing` seperti `List`, `Dict`, dan `Optional`.

            ### 3. Prerequisites
            - Memahami Type Hints dasar.

            ### 4. Core Material
            Modul `typing` menyediakan koleksi tipe data tingkat lanjut:
            - `List[int]`: List berisi angka.
            - `Dict[str, float]`: Dictionary spesifik.
            - `Optional[str]`: Bisa string, bisa juga `None` (kosong).

            ### 5. Guided Implementation
            ```python
            from typing import List, Dict, Optional

            def proses_skor(nama: str, nilai: List[int]) -> Optional[float]:
                if not nilai:
                    return None
                return sum(nilai) / len(nilai)

            data: Dict[str, List[int]] = {"Andi": [80, 90]}
            ```

            ### 6. Pro-Tips
            Mulai Python 3.9+, kamu tidak perlu lagi mengimpor `List` atau `Dict` dari modul `typing`. Kamu bisa langsung pakai huruf kecil: `list[int]` atau `dict[str, float]`.

            ### 7. Interactive Challenge
            Buatlah variabel `suhu_harian` dengan tipe hint `List[float]` dan isi dengan 3 angka desimal.

            ### 8. Summary & Next Steps
            Sekarang kodemu sangat informatif! Selanjutnya, kita akan belajar cara memvalidasi data secara otomatis di runtime menggunakan Pydantic!
          codeExample: |-
            from typing import List
            
            def rata_rata(angka: List[int]) -> float:
                return sum(angka) / len(angka)
            
            print(rata_rata([10, 20, 30]))
          quiz:
            question: Apa kegunaan dari 'Optional[str]' dalam modul typing?
            options:
              - Mewajibkan data harus berupa string.
              - Memberitahu bahwa data bisa berupa string atau None (kosong).
              - Membuat string menjadi lebih panjang.
              - Menghapus string secara otomatis.
            correctAnswerIndex: 1
        - id: pydantic-intro
          title: Mengenal Pydantic
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Type hints hanya memberi petunjuk, tapi tidak mencegah data sampah masuk ke aplikasimu. Bagaimana jika ada orang mengirim "Teks" ke sistem perbankan yang mengharuskan "Angka"?
            **Analogi:** Seperti "Petugas Keamanan (Satpam)" di pintu masuk. Satpam tidak hanya melihat label namamu, tapi juga memeriksa isi tasmu dan memastikan kamu membawa barang yang benar sebelum diizinkan masuk.

            ### 2. Learning Objectives
            Kamu akan mampu **mengimplementasikan** validasi data otomatis menggunakan model Pydantic.

            ### 3. Prerequisites
            - Memahami Class (OOP) dan Type Hints.

            ### 4. Core Material
            **Pydantic** adalah library validasi data paling populer. Ia memastikan data yang masuk sesuai dengan tipe yang dideklarasikan. Jika salah, ia akan melempar error secara otomatis.

            ### 5. Guided Implementation
            ```python
            from pydantic import BaseModel

            class User(BaseModel):
                id: int
                username: str
                is_active: bool = True

            # Data dari luar (misal API)
            external_data = {"id": "123", "username": "andi_pro"}
            
            user = User(**external_data)
            print(user.id) # '123' string otomatis diubah jadi int 123!
            ```

            ### 6. Pro-Tips
            Pydantic melakukan *Data Parsing*, bukan cuma validasi. Ia mencoba mengubah data yang mirip (seperti string "123") menjadi tipe yang benar (integer 123) secara otomatis.

            ### 7. Interactive Challenge
            Buatlah model `Produk` dengan atribut `nama` (str) dan `harga` (int). Coba masukkan data dengan harga berupa string `"5000"` dan lihat apa yang terjadi.

            ### 8. Summary & Next Steps
            Pydantic adalah standar emas untuk aplikasi modern (seperti FastAPI). Selanjutnya, kita akan belajar fitur validasi tingkat lanjutnya!
          codeExample: |-
            from pydantic import BaseModel
            
            class Mahasiswa(BaseModel):
                nama: str
                umur: int
            
            m = Mahasiswa(nama="Budi", umur="20")
            print(m)
          quiz:
            question: Apa yang dilakukan Pydantic jika ia menerima data string '10' untuk field yang bertipe 'int'?
            options:
              - Program langsung mati (crash).
              - Ia akan mencoba mengubah (parse) string tersebut menjadi angka 10 secara otomatis.
              - Ia akan menghapus data tersebut.
              - Ia akan mengirim pesan spam.
            correctAnswerIndex: 1
        - id: pydantic-validation
          title: Validasi Otomatis
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Kadang tipe data saja tidak cukup. Umur haruslah angka positif, dan harga tidak boleh Rp 0. Bagaimana cara mengecek batasan-batasan ini tanpa menulis ribuan `if-else`?
            **Analogi:** Seperti "Alat Ukur Tinggi Badan" di wahana permainan. Kamu bukan cuma harus manusia (tipe data), tapi tinggimu juga harus minimal 120cm (validasi batasan).

            ### 2. Learning Objectives
            Kamu akan mampu **menerapkan** batasan nilai (constraints) pada data menggunakan fitur `Field` di Pydantic.

            ### 3. Prerequisites
            - Mengenal dasar Pydantic.

            ### 4. Core Material
            Pydantic memiliki fitur `Field` untuk memberikan batasan tambahan:
            - `gt` (Greater Than / Lebih besar dari)
            - `le` (Less than or equal / Kurang dari sama dengan)
            - `min_length` (Panjang karakter minimal)

            ### 5. Guided Implementation
            ```python
            from pydantic import BaseModel, Field

            class Produk(BaseModel):
                nama: str = Field(min_length=3)
                harga: float = Field(gt=0)
                stok: int = Field(ge=0, le=100)

            p = Produk(nama="HP", harga=5000, stok=10) # Berhasil!
            ```

            ### 6. Pro-Tips
            Gunakan validasi ini untuk menjaga integritas database. Lebih baik error di depan (Pydantic) daripada data sampah masuk ke database dan merusak sistem di kemudian hari.

            ### 7. Interactive Challenge
            Tambahkan batasan pada model `Mahasiswa` agar `umur` minimal 17 tahun dan maksimal 60 tahun.

            ### 8. Summary & Next Steps
            Selamat! Kamu sekarang adalah Developer Python Modern. Selanjutnya, kita akan membahas filosofi penting agar kodemu tetap rapi dan profesional: Best Practices!
          codeExample: |-
            from pydantic import BaseModel, Field
            
            class Akun(BaseModel):
                pin: str = Field(min_length=6, max_length=6)
            
            # Coba pin yang kurang dari 6 digit akan memicu ValidationError
            print("Pydantic menjaga kualitas data aplikasi Anda.")
          quiz:
            question: Argumen apa dalam Field() yang digunakan untuk memastikan sebuah angka 'Lebih Besar dari Nol'?
            options:
              - zero=False
              - gt=0
              - check=positive
              - size='big'
            correctAnswerIndex: 1
    - id: best-practices
      title: 14. Best Practices & Design Principles
      lessons:
        - id: kiss-dry-yagni
          title: KISS, DRY, & YAGNI
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Banyak programmer pemula terjebak membuat kode yang sangat rumit atau menyalin kode yang sama berulang kali. Ini membuat aplikasi sulit diperbaiki dan rawan bug.
            **Analogi:** Seperti "Membawa Tas". Jika kamu hanya pergi ke warung depan rumah, jangan bawa koper raksasa (YAGNI). Jika kamu punya banyak kunci, taruh di gantungan kunci agar tidak tercecer (DRY).

            ### 2. Learning Objectives
            Kamu akan mampu **mengevaluasi** kualitas kode berdasarkan prinsip KISS, DRY, dan YAGNI serta **merancang** solusi yang efisien.

            ### 3. Prerequisites
            - Memahami Dasar Pemrograman (Variabel, Fungsi, Loop).

            ### 4. Core Material
            1. **KISS (Keep It Simple, Stupid):** Pilih solusi paling sederhana. Jangan pakai AI jika cukup pakai `if-else`.
            2. **DRY (Don't Repeat Yourself):** Jangan ada kode kembar. Pindahkan ke fungsi.
            3. **YAGNI (You Ain't Gonna Need It):** Jangan tulis fitur yang "mungkin" berguna nanti. Tulis yang dibutuhkan sekarang saja.

            ### 5. Guided Implementation
            **Contoh DRY:**
            ```python
            # Buruk (Duplikasi)
            print("Halo Andi")
            print("Halo Budi")

            # Baik (DRY)
            def sapa(nama):
                print(f"Halo {nama}")
            
            for n in ["Andi", "Budi"]: sapa(n)
            ```

            ### 6. Pro-Tips
            Prinsip ini bukan cuma soal teknis, tapi soal menghemat waktu dan uang. Kode yang simpel lebih murah perawatannya!

            ### 7. Interactive Challenge
            Coba periksa kodemu sebelumnya. Apakah ada logika yang kamu tulis berulang kali? Jika ada, satukan dalam sebuah fungsi!

            ### 8. Summary & Next Steps
            Filosofi dasar sudah mantap. Selanjutnya, kita akan belajar prinsip arsitektur yang digunakan perusahaan teknologi dunia: SOLID!
          codeExample: |-
            # Terapkan prinsip KISS
            def cek_lulus(nilai):
                return nilai >= 60 # Sederhana dan langsung pada intinya
            
            print(cek_lulus(75))
          quiz:
            question: Apa yang dimaksud dengan prinsip DRY dalam pemrograman?
            options:
              - Do Repeat Yourself
              - Don't Repeat Yourself
              - Data Retrieval Yield
              - Digital Resource Yearly
            correctAnswerIndex: 1
        - id: solid-principles
          title: SOLID Principles
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Mengapa aplikasi besar seringkali "rusak di bagian A saat kita memperbaiki bagian B"? Itu karena komponen kodenya saling terikat terlalu erat dan tidak teratur.
            **Analogi:** Seperti "Alat Musik Orkestra". Setiap pemain musik punya tanggung jawab masing-masing. Pemain biola tidak perlu tahu cara kerja terompet untuk bisa bermain dengan bagus.

            ### 2. Learning Objectives
            Kamu akan mampu **menguraikan** lima prinsip SOLID dan **mengidentifikasi** pelanggaran prinsip tersebut dalam desain Class.

            ### 3. Prerequisites
            - Memahami OOP (Class, Inheritance).

            ### 4. Core Material
            **SOLID** adalah standar desain OOP:
            - **S**: Single Responsibility (Satu kelas, satu tugas).
            - **O**: Open/Closed (Buka untuk fitur baru, tutup untuk ubah kode asli).
            - **L**: Liskov Substitution (Anak harus bisa menggantikan Induk).
            - **I**: Interface Segregation (Jangan paksa fitur yang tak perlu).
            - **D**: Dependency Inversion (Tergantung konsep, bukan detail).

            ### 5. Guided Implementation
            **Single Responsibility (S):**
            ```python
            # Buruk: Satu kelas urus Database DAN kirim Email
            # Baik: Buat kelas Database tersendiri, kelas Email tersendiri.
            ```

            ### 6. Pro-Tips
            Gunakan SOLID jika proyekmu dikerjakan oleh banyak orang (tim) agar antar developer tidak saling "bertabrakan" saat mengubah kode.

            ### 7. Interactive Challenge
            Bayangkan sebuah class `Laporan`. Sebutkan 2 tanggung jawab berbeda yang sebaiknya dipisah ke class lain!

            ### 8. Summary & Next Steps
            Arsitekturmu sekarang sudah kokoh. Selanjutnya, kita akan belajar cara memastikan fitur tidak rusak saat diupdate: TDD!
          codeExample: |-
            # Contoh Single Responsibility
            class Logger:
                def log(self, message): print(message)

            class Calculator:
                def add(self, a, b): return a + b
            print("SOLID membantu kode tetap modular dan mudah diuji.")
          quiz:
            question: Prinsip mana dalam SOLID yang mengharuskan satu kelas hanya memiliki satu tanggung jawab saja?
            options:
              - Single Responsibility
              - Open/Closed
              - Liskov Substitution
              - Dependency Inversion
            correctAnswerIndex: 0
        - id: tdd-concept
          title: TDD (Test Driven Development)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Takut merilis aplikasi karena tidak yakin kodenya benar-benar jalan? Menunggu user lapor bug baru diperbaiki adalah cara yang lambat dan berbahaya.
            **Analogi:** Seperti "Membangun Gedung dengan Arsitek". Kamu membuat denah (test) terlebih dahulu, baru kemudian membangun temboknya. Jika tembok tidak sesuai denah, kamu langsung tahu.

            ### 2. Learning Objectives
            Kamu akan mampu **mengimplementasikan** alur kerja Red-Green-Refactor dalam pengembangan fitur baru.

            ### 3. Prerequisites
            - Memahami Dasar Fungsi.

            ### 4. Core Material
            **TDD** adalah metodologi menulis tes SEBELUM menulis kode asli.
            1. **Red**: Tulis tes yang gagal.
            2. **Green**: Tulis kode agar tes berhasil.
            3. **Refactor**: Bersihkan kode.

            ### 5. Guided Implementation
            Siklus:
            1. Buat file `test_math.py`.
            2. Jalankan `pytest`. (Gagal karena fitur belum ada).
            3. Tulis fungsi `tambah(a, b)`.
            4. Jalankan `pytest` lagi. (Berhasil!).

            ### 6. Pro-Tips
            TDD mungkin terasa lambat di awal, tapi ia akan menyelamatkanmu dari "Bug Misterius" yang muncul di malam minggu saat kamu ingin istirahat!

            ### 7. Interactive Challenge
            Bayangkan kamu ingin membuat fitur "Diskon 10%". Tuliskan urutan langkah TDD yang akan kamu lakukan.

            ### 8. Summary & Next Steps
            TDD menjamin kualitas kodemu. Selanjutnya, kita akan belajar standar kecantikan kode di dunia Python: PEP 8!
          codeExample: |-
            # Konsep TDD
            def test_diskon():
                assert hitung_diskon(100) == 90 # Ini akan gagal jika fungsi belum ada
            print("TDD: Tulis tes dulu, baru kodenya.")
          quiz:
            question: Apa tahap pertama dalam siklus TDD?
            options:
              - Green (Menulis kode yang sukses)
              - Refactor (Merapikan kode)
              - Red (Menulis tes yang gagal)
              - Deploy (Mengirim ke server)
            correctAnswerIndex: 2
        - id: clean-code-python
          title: Clean Code di Python (PEP 8)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** "Saya bisa baca kode saya hari ini, tapi besok bahkan Tuhan pun tidak tahu ini kode apa." - Pengakuan programmer tanpa *Clean Code*. Kode yang berantakan adalah utang (Technical Debt).
            **Analogi:** Seperti "Menulis Buku". Jika spasi berantakan dan huruf kapital ngawur, pembaca akan pusing. PEP 8 adalah panduan tata bahasa untuk Python.

            ### 2. Learning Objectives
            Kamu akan mampu **menerapkan** standar penulisan PEP 8 untuk menghasilkan kode yang elegan dan profesional.

            ### 3. Prerequisites
            - Sudah bisa menulis kode Python dasar.

            ### 4. Core Material
            **PEP 8** adalah kitab suci gaya penulisan Python:
            - **Indentasi**: 4 spasi (BUKAN Tab).
            - **Nama Fungsi/Variabel**: `snake_case`.
            - **Nama Class**: `PascalCase`.
            - **Spasi**: `a = b + c` (Gunakan spasi di sekitar operator).

            ### 5. Guided Implementation
            ```python
            # Buruk
            def HitungLuas(P,L):return P*L

            # Baik (PEP 8)
            def hitung_luas(panjang, lebar):
                return panjang * lebar
            ```

            ### 6. Pro-Tips
            Gunakan alat otomatis seperti **Prettier** atau **Black** di VS Code. Kamu cukup simpan file, dan kodemu akan otomatis dirapikan sesuai PEP 8!

            ### 7. Interactive Challenge
            Ubah variabel `NamaLengkap = "Andi"` menjadi format yang sesuai dengan standar PEP 8.

            ### 8. Summary & Next Steps
            Selamat! Kodemu sekarang sudah "Pythonic". Selanjutnya, kita akan belajar cara menguji kodemu secara otomatis dengan Pytest!
          codeExample: |-
            # Contoh Clean Code
            item_price = 1000
            tax_rate = 0.1
            total = item_price + (item_price * tax_rate)
            print(total)
          quiz:
            question: Apa standar penamaan fungsi yang disarankan oleh PEP 8?
            options:
              - camelCase
              - PascalCase
              - snake_case
              - UPPERCASE
            correctAnswerIndex: 2
    - id: software-testing
      title: 15. Software Testing & Pytest
      lessons:
        - id: testing-intro
          title: Kenapa Harus Testing?
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Pernahkah kamu mengubah satu baris kode, lalu tiba-tiba fitur lain yang tadinya jalan jadi rusak? Tanpa pengujian otomatis, kamu harus mengecek seluruh aplikasi secara manual setiap kali ada perubahan. Melelahkan dan berisiko!
            **Analogi:** Seperti "Pemeriksaan Kesehatan Rutin". Kamu tidak menunggu sakit parah baru ke dokter. Kamu tes darah secara rutin (test) untuk memastikan semua organ (fitur) berfungsi normal.

            ### 2. Learning Objectives
            Kamu akan mampu **menguraikan** pentingnya automated testing dan **mengidentifikasi** berbagai keuntungan dari mencegah regresi kode.

            ### 3. Prerequisites
            - Memahami konsep TDD dan Dasar Python.

            ### 4. Core Material
            **Software Testing** adalah proses menjalankan program dengan tujuan menemukan kesalahan.
            - **Manual Testing**: Dicoba sendiri oleh manusia.
            - **Automated Testing**: Kode yang menguji kode lain secara otomatis.

            ### 5. Guided Implementation
            ```python
            # Konsep dasar Assert (Pernyataan Kebenaran)
            hasil = 10 + 5
            assert hasil == 15 # Jika benar, tidak terjadi apa-apa. Jika salah, muncul AssertionError.
            ```

            ### 6. Pro-Tips
            Tes yang baik adalah tes yang **cepat** dan **independen** (tidak bergantung pada hasil tes lain atau koneksi internet).

            ### 7. Interactive Challenge
            Bayangkan fungsi `bagi(a, b)`. Tuliskan 3 skenario tes yang harus dilakukan (misal: bagi dengan angka positif, bagi dengan nol, dll).

            ### 8. Summary & Next Steps
            Sekarang kamu tahu "Mengapa" harus testing. Selanjutnya, kita akan belajar "Level" apa saja yang ada dalam dunia pengujian software!
          codeExample: |-
            def test_simple():
                assert 1 + 1 == 2
            print("Testing memastikan kode Anda bekerja sesuai spesifikasi.")
          quiz:
            question: Apa manfaat utama dari 'Automated Testing' dibandingkan 'Manual Testing'?
            options:
              - Automated testing lebih lambat.
              - Automated testing bisa dijalankan berulang kali dengan cepat tanpa kelelahan manusia.
              - Manual testing tidak memerlukan komputer.
              - Automated testing hanya untuk aplikasi game.
            correctAnswerIndex: 1
        - id: testing-levels
          title: Level Testing (Unit, Integration, E2E)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Menguji satu sekrup (Unit) tidak menjamin mesin mobil bisa menyala (Integration), dan mesin menyala tidak menjamin mobil bisa dikemudikan dengan nyaman di jalan (E2E). Kita butuh strategi pengujian di berbagai level.
            **Analogi:** Seperti membangun rumah. Kamu tes kualitas batu batanya (Unit), tes apakah semen menempel di bata (Integration), lalu tes apakah rumah layak huni (E2E).

            ### 2. Learning Objectives
            Kamu akan mampu **membedakan** cakupan antara Unit Test, Integration Test, dan End-to-End Test.

            ### 3. Prerequisites
            - Memahami Dasar Testing.

            ### 4. Core Material
            1. **Unit Test**: Tes fungsi/komponen terkecil.
            2. **Integration Test**: Tes bagaimana dua atau lebih komponen bekerja sama.
            3. **E2E (End-to-End)**: Tes seluruh alur dari mata pengguna (misal: login -> beli barang -> logout).

            ### 5. Guided Implementation
            - **Unit**: Tes `hitung_pajak()`.
            - **Integration**: Tes `simpan_user_ke_database()`.
            - **E2E**: Tes "Proses Checkout Barang".

            ### 6. Pro-Tips
            Ikuti prinsip **Testing Pyramid**: Perbanyak Unit Test (murah & cepat), kurangi E2E Test (mahal & lambat).

            ### 7. Interactive Challenge
            Jika kamu membuat aplikasi Instagram, berikan satu contoh apa yang dites di level Unit dan apa yang dites di level E2E.

            ### 8. Summary & Next Steps
            Level sudah paham. Selanjutnya, kita akan mengenal terminologi penting lainnya: Smoke, Regression, dan Validation Test!
          codeExample: |-
            print("Unit Test: Fokus pada fungsi tunggal.")
            print("Integration Test: Fokus pada kerjasama antar modul.")
            print("E2E Test: Fokus pada pengalaman pengguna akhir.")
          quiz:
            question: Level testing mana yang paling mahal dan paling lambat dijalankan?
            options:
              - Unit Test
              - Integration Test
              - End-to-End (E2E) Test
              - Stress Test
            correctAnswerIndex: 2
        - id: specialized-testing
          title: Smoke, Regression, & Validation
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Setelah memperbaiki bug "Salah Ketik" di halaman profil, tiba-tiba tombol "Posting" jadi tidak bisa diklik. Bagaimana cara memastikan perubahan kecil tidak merusak segalanya?
            **Analogi:** 
            - **Smoke Test:** Seperti menyalakan mesin motor di pagi hari. Jika tidak ada asap aneh, motor siap jalan.
            - **Regression Test:** Seperti mengecek semua lampu setelah kamu mengganti aki motor.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **mengategorikan** strategi testing berdasarkan tujuan khususnya dalam siklus rilis software.

            ### 3. Prerequisites
            - Memahami Level Testing.

            ### 4. Core Material
            - **Smoke Test**: Tes fitur paling kritis secara cepat (misal: login).
            - **Regression Test**: Memastikan fitur lama tidak rusak karena update baru.
            - **Validation Test**: Memastikan produk sudah sesuai dengan permintaan user (bisnis).

            ### 5. Guided Implementation
            Skenario Regression:
            1. Ada bug di Fitur A.
            2. Bug diperbaiki.
            3. Jalankan tes Fitur A, B, C, dan D untuk memastikan semuanya masih aman.

            ### 6. Pro-Tips
            Lakukan Smoke Test sesaat setelah aplikasi dipasang (deploy) ke server untuk memastikan tidak ada kesalahan konfigurasi dasar.

            ### 7. Interactive Challenge
            Kenapa kita butuh Regression Test setiap kali ada perubahan kode sekecil apapun?

            ### 8. Summary & Next Steps
            Strategi sudah siap. Sekarang saatnya kita praktek menggunakan alat paling populer di dunia Python: Pytest!
          codeExample: |-
            print("Regression Test menjamin stabilitas aplikasi dalam jangka panjang.")
          quiz:
            question: Apa tujuan utama dari 'Regression Testing'?
            options:
              - Menghapus kode yang tidak terpakai.
              - Memastikan fitur yang sudah ada tidak rusak setelah ada perubahan kode baru.
              - Menguji kecepatan internet.
              - Membuat desain UI menjadi lebih bagus.
            correctAnswerIndex: 1
        - id: pytest-intro
          title: Mengenal Pytest
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Library bawaan Python (`unittest`) terkadang terlalu kaku dan sulit ditulis. Kita butuh alat yang membuat penulisan tes semudah menulis kode Python biasa.
            **Analogi:** Seperti "Asisten Pribadi". Kamu cukup bilang "Tolong cek apakah A sama dengan B", dan Pytest akan mengurus laporannya untukmu.

            ### 2. Learning Objectives
            Kamu akan mampu **mengonstruksi** file tes menggunakan framework Pytest dan **menjalankan** pengujian secara massal melalui terminal.

            ### 3. Prerequisites
            - Memahami Dasar Python dan PIP.

            ### 4. Core Material
            **Pytest** adalah framework testing favorit komunitas Python.
            - Nama file harus `test_*.py`.
            - Cukup gunakan kata kunci `assert`.

            ### 5. Guided Implementation
            1. Instal: `pip install pytest`
            2. Buat file `test_logic.py`:
            ```python
            def tambah(a, b): return a + b

            def test_tambah():
                assert tambah(2, 3) == 5
            ```
            3. Jalankan di terminal: `pytest`

            ### 6. Pro-Tips
            Pytest akan otomatis mencari semua file yang diawali `test_` di folder proyekmu. Jadi, kamu tidak perlu memanggil file satu per satu.

            ### 7. Interactive Challenge
            Coba tulis satu fungsi tes untuk mengecek apakah `len("Python")` sama dengan 6.

            ### 8. Summary & Next Steps
            Pytest sangat sakti! Selanjutnya, kita akan membedah fitur-fitur canggihnya untuk menghemat waktu penulisan tes!
          codeExample: |-
            # Jalankan ini dengan perintah 'pytest' di terminal Anda
            def test_check():
                assert "py" in "python"
          quiz:
            question: Bagaimana standar penamaan file agar otomatis dideteksi oleh Pytest?
            options:
              - file_tes.py
              - test_*.py
              - mytest.txt
              - check_logic.doc
            correctAnswerIndex: 1
        - id: pytest-advanced
          title: Fitur Canggih Pytest
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bagaimana jika kamu ingin menguji sebuah fungsi dengan 100 variasi data yang berbeda? Menulis 100 fungsi tes sangatlah konyol. Kita butuh cara yang lebih pintar.
            **Analogi:** Seperti "Mesin Cetak Otomatis". Kamu masukkan satu pola (template tes), lalu masukkan daftar bahan (data), dan mesin akan mencetak hasilnya untukmu.

            ### 2. Learning Objectives
            Kamu akan mampu **menggunakan** `fixtures` untuk manajemen state dan **menerapkan** `parametrize` untuk pengujian data massal.

            ### 3. Prerequisites
            - Memahami Dasar Pytest.

            ### 4. Core Material
            1. **Fixtures**: Menyiapkan data awal (seperti koneksi database) yang bisa dipakai banyak fungsi tes.
            2. **Parametrize**: Menjalankan satu fungsi tes dengan banyak input berbeda.

            ### 5. Guided Implementation
            ```python
            import pytest

            @pytest.mark.parametrize("input, output", [(2, 4), (3, 9), (4, 16)])
            def test_kuadrat(input, output):
                assert input * input == output
            ```

            ### 6. Pro-Tips
            Gunakan Fixture dengan cakupan (*scope*) `session` jika kamu butuh menyiapkan data yang sangat berat (seperti startup server) hanya satu kali untuk seluruh rangkaian tes.

            ### 7. Interactive Challenge
            Buatlah sebuah fixture `data_user` yang mengembalikan dictionary `{"id": 1, "name": "Budi"}`.

            ### 8. Summary & Next Steps
            Kodemu sekarang aman dan teruji. Selanjutnya, kita akan belajar cara mencari bagian kode yang paling lambat dan memperbaikinya: Profiling!
          codeExample: |-
            import pytest
            # Contoh Parametrize sederhana
            @pytest.mark.parametrize("n", [1, 2, 3])
            def test_is_positive(n):
                assert n > 0
          quiz:
            question: Fitur Pytest mana yang digunakan untuk menjalankan satu fungsi tes dengan banyak variasi data input sekaligus?
            options:
              - Fixtures
              - Markers
              - Parametrize
              - Assertion
            correctAnswerIndex: 2
    - id: profiling-optimization
      title: 16. Profiling & Optimasi Kode
      lessons:
        - id: profiling-intro
          title: Apa itu Profiling?
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Aplikasi kamu terasa sangat lambat saat memproses data. Apakah kamu akan menebak-nebak baris mana yang lambat dan mengubahnya sembarangan? Itu seperti mencoba memperbaiki mesin mobil dengan mata tertutup.
            **Analogi:** Seperti "Laporan Keuangan". Kamu ingin tahu pengeluaran terbesarmu ada di mana agar bisa berhemat. Profiling adalah laporan pengeluaran waktu/memori aplikasimu.

            ### 2. Learning Objectives
            Kamu akan mampu **menganalisis** bottleneck (hambatan) performa menggunakan alat profiler standar di Python.

            ### 3. Prerequisites
            - Memahami Dasar Python dan Ekosistem.

            ### 4. Core Material
            **Profiling** adalah teknik mengukur waktu eksekusi setiap baris kode atau fungsi.
            - **cProfile**: Profiler bawaan Python yang sangat detail.
            - **Bottleneck**: Bagian kode yang paling menghambat kecepatan aplikasi.

            ### 5. Guided Implementation
            ```python
            import cProfile

            def fungsi_lambat():
                total = 0
                for i in range(1000000):
                    total += i
                return total

            cProfile.run('fungsi_lambat()')
            ```

            ### 6. Pro-Tips
            Selalu profil kodemu **sebelum** melakukan optimasi. Seringkali, bagian yang kamu kira lambat ternyata bukan penyebab utamanya.

            ### 7. Interactive Challenge
            Coba jalankan `cProfile` pada salah satu fungsi yang pernah kamu buat dan perhatikan kolom `tottime` (waktu total).

            ### 8. Summary & Next Steps
            Titik lambat sudah ketemu. Selanjutnya, kita akan belajar teknik-teknik untuk membuat kodemu berlari secepat kilat!
          codeExample: |-
            import cProfile
            def my_code():
                sum([i for i in range(10000)])
            cProfile.run('my_code()')
          quiz:
            question: Apa istilah untuk bagian kode yang menjadi penyebab utama kelambatan sebuah aplikasi?
            options:
              - Bug
              - Bottleneck
              - Deadlock
              - Exception
            correctAnswerIndex: 1
        - id: optimization-tips
          title: Tips Optimasi Kode
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Menambah RAM komputer bukan solusi utama untuk kode yang buruk. Kamu butuh cara agar kodemu bekerja lebih cerdas, bukan lebih keras.
            **Analogi:** Seperti "Membawa Barang". Daripada bolak-balik bawa satu ember air 100 kali (loop), lebih baik gunakan satu tangki raksasa dan alirkan sekaligus (vectorization).

            ### 2. Learning Objectives
            Kamu akan mampu **menerapkan** teknik caching dan algoritma efisien untuk meningkatkan performa aplikasi.

            ### 3. Prerequisites
            - Memahami Dasar Profiling.

            ### 4. Core Material
            Teknik Optimasi:
            1. **Caching**: Simpan hasil hitungan lama agar tidak dihitung ulang.
            2. **Vectorization**: Pakai library seperti NumPy untuk operasi massal.
            3. **Data Structures**: Pilih tipe data yang tepat (Set lebih cepat dari List untuk pencarian).

            ### 5. Guided Implementation
            ```python
            from functools import lru_cache

            @lru_cache(maxsize=128)
            def hitung_berat(n):
                # Hasil akan disimpan di memori
                return n * n * n
            ```

            ### 6. Pro-Tips
            Gunakan **List Comprehension** daripada loop `for` biasa dengan `.append()`. List comprehension berjalan di level C-Python dan biasanya jauh lebih cepat.

            ### 7. Interactive Challenge
            Bandingkan kecepatan mencari angka dalam `List` berisi 1 juta angka vs dalam `Set` berisi 1 juta angka. Mana yang lebih instan?

            ### 8. Summary & Next Steps
            Kodemu sekarang sangat kencang! Namun hati-hati, jangan sampai kamu terjebak dalam "Obsesi Kecepatan" yang tidak perlu. Yuk bahas bahayanya!
          codeExample: |-
            from functools import lru_cache
            @lru_cache(maxsize=None)
            def fast_function(x):
                return x + 1
            print(fast_function(10))
          quiz:
            question: Teknik apa yang digunakan untuk menyimpan hasil eksekusi fungsi agar tidak perlu dihitung ulang di masa depan?
            options:
              - Profiling
              - Caching (Lru_cache)
              - Debugging
              - Logging
            correctAnswerIndex: 1
        - id: premature-optimization
          title: Bahaya Premature Optimization
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** "Programmer menghabiskan terlalu banyak waktu untuk memikirkan atau mencemaskan efisiensi bagian kode yang sebenarnya tidak berpengaruh." - Donald Knuth.
            **Analogi:** Seperti "Mengecat Velg Mobil" saat mesin mobilnya sendiri belum bisa menyala. Kamu membuang waktu untuk detil kecil yang tidak penting.

            ### 2. Learning Objectives
            Kamu akan mampu **menyeimbangkan** antara keterbacaan kode (readability) dan performa teknis.

            ### 3. Prerequisites
            - Memahami Tips Optimasi.

            ### 4. Core Material
            **Premature Optimization** adalah mencoba mengoptimasi kode sebelum kamu membuktikan bahwa kode itu benar-benar lambat (melalui profiling).
            - **Akibat**: Kode jadi sangat rumit, sulit dibaca, dan sulit diperbaiki.

            ### 5. Guided Implementation
            Prioritas Kerja:
            1. **Make it Work** (Buat sampai jalan).
            2. **Make it Right** (Buat sampai bersih/benar).
            3. **Make it Fast** (Baru optimasi jika lambat).

            ### 6. Pro-Tips
            Ingat pepatah: *"Code is read more often than it is written"*. Jangan korbankan kejelasan kode hanya untuk menghemat 0.0001 detik waktu prosesor.

            ### 7. Interactive Challenge
            Sebutkan satu situasi di mana kamu lebih memilih kode yang mudah dibaca daripada kode yang super cepat tapi membingungkan.

            ### 8. Summary & Next Steps
            Selamat! Kamu sudah menyelesaikan seluruh kurikulum Dasar Python Profesional. Selanjutnya, kita akan melompat ke spesialisasi yang paling dicari saat ini: Data Engineer!
          codeExample: |-
            # Contoh prioritas: Lebih baik terbaca
            def hitung_total(items):
                return sum(items) # Jelas dan sudah cukup cepat
            print(hitung_total([1, 2, 3]))
          quiz:
            question: Apa bahaya utama dari melakukan optimasi terlalu dini (Premature Optimization)?
            options:
              - Komputer meledak.
              - Kode menjadi terlalu sederhana.
              - Kode menjadi sangat rumit dan sulit dipelihara (unmaintainable).
              - Program menjadi terlalu cepat bagi user.
            correctAnswerIndex: 2
- id: data-engineer
  title: Data Engineer
  description: Pengolahan data, matematika, dan pipeline data.
  modules:
    - id: ai-math-data
      title: 17. Data Science & Math (NumPy, Pandas)
      lessons:
        - id: numpy-basics
          title: 'NumPy: Komputasi Numerik'
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Ingin menghitung rata-rata dari 10 juta data? Menggunakan loop `for` biasa di Python akan memakan waktu sangat lama. Komputer butuh cara mengolah angka secara massal (Vektor).
            **Analogi:** Seperti "Memanen Padi". Daripada memotong satu per satu batang padi (loop), kamu menggunakan mesin pemanen raksasa yang langsung mengambil seluruh baris padi dalam sekali jalan (Vectorization).

            ### 2. Learning Objectives
            Kamu akan mampu **mengonstruksi** array NumPy multidimensi dan **mengintegrasikan** operasi vektor untuk komputasi cepat.

            ### 3. Prerequisites
            - Memahami List dan Tipe Data Angka.

            ### 4. Core Material
            **NumPy** adalah library dasar untuk AI.
            - **ndarray**: Objek array yang sangat cepat.
            - **Broadcasting**: Kemampuan melakukan operasi ke seluruh elemen array tanpa loop.

            ### 5. Guided Implementation
            ```python
            import numpy as np

            # Membuat array
            arr = np.array([1, 2, 3, 4, 5])
            
            # Operasi Vektor (Sangat Cepat!)
            hasil = arr * 2
            print(hasil) # [2, 4, 6, 8, 10]
            ```

            ### 6. Pro-Tips
            Array NumPy harus memiliki tipe data yang sama (misal: semua harus angka). Ini yang membuatnya jauh lebih cepat dibanding List Python biasa yang bisa campur-campur.

            ### 7. Interactive Challenge
            Buatlah array 2D (Matriks) ukuran 3x3 berisi angka 1 sampai 9, lalu kalikan seluruh isinya dengan 10.

            ### 8. Summary & Next Steps
            NumPy adalah mesin hitungnya. Selanjutnya, kita akan belajar cara menata data tersebut menjadi tabel yang rapi dengan Pandas!
          codeExample: |-
            import numpy as np
            a = np.array([10, 20, 30])
            print(f"Rata-rata: {np.mean(a)}")
          quiz:
            question: Apa keunggulan utama NumPy Array dibandingkan List Python biasa dalam hal pengolahan data besar?
            options:
              - NumPy bisa menyimpan gambar secara otomatis.
              - NumPy lebih lambat tapi lebih akurat.
              - NumPy menggunakan operasi vektor yang jauh lebih cepat dan hemat memori.
              - NumPy tidak membutuhkan memori RAM.
            correctAnswerIndex: 2
        - id: pandas-basics
          title: 'Pandas: Analisis Data Dasar'
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Data mentah biasanya berantakan, ada di file Excel, dan punya banyak kolom. Bagaimana cara memfilter data pelanggan yang berumur di atas 25 tahun dari 1 juta baris data dengan cepat?
            **Analogi:** Seperti "Excel on Steroids". Pandas memberikanmu tabel (DataFrame) yang bisa kamu manipulasi dengan kode, jauh lebih sakti dan otomatis daripada klik-klik di Excel.

            ### 2. Learning Objectives
            Kamu akan mampu **mengelola** dataset tabular menggunakan DataFrame dan **menyimpulkan** wawasan dasar melalui teknik filtering dan grouping.

            ### 3. Prerequisites
            - Memahami Dasar Dictionary dan NumPy.

            ### 4. Core Material
            - **DataFrame**: Tabel baris dan kolom.
            - **Series**: Satu kolom dalam tabel.
            - **IO**: Membaca file CSV, Excel, SQL.

            ### 5. Guided Implementation
            ```python
            import pandas as pd

            data = {
                "Nama": ["Andi", "Budi", "Siti"],
                "Umur": [25, 30, 22]
            }
            df = pd.DataFrame(data)

            # Filter data
            muda = df[df["Umur"] < 25]
            print(muda)
            ```

            ### 6. Pro-Tips
            Gunakan `.head()` untuk melihat 5 baris pertama data jika datasetmu sangat besar, agar terminalmu tidak penuh sesak.

            ### 7. Interactive Challenge
            Coba buat DataFrame berisi daftar 3 menu makanan dan harganya, lalu hitung rata-rata harganya menggunakan `.mean()`.

            ### 8. Summary & Next Steps
            Data sekarang sudah rapi di tabel. Selanjutnya, kita akan belajar cara bercerita melalui angka dengan Visualisasi Data!
          codeExample: |-
            import pandas as pd
            df = pd.DataFrame({"skor": [80, 90, 85]})
            print(f"Statistik Deskriptif:\n{df.describe()}")
          quiz:
            question: Struktur data utama dalam Pandas yang berbentuk tabel (baris dan kolom) disebut?
            options:
              - List
              - Dictionary
              - DataFrame
              - Array
            correctAnswerIndex: 2
    - id: data-visualization
      title: 18. Data Visualization & Matplotlib
      lessons:
        - id: viz-intro
          title: Kenapa Visualisasi Data?
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Manusia sangat sulit memahami tren jika hanya melihat tabel berisi jutaan baris angka. Kita butuh cara untuk "melihat" pola tersebut dalam sekejap mata.
            **Analogi:** Seperti "Peta vs Daftar Alamat". Kamu akan lebih cepat sampai tujuan jika melihat peta daripada membaca daftar ribuan alamat tertulis.

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** manfaat visualisasi data untuk pengambilan keputusan dan **mengidentifikasi** anomali data melalui grafik.

            ### 3. Prerequisites
            - Memahami dasar analisis data (Pandas).

            ### 4. Core Material
            **Visualisasi Data** adalah proses komunikasi informasi secara visual.
            - **Pattern Recognition**: Menemukan tren naik/turun.
            - **Anomaly Detection**: Menemukan data "aneh" yang keluar dari jalur.

            ### 5. Guided Implementation
            Tanpa visualisasi: `[10, 12, 15, 100, 14]`
            Dengan visualisasi: Kita akan melihat satu titik melonjak sangat tinggi (100) yang mungkin adalah kesalahan input.

            ### 6. Pro-Tips
            Jangan buat grafik yang terlalu ramai. Semakin sederhana dan fokus sebuah grafik, semakin mudah pesan di dalamnya tersampaikan.

            ### 7. Interactive Challenge
            Bayangkan data penjualan selama 12 bulan. Jenis grafik apa yang menurutmu paling cocok untuk melihat kenaikan penjualan?

            ### 8. Summary & Next Steps
            Visualisasi adalah bahasa universal. Selanjutnya, kita akan belajar alat paling populer untuk menggambar di Python: Matplotlib!
          codeExample: |-
            print("Visualisasi membantu kita mengubah data mentah menjadi wawasan bisnis yang berharga.")
          quiz:
            question: Apa tujuan utama dari visualisasi data bagi seorang Data Scientist?
            options:
              - Membuat tampilan aplikasi menjadi warna-warni.
              - Menyembunyikan data yang salah.
              - Mempermudah manusia dalam mengenali pola, tren, dan anomali pada data.
              - Menghapus data yang tidak diperlukan.
            correctAnswerIndex: 2
        - id: matplotlib-basics
          title: Mengenal Matplotlib
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bagaimana cara membuat grafik di Python? Kita butuh library yang memberikan kontrol penuh, mulai dari warna garis hingga label di sumbu X dan Y.
            **Analogi:** Seperti "Kertas Gambar dan Pensil Warna". Matplotlib menyediakan kanvas kosong (Figure) dan alat lukisnya (Plot).

            ### 2. Learning Objectives
            Kamu akan mampu **mengonstruksi** grafik garis sederhana dan **memodifikasi** elemen dasar grafik (Judul, Label, Warna).

            ### 3. Prerequisites
            - Memahami NumPy Array.

            ### 4. Core Material
            **Matplotlib** adalah pustaka visualisasi tertua dan paling lengkap di Python.
            - **pyplot (plt)**: Sub-modul yang paling sering digunakan untuk perintah menggambar cepat.

            ### 5. Guided Implementation
            ```python
            import matplotlib.pyplot as plt

            x = [1, 2, 3, 4]
            y = [10, 20, 25, 30]

            plt.plot(x, y)
            plt.title("Laporan Penjualan")
            plt.xlabel("Bulan")
            plt.ylabel("Jumlah")
            plt.show()
            ```

            ### 6. Pro-Tips
            Jika kamu menggunakan Jupyter Notebook, tambahkan `%matplotlib inline` agar grafik muncul langsung di bawah baris kodemu.

            ### 7. Interactive Challenge
            Buatlah grafik sederhana yang menghubungkan angka `1, 2, 3` dengan kuadratnya `1, 4, 9`.

            ### 8. Summary & Next Steps
            Matplotlib adalah dasarnya. Selanjutnya, kita akan mempelajari berbagai jenis grafik lain yang tak kalah penting: Bar, Scatter, dan Histogram!
          codeExample: |-
            import matplotlib.pyplot as plt
            plt.plot([1, 2, 3], [4, 5, 6])
            plt.title("Tes Grafik")
            # plt.show()
          quiz:
            question: Sub-modul mana dari Matplotlib yang paling sering digunakan untuk membuat plot secara interaktif?
            options:
              - matplotlib.engine
              - matplotlib.pyplot
              - matplotlib.draw
              - matplotlib.canvas
            correctAnswerIndex: 1
        - id: chart-types
          title: Jenis-Jenis Grafik Utama
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Tidak semua data cocok digambar dengan garis. Data perbandingan kategori lebih baik pakai batang, sedangkan data sebaran titik lebih baik pakai scatter. Salah pilih grafik bisa membuat informasi menjadi menyesatkan.
            **Analogi:** Seperti memilih "Sepatu". Kamu tidak pakai sepatu bola untuk pesta formal. Gunakan grafik yang sesuai dengan "acaranya" (datanya).

            ### 2. Learning Objectives
            Kamu akan mampu **mengategorikan** jenis grafik (Line, Bar, Scatter, Histogram) sesuai dengan kebutuhan analisis data.

            ### 3. Prerequisites
            - Mengenal dasar Matplotlib.

            ### 4. Core Material
            1. **Line Plot**: Tren waktu (Time series).
            2. **Bar Chart**: Perbandingan kategori.
            3. **Scatter Plot**: Hubungan antar dua variabel (Korelasi).
            4. **Histogram**: Distribusi/sebaran data.

            ### 5. Guided Implementation
            ```python
            import matplotlib.pyplot as plt

            # Bar Chart
            kategori = ["A", "B", "C"]
            nilai = [5, 12, 8]
            plt.bar(kategori, nilai)
            plt.show()
            ```

            ### 6. Pro-Tips
            Gunakan **Scatter Plot** untuk mencari tahu apakah ada hubungan antara dua hal, misalnya: "Apakah semakin tinggi suhu ruangan, semakin banyak orang membeli es krim?".

            ### 7. Interactive Challenge
            Gunakan `plt.scatter(x, y)` untuk melihat sebaran titik dari dua kelompok data pilihanmu.

            ### 8. Summary & Next Steps
            Sekarang kamu punya banyak pilihan "alat lukis". Selanjutnya, kita akan belajar cara mempercantik grafik agar layak masuk ke dalam presentasi profesional!
          codeExample: |-
            import matplotlib.pyplot as plt
            plt.bar(["Apel", "Jeruk"], [10, 15])
            # plt.show()
          quiz:
            question: "Jenis grafik mana yang paling cocok untuk melihat 'korelasi' atau hubungan antara dua variabel (misal: Berat Badan vs Tinggi Badan)?"
            options:
              - Bar Chart
              - Histogram
              - Scatter Plot
              - Pie Chart
            correctAnswerIndex: 2
        - id: customizing-plots
          title: Kustomisasi Grafik
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Grafik standar biasanya terlihat pucat dan kurang informatif. Untuk laporan profesional, kamu butuh warna yang menarik, legenda (keterangan), dan garis bantu (grid) agar data mudah dibaca.
            **Analogi:** Seperti "Mendekorasi Ruangan". Kamu sudah punya tembok (grafik), sekarang kamu beri cat (warna), lampu (grid), dan label nama ruangan (legend).

            ### 2. Learning Objectives
            Kamu akan mampu **memodifikasi** estetika grafik menggunakan gaya visual (styles), warna, dan penambahan legenda yang informatif.

            ### 3. Prerequisites
            - Memahami Dasar Matplotlib.

            ### 4. Core Material
            Atribut Kustomisasi:
            - `color`: Mengubah warna garis/batang.
            - `linestyle`: Garis putus-putus atau lurus.
            - `marker`: Titik pada data.
            - `legend()`: Menampilkan label data.

            ### 5. Guided Implementation
            ```python
            plt.plot(x, y, color="red", linestyle="--", marker="o", label="Data 2023")
            plt.grid(True)
            plt.legend()
            plt.show()
            ```

            ### 6. Pro-Tips
            Coba gunakan `plt.style.use('ggplot')` atau `plt.style.use('seaborn')` di baris paling atas kodemu untuk mendapatkan tampilan grafik yang cantik secara instan.

            ### 7. Interactive Challenge
            Buatlah grafik garis berwarna hijau, menggunakan marker bintang (`*`), dan aktifkan fitur `grid`.

            ### 8. Summary & Next Steps
            Luar biasa! Kamu sudah resmi menjadi "Data Storyteller". Selanjutnya, kita akan melangkah lebih jauh ke mesin raksasa pengolah data: Data Engineering!
          codeExample: |-
            import matplotlib.pyplot as plt
            plt.style.use('dark_background')
            plt.plot([1, 2], [3, 4], label="Test")
            plt.legend()
          quiz:
            question: Fungsi apa dalam Matplotlib yang digunakan untuk menampilkan keterangan label (Legend) pada grafik?
            options:
              - plt.show()
              - plt.legend()
              - plt.label()
              - plt.info()
            correctAnswerIndex: 1
    - id: data-engineering
      title: 19. Data Engineering (ETL & Pipeline)
      lessons:
        - id: de-intro
          title: Apa itu Data Engineering?
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Di era Big Data, jutaan data masuk setiap detik dari berbagai sumber (HP, sensor, web). Jika data ini langsung diberikan ke bos untuk dianalisis, mereka akan pusing karena datanya berantakan dan tidak terstruktur.
            **Analogi:** Seperti "Sistem Pengolahan Air Bersih". Kamu butuh orang yang membangun pipa, memasang filter, dan memastikan air (data) yang sampai di keran (dashboard) sudah bersih dan siap diminum (dianalisis).

            ### 2. Learning Objectives
            Kamu akan mampu **menguraikan** peran Data Engineer dalam siklus data dan **mengidentifikasi** perbedaan antara ETL dan ELT.

            ### 3. Prerequisites
            - Memahami Dasar Database.

            ### 4. Core Material
            **Data Engineering** adalah fondasi dari AI.
            - **The "What":** Praktek merancang dan membangun sistem pengumpulan data skala besar.
            - **The "Why":** Tanpa Data Engineer, Data Scientist tidak punya data bersih untuk dilatih.

            ### 5. Guided Implementation
            Peran Utama:
            1. **Ingest**: Ambil data dari sumber.
            2. **Clean**: Hapus data rusak.
            3. **Store**: Simpan di gudang data (Data Warehouse).

            ### 6. Pro-Tips
            Data Engineer lebih banyak berurusan dengan **Infrastruktur** dan **Pipeline** daripada sekadar statistik. Kuasai SQL dan Python secara mendalam!

            ### 7. Interactive Challenge
            Bayangkan data dari Twitter yang berisi ribuan emoji dan link. Apa satu hal pertama yang harus dilakukan Data Engineer sebelum data itu disimpan?

            ### 8. Summary & Next Steps
            Pipa data sudah terbayang. Selanjutnya, kita akan belajar alat manipulasi data paling sakti di dunia Python: Pandas Lanjutan!
          quiz:
            question: Apa tanggung jawab utama seorang Data Engineer?
            options:
              - Membuat grafik presentasi untuk bos.
              - Membangun dan memelihara infrastruktur data (pipeline).
              - Menemukan tren penjualan masa depan menggunakan statistik.
              - Melakukan input data manual satu per satu.
            correctAnswerIndex: 1
        - id: pandas-advanced
          title: Pandas Lanjutan
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Terkadang data pelanggan ada di Tabel A, dan data transaksi ada di Tabel B. Bagaimana cara menyatukan keduanya agar kita tahu siapa pelanggan paling boros?
            **Analogi:** Seperti "Menyusun Puzzle". Kamu punya dua bagian yang berbeda, dan kamu butuh alat (Pandas) untuk menyambungkannya menjadi satu gambar utuh.

            ### 2. Learning Objectives
            Kamu akan mampu **menggabungkan** dataset kompleks menggunakan fungsi `merge` dan **meringkas** data menggunakan teknik `pivoting`.

            ### 3. Prerequisites
            - Memahami Dasar Pandas (DataFrame).

            ### 4. Core Material
            - **Merging/Joining**: Menggabungkan tabel berdasarkan kolom kunci.
            - **Grouping/Aggregation**: Menghitung statistik per grup.
            - **Pivoting**: Mengubah struktur baris menjadi kolom.

            ### 5. Guided Implementation
            ```python
            import pandas as pd
            df1 = pd.DataFrame({"id": [1, 2], "nama": ["Budi", "Andi"]})
            df2 = pd.DataFrame({"id": [1, 2], "gaji": [500, 600]})

            # Menggabungkan data
            df_total = pd.merge(df1, df2, on="id")
            print(df_total)
            ```

            ### 6. Pro-Tips
            Gunakan `.vectorize()` (operasi kolom) sebisa mungkin. Hindari menggunakan loop `for` untuk memproses baris demi baris di Pandas karena akan sangat lambat.

            ### 7. Interactive Challenge
            Gunakan `df.groupby('kota')['omzet'].sum()` untuk menghitung total penjualan per kota dari data simulasi pilihanmu.

            ### 8. Summary & Next Steps
            Manipulasi tabel sudah mahir. Selanjutnya, kita akan belajar alur kerja industri untuk memindahkan data: ETL & ELT Pipelines!
          codeExample: |-
            import pandas as pd

            df1 = pd.DataFrame({"id": [1, 2], "nama": ["Budi", "Andi"]})
            df2 = pd.DataFrame({"id": [1, 2], "gaji": [500, 600]})

            # Merge: Menggabungkan data
            df_gabung = pd.merge(df1, df2, on="id")
            print(f"Data Gabung:\n{df_gabung}")

            # Grouping: Menghitung total
            # df.groupby("kategori")["harga"].sum()
          quiz:
            question: Fungsi apa dalam Pandas yang digunakan untuk menggabungkan dua DataFrame berdasarkan kolom kunci yang sama?
            options:
              - df.combine()
              - df.merge()
              - df.add()
              - df.join_all()
            correctAnswerIndex: 1
        - id: etl-elt-pipelines
          title: ETL & ELT Pipelines
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Mengirim data mentah langsung ke cloud bisa sangat mahal dan lambat. Kita butuh strategi: apakah dibersihkan dulu baru dikirim, atau dikirim dulu baru dibersihkan di dalam cloud?
            **Analogi:** 
            - **ETL:** Seperti mencuci beras di dapur sebelum dimasak di kompor.
            - **ELT:** Seperti memasukkan bahan ke dalam *slow cooker* canggih yang bisa mencuci dan memasak sekaligus di dalamnya.

            ### 2. Learning Objectives
            Kamu akan mampu **merancang** alur kerja pemrosesan data (Extract, Transform, Load) dan **memilih** antara ETL atau ELT berdasarkan skala data.

            ### 3. Prerequisites
            - Memahami Dasar SQL dan Python.

            ### 4. Core Material
            - **Extract**: Ambil data dari sumber.
            - **Transform**: Ubah format, bersihkan, hitung.
            - **Load**: Simpan ke database akhir.

            ### 5. Guided Implementation
            Zaman sekarang, **ELT** lebih populer untuk Big Data karena server cloud (seperti BigQuery) sangat kuat untuk melakukan transformasi data raksasa dengan cepat.

            ### 6. Pro-Tips
            Gunakan alat bantu seperti **dbt (data build tool)** jika kamu memilih jalur ELT. Ia akan memudahkanmu menulis transformasi data menggunakan SQL.

            ### 7. Interactive Challenge
            Bayangkan data sensor suhu masuk setiap detik. Menurutmu, lebih cocok pakai ETL (dibersihkan tiap jam) atau ELT (simpan semua dulu)?

            ### 8. Summary & Next Steps
            Pipa data sudah mengalir. Selanjutnya, kita akan belajar cara merancang "Gudang" yang efisien untuk menyimpan data tersebut: Data Modeling!
          quiz:
            question: Apa kepanjangan dari ETL?
            options:
              - Enter, Track, Log.
              - Extract, Transform, Load.
              - Export, Transfer, List.
              - Edit, Treat, Load.
            correctAnswerIndex: 1
        - id: data-modeling
          title: Data Modeling & Databases
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Jika kamu hanya menumpuk data di satu tabel raksasa, database akan menjadi sangat lambat saat datanya mencapai miliaran baris. Kita butuh cara memecah data menjadi tabel-tabel kecil yang saling terhubung dengan cerdas.
            **Analogi:** Seperti "Folder di Komputer". Kamu tidak menaruh semua file di Desktop, tapi kamu buat folder `Musik`, `Gambar`, dan `Dokumen` agar mudah dicari.

            ### 2. Learning Objectives
            Kamu akan mampu **merancang** skema database Star Schema dan **membedakan** antara OLTP dan OLAP.

            ### 3. Prerequisites
            - Memahami dasar SQL (Primary Key, Foreign Key).

            ### 4. Core Material
            - **Star Schema**: Tabel "Fakta" (transaksi) di tengah, dikelilingi tabel "Dimensi" (data produk, user).
            - **OLTP**: Untuk transaksi harian (cepat).
            - **OLAP**: Untuk analisis data warehouse (besar).

            ### 5. Guided Implementation
            Contoh Star Schema:
            - **Fakta**: `Penjualan` (id_produk, id_user, jumlah, tanggal).
            - **Dimensi**: `Produk`, `User`, `Kalender`.

            ### 6. Pro-Tips
            Normalisasi data itu bagus untuk menghemat memori, tapi untuk Data Warehouse, terkadang kita melakukan "Denormalisasi" agar proses pencarian (Query) menjadi jauh lebih cepat.

            ### 7. Interactive Challenge
            Buatlah skema sederhana untuk sebuah Perpustakaan. Sebutkan mana yang jadi tabel Fakta dan mana yang jadi Dimensi.

            ### 8. Summary & Next Steps
            Data sekarang tersimpan rapi. Bagaimana jika datanya terlalu besar untuk satu komputer? Yuk kita bahas teknologi Big Data!
          quiz:
            question: Skema database mana yang paling sering digunakan untuk Data Warehouse karena kecepatannya?
            options:
              - Circle Schema
              - Star Schema
              - Square Schema
              - Line Schema
            correctAnswerIndex: 1
        - id: big-data-tech
          title: Big Data & Distributed Computing
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Jika satu komputer butuh 10 jam untuk memproses data, apakah kita harus menunggu? Bagaimana jika kita punya 10 komputer yang masing-masing mengerjakan 1/10 bagian? Pekerjaan akan selesai dalam 1 jam!
            **Analogi:** Seperti "Membangun Jembatan". Bukannya menyuruh 1 orang bekerja sendirian, kamu menyewa 100 kuli bangunan yang bekerja serentak di bagian yang berbeda-beda.

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** konsep *Distributed Computing* dan **mengidentifikasi** kegunaan Apache Spark dan Kafka.

            ### 3. Prerequisites
            - Memahami Dasar Python.

            ### 4. Core Material
            **Hadoop & Spark** adalah raja di dunia Big Data.
            - **Hadoop (HDFS)**: Sistem penyimpanan yang tersebar di banyak komputer.
            - **Apache Spark**: Mesin pengolah data raksasa di dalam memori (RAM).
            - **Apache Kafka**: Menangani aliran data real-time jutaan pesan per detik.

            ### 5. Guided Implementation
            Konsep utama adalah **MapReduce**:
            1. **Map**: Pecah tugas ke banyak komputer.
            2. **Reduce**: Gabungkan kembali hasilnya menjadi satu laporan akhir.

            ### 6. Pro-Tips
            Gunakan library `PySpark` jika kamu ingin memproses data ukuran Terabyte menggunakan sintaks yang mirip dengan Pandas.

            ### 7. Interactive Challenge
            Kenapa memproses data di memori (Spark) jauh lebih cepat daripada di hardisk (Hadoop MapReduce lama)?

            ### 8. Summary & Next Steps
            Teknologi raksasa sudah di genggaman. Selanjutnya, kita akan belajar cara "mengatur jadwal" semua pipa data ini secara otomatis: Data Orchestration!
          quiz:
            question: Teknologi apa yang digunakan untuk memproses data besar secara cepat di dalam memori?
            options:
              - Microsoft Excel
              - Apache Spark
              - Notepad++
              - Windows Explorer
            correctAnswerIndex: 1
        - id: data-orchestration
          title: Data Orchestration (Airflow)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Kamu punya 100 pipa data. Pipa B harus jalan jam 2 pagi, tapi harus nunggu Pipa A selesai dulu. Jika Pipa A gagal, Pipa B jangan jalan. Mengatur ini secara manual adalah mimpi buruk.
            **Analogi:** Seperti "Konduktor Orkestra". Konduktor tidak memainkan alat musik, tapi ia memberi aba-aba kapan biola harus masuk dan kapan trompet harus berhenti.

            ### 2. Learning Objectives
            Kamu akan mampu **mengonstruksi** alur kerja data (DAG) menggunakan Apache Airflow dan **mengelola** penjadwalan otomatis.

            ### 3. Prerequisites
            - Memahami Konsep Pipeline (ETL).

            ### 4. Core Material
            **Apache Airflow** adalah standar industri untuk mengatur pipa data.
            - **DAG (Directed Acyclic Graph)**: Alur kerja yang searah dan tidak berputar-putar.
            - **Operator**: Tugas spesifik (misal: jalankan skrip Python).

            ### 5. Guided Implementation
            Di Airflow, kamu menulis kode Python untuk menentukan urutan:
            ```python
            task_ambil >> task_bersihkan >> task_simpan
            ```

            ### 6. Pro-Tips
            Airflow memiliki fitur **Retry**. Jika pipa datamu gagal karena internet putus sementara, Airflow akan mencoba lagi secara otomatis sesuai jumlah yang kamu tentukan.

            ### 7. Interactive Challenge
            Coba bayangkan satu alur kerja data untuk aplikasi cuaca. Sebutkan urutan tugas yang harus dilakukan dari pengambilan data sampai muncul di HP user!

            ### 8. Summary & Next Steps
            Manajemen alur data sudah beres. Selanjutnya, kita akan membahas perbedaan tempat "penyimpanan" data skala besar: Data Warehouse vs Data Lake!
          codeExample: |-
            # Contoh konsep Airflow (DAG)
            # task_a = PythonOperator(task_id='ambil_data')
            # task_b = PythonOperator(task_id='bersihkan_data')
            # task_a >> task_b  # Artinya A harus jalan sebelum B
          quiz:
            question: Apa kepanjangan dari DAG dalam konteks alur kerja Apache Airflow?
            options:
              - Data Access Group
              - Directed Acyclic Graph
              - Daily Automation Goal
              - Digital Archive Guide
            correctAnswerIndex: 1
        - id: data-warehouse-lake
          title: Data Warehouse vs Data Lake
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Tidak semua data itu rapi. Ada foto, suara, log mentah, dan tabel rapi. Haruskah kita merapikan semuanya sebelum disimpan? Merapikan foto menjadi tabel adalah hal yang mustahil. Kita butuh dua jenis gudang berbeda.
            **Analogi:** 
            - **Data Warehouse:** Seperti "Apotek". Semuanya tertata rapi, berlabel, dan siap dipakai pelanggan.
            - **Data Lake:** Seperti "Gudang Penyimpanan Raksasa". Kamu lempar saja semua barang (mentah) ke dalamnya, baru nanti kamu cari dan bersihkan saat butuh.

            ### 2. Learning Objectives
            Kamu akan mampu **memilih** infrastruktur penyimpanan yang tepat antara Data Warehouse, Data Lake, atau Data Lakehouse.

            ### 3. Prerequisites
            - Memahami Dasar Database.

            ### 4. Core Material
            - **Data Warehouse**: Untuk data terstruktur (tabel). Mahal tapi sangat cepat untuk laporan bisnis. Contoh: BigQuery, Redshift.
            - **Data Lake**: Untuk segala jenis data (foto, teks mentah). Murah dan menampung petabyte data. Contoh: AWS S3, Google Cloud Storage.

            ### 5. Guided Implementation
            Tren terbaru: **Data Lakehouse** (seperti Databricks). Gabungan keduanya: menyimpan data mentah dengan harga murah, tapi bisa di-query secepat tabel rapi.

            ### 6. Pro-Tips
            Simpan semua data mentah di Data Lake terlebih dahulu. Jangan pernah buang data mentah, karena siapa tahu 2 tahun lagi kamu butuh data itu untuk melatih model AI baru!

            ### 7. Interactive Challenge
            Jika kamu ingin menyimpan jutaan rekaman suara telepon pelanggan, mana yang kamu pilih: Data Warehouse atau Data Lake?

            ### 8. Summary & Next Steps
            Selamat! Kamu sudah paham seluk beluk Data Engineering. Selanjutnya, kita akan belajar tahap krusial sebelum data masuk ke AI: Data Preparation & Feature Engineering!
          quiz:
            question: Di mana Anda sebaiknya menyimpan data mentah (seperti file gambar atau log mentah) dalam skala besar?
            options:
              - Data Warehouse
              - Data Lake
              - File Excel
              - Database SQL
            correctAnswerIndex: 1
    - id: data-prep-feature-eng
      title: 20. Data Preparation & Feature Engineering
      lessons:
        - id: data-cleaning
          title: Data Cleaning (Pembersihan Data)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** "Garbage In, Garbage Out". Jika kamu memberikan data yang kotor (ada typo, nilai kosong, atau data palsu) ke AI tercanggih sekalipun, hasil prediksinya akan berantakan. AI tidak bisa membedakan mana data yang benar dan mana yang sampah tanpa bantuanmu.
            **Analogi:** Seperti "Mencuci Sayuran". Sebelum dimasak (training AI), sayuran harus dicuci bersih dari tanah (missing values) dan bagian yang busuk harus dibuang (outliers) agar masakan (model) enak dan sehat.

            ### 2. Learning Objectives
            Kamu akan mampu **mengimplementasikan** teknik pembersihan data menggunakan Pandas dan **menganalisis** dampak data kotor terhadap model AI.

            ### 3. Prerequisites
            - Memahami Dasar Pandas (DataFrame).

            ### 4. Core Material
            **Data Cleaning** adalah tahap paling lama dalam proyek data (80% waktu).
            - **Handling Missing Values**: Mengisi data kosong (Imputation) atau menghapusnya.
            - **Deduplication**: Menghapus data kembar.
            - **Consistency**: Menyeragamkan teks (misal: "Jakarta" vs "jakarta").

            ### 5. Guided Implementation
            ```python
            import pandas as pd
            df = pd.DataFrame({"skor": [90, None, 85, 90]})

            # 1. Hapus duplikat
            df = df.drop_duplicates()

            # 2. Isi nilai kosong dengan rata-rata
            df["skor"] = df["skor"].fillna(df["skor"].mean())
            print(df)
            ```

            ### 6. Pro-Tips
            Selalu cek persentase data yang kosong. Jika lebih dari 50% sebuah kolom kosong, lebih baik hapus kolom tersebut daripada mengisinya dengan data tebakan yang berisiko bias.

            ### 7. Interactive Challenge
            Gunakan `df.isnull().sum()` untuk melihat berapa banyak data kosong di setiap kolom pada dataset simulasi pilihanmu.

            ### 8. Summary & Next Steps
            Data sudah bersih. Selanjutnya, kita akan belajar cara menyeimbangkan skala angka agar AI tidak "pilih kasih": Feature Scaling!
          codeExample: |-
            import pandas as pd
            df = pd.DataFrame({"nama": ["Andi", "Andi", "Budi"], "umur": [20, 20, 25]})
            df_clean = df.drop_duplicates()
            print(f"Data Unik:\n{df_clean}")
          quiz:
            question: Apa istilah populer yang menggambarkan bahwa kualitas output AI sangat bergantung pada kualitas data masukannya?
            options:
              - Data is King
              - Garbage In, Garbage Out (GIGO)
              - Fast and Furious
              - AI First, Data Second
            correctAnswerIndex: 1
        - id: feature-scaling
          title: Feature Scaling (Penyekalaan)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bayangkan AI memproses data "Gaji" (jutaan) dan "Umur" (puluhan). Karena angka Gaji jauh lebih besar, AI akan menganggap Gaji 1000x lebih penting daripada Umur. Padahal, keduanya bisa jadi sama pentingnya.
            **Analogi:** Seperti "Lari Maraton". Jika satu orang mulai dari meter ke-0 dan orang lain mulai dari meter ke-1000, kompetisi jadi tidak adil. Penyekalaan membuat semua orang mulai dari garis start yang sama.

            ### 2. Learning Objectives
            Kamu akan mampu **menerapkan** teknik Normalization dan Standardization menggunakan library Scikit-Learn.

            ### 3. Prerequisites
            - Memahami Dasar NumPy.

            ### 4. Core Material
            - **Normalization (Min-Max)**: Mengubah angka ke rentang 0 sampai 1.
            - **Standardization (Z-Score)**: Mengubah angka agar rata-ratanya 0 dan standar deviasinya 1.

            ### 5. Guided Implementation
            ```python
            from sklearn.preprocessing import StandardScaler
            data = [[1000000, 25], [2000000, 30]]
            scaler = StandardScaler()
            
            data_scaled = scaler.fit_transform(data)
            print(data_scaled)
            ```

            ### 6. Pro-Tips
            Gunakan **Standardization** jika datamu memiliki banyak *Outlier* (data ekstrem), karena ia lebih tahan terhadap gangguan daripada Normalization.

            ### 7. Interactive Challenge
            Kapan kamu harus menggunakan Normalization (0-1) daripada Standardization? Cari tahu satu algoritma yang wajib pakai ini!

            ### 8. Summary & Next Steps
            Skala angka sudah adil. Selanjutnya, bagaimana jika datanya berupa Teks (Kategori)? Mari kita ubah jadi angka dengan Categorical Encoding!
          codeExample: |-
            from sklearn.preprocessing import MinMaxScaler
            import numpy as np
            data = np.array([[10], [20], [30]])
            scaler = MinMaxScaler()
            print(f"Normalized:\n{scaler.fit_transform(data)}")
          quiz:
            question: Mengapa kita perlu melakukan Feature Scaling pada data angka dengan rentang yang sangat berbeda?
            options:
              - Agar ukuran file menjadi lebih kecil.
              - Agar model AI tidak menganggap fitur dengan angka besar lebih penting secara tidak adil.
              - Agar teks berubah menjadi angka.
              - Untuk menghapus data yang kosong.
            correctAnswerIndex: 1
        - id: categorical-encoding
          title: Categorical Encoding
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Komputer adalah mesin hitung raksasa. Ia hanya mengerti angka `0` dan `1`. Bagaimana cara memasukkan data "Warna: Merah, Biru, Hijau" ke dalam rumus matematika AI?
            **Analogi:** Seperti "Penerjemah Bahasa Isyarat". Kamu tidak bisa bicara langsung dengan orang tuli, kamu butuh isyarat tangan (angka) yang mewakili kata-katamu.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **mengonversi** data kategorikal menjadi format numerik menggunakan teknik One-Hot Encoding dan Label Encoding.

            ### 3. Prerequisites
            - Memahami Dasar Pandas.

            ### 4. Core Material
            - **Label Encoding**: Merah=0, Biru=1, Hijau=2. (Cocok untuk data urutan: SD, SMP, SMA).
            - **One-Hot Encoding**: Membuat kolom baru untuk setiap kategori. (Cocok untuk data tanpa urutan: Warna, Kota).

            ### 5. Guided Implementation
            ```python
            import pandas as pd
            df = pd.DataFrame({"warna": ["Merah", "Biru"]})

            # One-Hot Encoding
            encoded = pd.get_dummies(df, columns=["warna"])
            print(encoded)
            ```

            ### 6. Pro-Tips
            Hati-hati dengan **Dummy Variable Trap**. Jika kamu punya 3 kategori, kamu sebenarnya hanya butuh 2 kolom untuk mewakili ketiganya. Pandas punya argumen `drop_first=True` untuk menangani ini.

            ### 7. Interactive Challenge
            Gunakan `LabelEncoder` dari `sklearn.preprocessing` untuk mengubah daftar "Ukuran Baju" (S, M, L, XL) menjadi angka.

            ### 8. Summary & Next Steps
            Sekarang semua data sudah jadi angka! Selanjutnya, kita akan belajar "Seni" menciptakan petunjuk baru bagi AI: Feature Engineering!
          codeExample: |-
            import pandas as pd
            df = pd.DataFrame({"kota": ["Jakarta", "Bandung", "Surabaya"]})
            print(pd.get_dummies(df))
          quiz:
            question: Teknik encoding mana yang paling tepat untuk data yang TIDAK memiliki urutan (seperti jenis kelamin atau nama kota)?
            options:
              - Label Encoding
              - One-Hot Encoding
              - Binary Search
              - Decimal Scaling
            correctAnswerIndex: 1
        - id: feature-engineering-detail
          title: Seni Feature Engineering
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Terkadang data yang ada tidak cukup kuat untuk memberikan prediksi yang akurat. Misalnya, kamu punya data "Tanggal". Tapi yang sebenarnya mempengaruhi penjualan adalah "Apakah hari itu Libur?". AI tidak akan tahu itu kecuali kamu memberitahunya.
            **Analogi:** Seperti "Membuat Bumbu Masakan". Kamu punya bahan dasar (data mentah), tapi kamu harus meraciknya (Feature Engineering) agar rasa masakannya (prediksi) jadi luar biasa.

            ### 2. Learning Objectives
            Kamu akan mampu **mengonstruksi** fitur-fitur baru yang bermakna dari dataset yang sudah ada untuk meningkatkan performa model.

            ### 3. Prerequisites
            - Memahami Manipulasi Tanggal dan Teks di Python.

            ### 4. Core Material
            **Feature Engineering** adalah proses menggunakan pengetahuan domain untuk menciptakan fitur yang membuat algoritma machine learning bekerja lebih baik.
            - **Extraction**: Ambil "Jam" dari "Waktu".
            - **Transformation**: Ubah "Harga" menjadi "Log(Harga)".
            - **Combination**: "Luas Rumah" / "Jumlah Kamar".

            ### 5. Guided Implementation
            ```python
            import pandas as pd
            df = pd.DataFrame({"tanggal": pd.to_datetime(["2023-01-01", "2023-01-02"])})

            # Buat fitur baru: Hari dalam seminggu
            df["hari"] = df["tanggal"].dt.day_name()
            print(df)
            ```

            ### 6. Pro-Tips
            Selalu gunakan **Domain Knowledge** (Ilmu Pengetahuan Bidang). Jika kamu mengerjakan data medis, tanyakan pada dokter fitur apa yang paling menentukan penyakit tersebut.

            ### 7. Interactive Challenge
            Bayangkan data "Waktu Login" user. Sebutkan 2 fitur baru yang bisa kamu buat dari data waktu tersebut (misal: Begadang/Tidak).

            ### 8. Summary & Next Steps
            Fitur sudah kaya. Namun, terlalu banyak fitur juga bisa membingungkan AI. Mari kita belajar cara memilih yang terbaik: Feature Selection!
          codeExample: |-
            import pandas as pd
            df = pd.DataFrame({"lebar": [5, 10], "panjang": [10, 20]})
            df["luas"] = df["lebar"] * df["panjang"] # Feature baru
            print(df)
          quiz:
            question: Apa tujuan utama dari Feature Engineering?
            options:
              - Menghapus semua data yang ada.
              - Menciptakan variabel baru yang membantu model AI memahami pola data dengan lebih baik.
              - Mengubah kode Python menjadi Java.
              - Membuat komputer menjadi lebih hemat listrik.
            correctAnswerIndex: 1
        - id: feature-selection
          title: Feature Selection (Pemilihan Fitur)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** "Lebih banyak lebih baik" tidak berlaku dalam AI. Jika kamu memasukkan 1000 fitur tapi 900 di antaranya tidak berguna (seperti 'Warna Kesukaan' untuk memprediksi 'Penyakit Jantung'), AI akan menjadi bingung dan lambat.
            **Analogi:** Seperti "Membawa Bekal Mendaki Gunung". Kamu hanya membawa barang yang benar-benar penting (air, tenda) dan meninggalkan yang tidak perlu (TV, Kasur) agar kamu bisa sampai puncak dengan cepat dan selamat.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **mengevaluasi** kepentingan fitur menggunakan teknik korelasi dan model importance.

            ### 3. Prerequisites
            - Memahami Konsep Akurasi Model.

            ### 4. Core Material
            - **Filter Method**: Gunakan statistik (Korelasi) untuk membuang fitur yang tidak berhubungan.
            - **Wrapper Method**: Coba berbagai kombinasi fitur dan lihat mana yang akurasinya paling tinggi.
            - **Embedded Method**: AI sendiri yang memberi tahu kita fitur mana yang paling dia sukai.

            ### 5. Guided Implementation
            Gunakan Heatmap Korelasi:
            ```python
            # df.corr()
            # Jika angka korelasi mendekati 0, fitur tersebut kurang berguna.
            ```

            ### 6. Pro-Tips
            Hati-hati dengan **Multicollinearity**. Jika ada dua fitur yang sangat mirip (misal: "Tinggi dalam CM" dan "Tinggi dalam Inchi"), hapus salah satu karena mereka memberikan informasi yang sama.

            ### 7. Interactive Challenge
            Cari tahu apa itu "Recursive Feature Elimination" (RFE) dan bagaimana ia bekerja menghapus fitur secara otomatis.

            ### 8. Summary & Next Steps
            Selamat! Kamu sudah menguasai persiapan data tingkat mahir. Sekarang saatnya masuk ke inti dari segalanya: Membangun Model AI sesungguhnya!
          codeExample: |-
            print("Feature Selection: Memilih hanya fitur yang paling berpengaruh bagi prediksi AI.")
          quiz:
            question: Apa dampak negatif jika kita memasukkan terlalu banyak fitur yang tidak relevan ke dalam model AI?
            options:
              - Model menjadi terlalu akurat.
              - Model menjadi lambat dan mengalami 'Overfitting' (terlalu fokus pada detail tidak penting).
              - Komputer akan otomatis terhapus datanya.
              - Tidak ada dampak apa-apa.
            correctAnswerIndex: 1
