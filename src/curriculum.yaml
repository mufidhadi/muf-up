- id: javascript-path
  title: JavaScript Developer
  description: Jalur lengkap dari dasar JavaScript hingga menjadi Full-Stack Web Developer.
  icon: javascript
  curriculums:
    - id: js-basics
      title: JavaScript Dasar
      description: Mempelajari dasar-dasar JavaScript untuk web.
      modules:
        - id: js-intro
          title: 1. Pengenalan JavaScript
          lessons:
            - id: what-is-js
              title: Apa itu JavaScript?
              content: JavaScript adalah bahasa pemrograman yang membuat web menjadi interaktif. Bersama HTML dan CSS, JS adalah teknologi inti dari World Wide Web.
              codeExample: console.log("Halo JavaScript!");
            - id: js-variables
              title: Variabel dan Tipe Data
              content: JavaScript menggunakan `let`, `const`, dan `var` untuk mendeklarasikan variabel. Tipe data utamanya adalah String, Number, Boolean, Object, dan Array.
              codeExample: |-
                let nama = "Budi";
                const umur = 20;
                let isStudent = true;
        - id: js-functions
          title: 2. Fungsi dan Objek
          lessons:
            - id: js-arrow-functions
              title: Arrow Functions
              content: Arrow functions memberikan sintaks yang lebih ringkas untuk menulis fungsi di JavaScript.
              codeExample: |-
                const tambah = (a, b) => a + b;
                console.log(tambah(2, 3));
    - id: js-frontend
      title: Frontend Frameworks
      description: Membangun antarmuka pengguna interaktif dengan React.
      modules:
        - id: react-intro
          title: 1. Pengenalan React
          lessons:
            - id: what-is-react
              title: Apa itu React?
              content: React adalah library JavaScript untuk membangun antarmuka pengguna, dikembangkan oleh Facebook.
              codeExample: |-
                function App() {
                  return <h1>Halo React!</h1>;
                }
- id: golang-path
  title: Golang Developer
  description: Jalur lengkap mempelajari Go untuk backend dan sistem terdistribusi.
  icon: golang
  curriculums:
    - id: go-basics
      title: Go Dasar
      description: Mempelajari sintaks dasar dan concurrency di Go.
      modules:
        - id: go-intro
          title: 1. Pengenalan Go
          lessons:
            - id: what-is-go
              title: Apa itu Go?
              content: Go (atau Golang) adalah bahasa pemrograman open source yang dikembangkan oleh Google. Go dirancang agar sederhana, cepat, dan handal.
              codeExample: |-
                package main

                import "fmt"

                func main() {
                    fmt.Println("Halo Go!")
                }
        - id: go-concurrency
          title: 2. Concurrency
          lessons:
            - id: goroutines
              title: Goroutines
              content: Goroutine adalah fungsi yang berjalan secara konkuren dengan fungsi lainnya. Mereka sangat ringan.
              codeExample: |-
                go sayHello()

                func sayHello() {
                    fmt.Println("Hello dari goroutine")
                }
- id: rust-path
  title: Rust Developer
  description: Jalur lengkap mempelajari Rust untuk sistem berkinerja tinggi dan aman.
  icon: rust
  curriculums:
    - id: rust-basics
      title: Rust Dasar
      description: Mempelajari sintaks dasar, ownership, dan memori di Rust.
      modules:
        - id: rust-intro
          title: 1. Pengenalan Rust
          lessons:
            - id: what-is-rust
              title: Apa itu Rust?
              content: Rust adalah bahasa pemrograman sistem yang berfokus pada kecepatan, keamanan memori, dan konkurensi.
              codeExample: |-
                fn main() {
                    println!("Halo Rust!");
                }
        - id: rust-ownership
          title: 2. Ownership
          lessons:
            - id: ownership-concept
              title: Konsep Ownership
              content: Ownership adalah fitur paling unik di Rust yang menjamin keamanan memori tanpa menggunakan garbage collector.
              codeExample: |-
                let s1 = String::from("hello");
                let s2 = s1; // s1 dipindahkan ke s2
                // println!("{}", s1); // Ini akan error
