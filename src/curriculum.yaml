            Proses memindahkan data dari sumber ke tempat penyimpanan.
                      
            - **Extract**: Mengambil data dari sumber (API, Database, File).
            - **Transform**: Membersihkan dan mengubah format data.
            - **Load**: Memasukkan data ke Data Warehouse.
