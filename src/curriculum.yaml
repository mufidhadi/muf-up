            options:
              - RAG lebih mahal daripada Fine-tuning.
              - Fine-tuning mengubah bobot internal model, sedangkan RAG hanya memberikan konteks tambahan pada prompt.
              - Fine-tuning tidak membutuhkan data sama sekali.
              - RAG hanya untuk gambar, Fine-tuning hanya untuk suara.
