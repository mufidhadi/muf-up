    - id: machine-learning
      title: 21. Machine Learning
      lessons:
        - id: ml-intro
          title: Apa itu Machine Learning?
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bagaimana Spotify bisa tahu lagu apa yang kamu sukai? Atau bagaimana Gmail bisa membedakan email penting dan spam? Menulis ribuan aturan `if-else` manual tidak akan mungkin berhasil.
            **Analogi:** Seperti "Anak Kecil yang Belajar Mengenal Buah". Kamu tidak memberinya rumus kimia, tapi kamu memberinya banyak contoh apel dan jeruk sampai otaknya bisa mengenali polanya sendiri.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **menguraikan** konsep dasar Machine Learning dan **membedakan** antara Supervised, Unsupervised, dan Reinforcement Learning.

            ### 3. Prerequisites
            - Memahami Dasar Python (Fungsi, List).
            - Memahami Dasar Statistik.

            ### 4. Core Material
            **Machine Learning** adalah ilmu yang membuat komputer "belajar" dari data.
            - **Supervised**: Belajar dari data berlabel (Input + Jawaban).
            - **Unsupervised**: Mencari pola sendiri tanpa label.
            - **Reinforcement**: Belajar melalui hadiah dan hukuman.

            ### 5. Guided Implementation
            ```python
            from sklearn.linear_model import LinearRegression
            import numpy as np

            # Data: Luas Rumah (X), Harga (y)
            X = np.array([[50], [80], [100]])
            y = np.array([500, 800, 1000])

            model = LinearRegression()
            model.fit(X, y) # Proses Belajar pola

            prediksi = model.predict([[150]])
            print(f"Prediksi Harga: {prediksi[0]}")
            ```

            ### 6. Pro-Tips
            Kunci dari ML bukan pada kodenya, tapi pada **Datanya**. Model yang hebat tidak akan berguna jika data latihannya salah atau bias.

            ### 7. Interactive Challenge
            Sebutkan satu contoh aplikasi di HP-mu yang menurutmu menggunakan *Unsupervised Learning* (mencari pola sendiri).

            ### 8. Summary & Next Steps
            Sekarang kamu tahu gambaran besarnya. Selanjutnya, kita akan mendalami salah satu tugas ML paling populer: Klasifikasi!
          codeExample: |-
            import numpy as np
            from sklearn.linear_model import LinearRegression
            model = LinearRegression()
            print("Machine Learning memungkinkan komputer memprediksi masa depan berdasarkan data masa lalu.")
          quiz:
            question: Tipe Machine Learning yang belajar dari data yang sudah memiliki 'label' atau 'jawaban benar' disebut?
            options:
              - Unsupervised Learning
              - Supervised Learning
              - Reinforcement Learning
              - Deep Learning
            correctAnswerIndex: 1
        - id: classification-deep-dive
          title: Klasifikasi (Classification)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Seorang dokter ingin sistem AI yang bisa mendeteksi apakah sebuah sel tumor bersifat ganas atau jinak hanya dari foto rontgen. Outputnya adalah pilihan "Ya" atau "Tidak". Inilah tugas Klasifikasi.
            **Analogi:** Seperti "Menyortir Sampah". Kamu memiliki beberapa tong (Kategori) dan kamu harus memasukkan setiap barang ke tong yang benar berdasarkan ciri-cirinya.

            ### 2. Learning Objectives
            Kamu akan mampu **mengintegrasikan** algoritma klasifikasi untuk memecahkan masalah kategorikal dan **mengevaluasi** hasilnya menggunakan *accuracy score*.

            ### 3. Prerequisites
            - Memahami Dasar Machine Learning.

            ### 4. Core Material
            **Klasifikasi** memprediksi label kategori (diskrit).
            - **Binary**: 2 pilihan (Spam/Bukan).
            - **Multi-class**: Banyak pilihan (Hewan: Kucing, Anjing, Kelinci).
            - **Algoritma**: Logistic Regression, Random Forest, SVM.

            ### 5. Guided Implementation
            ```python
            from sklearn.ensemble import RandomForestClassifier

            # Fitur: [Berat, Tekstur (0=Halus, 1=Kasar)]
            X = [[140, 0], [130, 0], [150, 1], [170, 1]]
            y = ["Apel", "Apel", "Jeruk", "Jeruk"]

            clf = RandomForestClassifier()
            clf.fit(X, y)

            print(clf.predict([[160, 1]])) # Prediksi: Jeruk
            ```

            ### 6. Pro-Tips
            Jangan hanya melihat akurasi. Jika kamu punya 99 data sehat dan 1 data sakit, model yang selalu menebak "Sehat" akan punya akurasi 99%, tapi ia gagal total mendeteksi penyakit!

            ### 7. Interactive Challenge
            Bayangkan sistem deteksi wajah. Fitur apa saja yang menurutmu perlu diekstrak dari wajah agar AI bisa membedakan orang?

            ### 8. Summary & Next Steps
            Klasifikasi sudah dikuasai. Selanjutnya, kita akan mengenal library standar industri untuk ML di Python: Scikit-Learn!
          codeExample: |-
            from sklearn.ensemble import RandomForestClassifier
            clf = RandomForestClassifier()
            print("Klasifikasi membantu komputer mengelompokkan data ke dalam kategori yang tepat.")
          quiz:
            question: Manakah di bawah ini yang merupakan contoh tugas 'Binary Classification'?
            options:
              - Memprediksi harga rumah bulan depan.
              - Mendeteksi apakah sebuah email adalah SPAM atau BUKAN SPAM.
              - Mengelompokkan berita ke dalam 10 topik berbeda.
              - Menghitung jumlah orang di dalam foto.
            correctAnswerIndex: 1
        - id: scikit-learn
          title: Scikit-Learn Dasar
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Dunia Machine Learning sangat luas. Kamu tidak ingin menggunakan satu library untuk memproses data, library lain untuk algoritma A, dan library lain lagi untuk algoritma B dengan cara pakai yang berbeda-beda.
            **Analogi:** Seperti "Pisau Swiss Army". Scikit-Learn menyediakan semua alat ML dalam satu paket dengan cara pakai yang seragam dan konsisten.

            ### 2. Learning Objectives
            Kamu akan mampu **mengonstruksi** alur kerja ML lengkap (Pipeline) menggunakan library Scikit-Learn mulai dari pembagian data hingga evaluasi.

            ### 3. Prerequisites
            - Memahami Dasar Klasifikasi dan Regresi.

            ### 4. Core Material
            **Scikit-Learn (sklearn)** adalah library ML paling populer.
            **Alur Kerja 4 Langkah:**
            1. **Split**: Bagi data jadi Train & Test.
            2. **Fit**: Latih model (`model.fit`).
            3. **Predict**: Tebak data baru (`model.predict`).
            4. **Evaluate**: Cek akurasi.

            ### 5. Guided Implementation
            ```python
            from sklearn.model_selection import train_test_split
            from sklearn.metrics import accuracy_score

            # X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)
            # model.fit(X_train, y_train)
            # score = accuracy_score(y_test, model.predict(X_test))
            ```

            ### 6. Pro-Tips
            Selalu pisahkan data latihan dan data ujian (Train/Test Split). Jika AI belajar dari data yang sama dengan yang diujikan, ia akan "menghafal" bukan "belajar" (*Overfitting*).

            ### 7. Interactive Challenge
            Kenapa rasio pembagian data biasanya 80% Latihan dan 20% Ujian? Apa yang terjadi jika data ujiannya terlalu sedikit?

            ### 8. Summary & Next Steps
            Luar biasa! Kamu sudah bisa membuat AI tradisional. Sekarang, mari kita melompat ke dunia yang lebih dalam dan menyerupai otak manusia: Deep Learning!
          codeExample: |-
            from sklearn.model_selection import train_test_split
            print("Scikit-Learn adalah library standar emas untuk Machine Learning di Python.")
          quiz:
            question: Apa tujuan utama dari membagi dataset menjadi 'Train Set' dan 'Test Set'?
            options:
              - Agar ukuran file data menjadi lebih kecil.
              - Untuk memastikan model bisa memprediksi data yang belum pernah ia lihat sebelumnya (menghindari hafalan).
              - Karena memproses seluruh data sekaligus dilarang oleh Python.
              - Agar proses training menjadi lebih lama.
            correctAnswerIndex: 1
    - id: deep-learning
      title: 22. Deep Learning & Neural Networks
      lessons:
        - id: neural-networks-theory
          title: Teori Jaringan Saraf
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Machine Learning tradisional sulit menangani data yang sangat kompleks seperti wajah manusia yang punya jutaan kombinasi pixel. Kita butuh struktur yang lebih canggih, yang meniru cara kerja otak kita sendiri.
            **Analogi:** Seperti "Jaringan Kerja di Kantor". Informasi masuk ke resepsionis (Input), diolah oleh berbagai divisi (Hidden Layers), lalu bos mengambil keputusan akhir (Output).

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** arsitektur dasar Jaringan Saraf Tiruan (ANN) dan **menganalisis** fungsi dari Activation Function.

            ### 3. Prerequisites
            - Memahami Dasar NumPy (Matriks).

            ### 4. Core Material
            **Deep Learning** menggunakan Jaringan Saraf dengan banyak lapisan (Deep).
            - **Neuron**: Unit terkecil penghitung.
            - **Weights**: Bobot kepentingan informasi.
            - **Activation (ReLU/Sigmoid)**: Menentukan apakah informasi tersebut penting untuk diteruskan atau tidak.

            ### 5. Guided Implementation
            ```python
            # Konsep Matematika 1 Neuron
            # output = activation( (input1 * w1) + (input2 * w2) + bias )
            ```

            ### 6. Pro-Tips
            Deep Learning membutuhkan **Data yang Sangat Besar** dan **GPU (kartu grafis)** yang kuat agar proses belajarnya tidak memakan waktu berbulan-bulan.

            ### 7. Interactive Challenge
            Cari tahu: Apa perbedaan utama antara fungsi aktivasi **ReLU** dan **Sigmoid**? Mana yang lebih sering dipakai sekarang?

            ### 8. Summary & Next Steps
            Arsitekturnya sudah paham. Selanjutnya, kita akan mempelajari "Mesin" di balik kepintaran AI: Bagaimana ia memperbaiki kesalahannya sendiri!
          codeExample: |-
            import numpy as np
            def sigmoid(x): return 1 / (1 + np.exp(-x))
            print(f"Output aktivasi: {sigmoid(0.5)}")
          quiz:
            question: Bagian dari jaringan saraf yang berfungsi menentukan apakah suatu informasi penting untuk diteruskan ke lapisan berikutnya disebut?
            options:
              - Input Layer
              - Activation Function
              - Memory RAM
              - Hardisk
            correctAnswerIndex: 1
        - id: backpropagation
          title: Backpropagation & Gradient Descent
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Saat pertama kali dibuat, AI itu "bodoh". Tebakannya asal-asalan. Bagaimana cara ia sadar bahwa ia salah dan tahu bagian mana yang harus diperbaiki?
            **Analogi:** Seperti "Latihan Memanah". Kamu memanah, meleset ke kanan (Error). Otakmu memberi perintah ke tangan untuk bergeser sedikit ke kiri (Update bobot). Kamu lakukan berulang kali sampai tepat sasaran.

            ### 2. Learning Objectives
            Kamu akan mampu **menguraikan** proses optimasi model menggunakan algoritma Gradient Descent dan **menyimpulkan** fungsi dari Loss Function.

            ### 3. Prerequisites
            - Memahami Arsitektur Jaringan Saraf.

            ### 4. Core Material
            - **Loss Function**: Mengukur seberapa besar kesalahan AI (Jarak antara tebakan vs kenyataan).
            - **Optimizer**: Algoritma yang bertugas mengubah bobot neuron.
            - **Backpropagation**: Proses mengirim sinyal kesalahan dari depan kembali ke belakang untuk diperbaiki.

            ### 5. Guided Implementation
            Alur Belajar AI:
            1. Tebak (Forward).
            2. Hitung Salah (Loss).
            3. Kirim Sinyal Salah ke Belakang (Backprop).
            4. Perbaiki sedikit (Update Weights).
            5. Ulangi ribuan kali.

            ### 6. Pro-Tips
            **Learning Rate** adalah pengaturan seberapa besar AI "melompat" saat memperbaiki diri. Jika terlalu besar, ia akan melewati sasaran. Jika terlalu kecil, proses belajar akan sangat lama.

            ### 7. Interactive Challenge
            Apa yang terjadi jika kita memiliki data yang sangat sedikit tapi melakukan proses perbaikan (iterasi) terlalu sering? (Cari tahu istilah: *Overfitting*).

            ### 8. Summary & Next Steps
            Deep Learning adalah fondasi AI modern. Selanjutnya, kita akan belajar bagaimana AI bisa "melihat" dan "mengenali" objek di sekitarnya: Computer Vision!
          codeExample: |-
            print("Backpropagation: Cara AI belajar dari kesalahan secara matematis.")
          quiz:
            question: Algoritma yang bertugas mencari nilai bobot (weights) terbaik agar tingkat kesalahan model sekecil mungkin disebut?
            options:
              - Forward Propagation
              - Gradient Descent (Optimizer)
              - Data Ingestion
              - Cloud Computing
            correctAnswerIndex: 1
    - id: computer-vision
      title: 23. Computer Vision (Visi Komputer)
      lessons:
        - id: cv-intro
          title: Bagaimana Komputer Melihat?
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Manusia bisa langsung tahu ada seekor kucing di taman. Tapi bagi komputer, gambar hanyalah tumpukan angka pixel yang tidak ada artinya. Bagaimana cara mengubah angka pixel tersebut menjadi pemahaman bahwa itu adalah "Kucing"?
            **Analogi:** Seperti "Melihat Dunia Melalui Sedotan". Komputer melihat pixel satu per satu. Ia harus mengumpulkan ribuan sedotan (pixel) ini untuk menyusun sebuah gambaran besar.

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** representasi gambar digital (RGB, Matrix) dan **menganalisis** cara kerja filter pada ekstraksi fitur gambar.

            ### 3. Prerequisites
            - Memahami Dasar NumPy (Array Multidimensi).

            ### 4. Core Material
            **Computer Vision (CV)** adalah bidang AI yang fokus pada pengolahan visual.
            - **Pixel**: Kotak terkecil warna.
            - **Channel**: RGB (Red, Green, Blue).
            - **Filter/Kernel**: Matriks kecil yang berjalan di atas gambar untuk mencari garis atau sudut.

            ### 5. Guided Implementation
            ```python
            import cv2
            import numpy as np

            # Membuat gambar hitam kosong
            img = np.zeros((100, 100, 3), dtype="uint8")
            
            # Memberi titik merah di tengah
            img[50, 50] = [0, 0, 255] # Format BGR
            
            print(f"Resolusi: {img.shape}")
            ```

            ### 6. Pro-Tips
            OpenCV menggunakan format warna **BGR** (Blue, Green, Red), bukan RGB standar. Hati-hati saat menampilkan gambar, pastikan kamu mengonversinya jika warnanya terlihat aneh.

            ### 7. Interactive Challenge
            Cari tahu: Apa perbedaan antara gambar **Grayscale** (Hitam-Putih) dan gambar **Biner** (Hitam-Putih murni)? Mana yang lebih hemat memori?

            ### 8. Summary & Next Steps
            Sekarang kamu tahu komputer melihat angka. Selanjutnya, kita akan mempelajari arsitektur khusus yang membuat AI sangat jago mengenali gambar: CNN!
          codeExample: |-
            import numpy as np
            image = np.array([[255, 0], [0, 255]]) # Gambar 2x2 sederhana
            print("Setiap angka mewakili kecerahan pixel (0=Gelap, 255=Terang).")
          quiz:
            question: Bagi komputer, sebuah foto digital sebenarnya direpresentasikan sebagai?
            options:
              - Kumpulan file teks deskripsi.
              - Matriks angka (Array) yang mewakili nilai warna pixel.
              - Gelombang suara yang diubah.
              - Kumpulan link internet.
            correctAnswerIndex: 1
        - id: cnn-theory
          title: Convolutional Neural Networks (CNN)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Jika kamu menggeser posisi kucing di dalam foto sedikit ke kiri, Jaringan Saraf (ANN) biasa akan gagal mengenalinya karena urutan pixelnya berubah total. Kita butuh AI yang "Spatial Invariant" (tahu itu kucing dimanapun posisinya).
            **Analogi:** Seperti "Detektif yang Memakai Kaca Pembesar". Detektif tidak melihat seluruh TKP sekaligus, tapi ia menggeser kaca pembesarnya bagian demi bagian untuk mencari sidik jari atau petunjuk kecil (Fitur).

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **mengonstruksi** lapisan-lapisan utama CNN (Convolution, Pooling, FC) untuk pengenalan pola spasial.

            ### 3. Prerequisites
            - Memahami Dasar Jaringan Saraf.

            ### 4. Core Material
            **CNN** adalah standar industri untuk Gambar.
            1. **Convolution Layer**: Mencari fitur (garis, lengkungan).
            2. **Activation (ReLU)**: Menghilangkan nilai negatif.
            3. **Pooling Layer**: Mengecilkan ukuran gambar agar proses lebih cepat.
            4. **Fully Connected**: Lapisan terakhir yang mengambil keputusan.

            ### 5. Guided Implementation
            ```python
            # Konsep Output Convolution
            # Output = (Input - Kernel + 2*Padding) / Stride + 1
            ```

            ### 6. Pro-Tips
            Gunakan **Max Pooling** untuk mengambil fitur yang paling menonjol dari sebuah area gambar. Ini membantu model tetap akurat meski gambar sedikit bergeser atau miring.

            ### 7. Interactive Challenge
            Sebutkan 3 bagian wajah yang menurutmu akan dideteksi oleh lapisan awal (Convolution) pada sistem Face Recognition.

            ### 8. Summary & Next Steps
            CNN adalah rajanya gambar. Selanjutnya, kita akan belajar cara "Berburu" objek di dalam video secara real-time menggunakan YOLO!
          codeExample: |-
            print("Convolution Layer: Berfungsi sebagai 'Scan' fitur penting pada gambar.")
          quiz:
            question: Apa fungsi utama dari 'Pooling Layer' dalam arsitektur CNN?
            options:
              - Menambah warna pada gambar agar lebih cerah.
              - Mengurangi dimensi/ukuran gambar agar proses perhitungan lebih efisien dan cepat.
              - Menghapus objek yang tidak penting secara otomatis.
              - Mengubah gambar menjadi file suara.
            correctAnswerIndex: 1
        - id: object-detection
          title: Deteksi Objek & YOLO
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Klasifikasi hanya menebak "Ini foto kucing". Tapi untuk mobil otonom (Tesla), ia harus tahu: "Di mana posisi pejalan kaki? Berapa jumlah mobil di depan? Di mana lampu merahnya?". Kita butuh Deteksi Objek.
            **Analogi:** Seperti "Petugas Keamanan (Satpam) yang memantau CCTV". Ia tidak hanya bilang "Ada maling", tapi ia menunjuk: "Itu malingnya, di pojok kiri bawah, lagi lari".

            ### 2. Learning Objectives
            Kamu akan mampu **membedakan** antara Image Classification, Object Detection, dan Segmentation serta **menjelaskan** keunggulan algoritma YOLO.

            ### 3. Prerequisites
            - Memahami CNN.

            ### 4. Core Material
            - **Bounding Box**: Kotak yang mengelilingi objek.
            - **Confidence Score**: Seberapa yakin AI dengan tebakannya.
            - **YOLO (You Only Look Once)**: Algoritma yang memproses seluruh gambar dalam sekali jalan, membuatnya sangat cepat (Real-time).

            ### 5. Guided Implementation
            YOLO membagi gambar menjadi kisi-kisi (Grid). Setiap kotak grid bertanggung jawab menebak objek yang ada di dalamnya.

            ### 6. Pro-Tips
            Jika kamu ingin mendeteksi objek di Video, YOLO adalah pilihan wajib. Algoritma lain mungkin lebih akurat sedikit, tapi YOLO menang telak di sisi kecepatan frame per detik (FPS).

            ### 7. Interactive Challenge
            Cari video demonstrasi "YOLOv8" di YouTube. Perhatikan bagaimana ia mendeteksi ratusan objek di jalan raya dalam hitungan milidetik.

            ### 8. Summary & Next Steps
            Visi komputer sudah dikuasai. Selanjutnya, kita akan belajar bagaimana mengelola seluruh proses pembuatan AI ini dari awal sampai jadi aplikasi nyata!
          codeExample: |-
            print("YOLO: Mendeteksi banyak objek sekaligus dengan kecepatan sangat tinggi.")
          quiz:
            question: Mengapa algoritma YOLO (You Only Look Once) sangat populer di industri dibandingkan algoritma deteksi objek lainnya?
            options:
              - Karena ia yang paling lambat dan detail.
              - Karena kemampuannya memproses gambar/video secara real-time dengan satu kali proses.
              - Karena ia gratis digunakan selamanya.
              - Karena hanya YOLO yang bisa mendeteksi warna.
            correctAnswerIndex: 1
    - id: ai-lifecycle-image
      title: 24. AI Lifecycle & Image Processing
      lessons:
        - id: ai-lifecycle
          title: Siklus Hidup AI (Training - Inference)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Banyak orang berpikir membuat AI itu hanya soal "Training". Padahal, setelah AI itu pintar, bagaimana cara memasangnya di HP user? Bagaimana jika user tidak punya internet? AI yang hebat di laptop dev belum tentu hebat di tangan user.
            **Analogi:** Seperti "Sekolah dan Kerja". Training adalah masa sekolah (belajar dari buku/data). Inference adalah saat bekerja (mempraktekkan ilmu untuk melayani klien).

            ### 2. Learning Objectives
            Kamu akan mampu **mengelola** tahapan pengembangan AI mulai dari Data Ingestion hingga Deployment dan **membedakan** kebutuhan resource antara Training dan Inference.

            ### 3. Prerequisites
            - Memahami Dasar Machine Learning.

            ### 4. Core Material
            1. **Data Prep**: Kumpulkan dan bersihkan data.
            2. **Training**: Masa belajar (butuh GPU, waktu lama).
            3. **Inference**: Masa penggunaan model oleh user (harus cepat, low resource).
            4. **Monitoring**: Cek apakah AI masih pintar atau mulai "bodoh" (Model Drift).

            ### 5. Guided Implementation
            Tahap Inference seringkali membutuhkan **Optimization** agar model AI yang tadinya 1GB bisa mengecil menjadi 50MB saja supaya muat di aplikasi Android/iOS.

            ### 6. Pro-Tips
            Selalu simpan **Metadata** saat training (versi library, tanggal, dataset). Jika tiba-tiba AI kamu error, kamu bisa melacak di versi mana kesalahan itu mulai muncul.

            ### 7. Interactive Challenge
            Kenapa kita tidak melakukan "Training" langsung di HP user? Sebutkan alasan teknisnya (baterai, panas, memori).

            ### 8. Summary & Next Steps
            Siklus hidup AI sudah dipahami. Selanjutnya, kita akan belajar teknik manipulasi gambar tingkat lanjut agar data training kita semakin berkualitas!
          codeExample: |-
            print("Training: Mengajar AI (Lama & Berat).")
            print("Inference: Menggunakan AI (Cepat & Ringan).")
          quiz:
            question: Proses menggunakan model AI yang sudah terlatih untuk memberikan prediksi pada data baru milik pengguna disebut?
            options:
              - Data Cleaning
              - Training
              - Inference
              - Augmentation
            correctAnswerIndex: 2
        - id: image-manipulation
          title: Image Manipulation (Pengolahan Gambar)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Jika kamu hanya punya 100 foto kucing yang semuanya menghadap ke kanan, AI kamu mungkin tidak akan mengenali kucing yang menghadap ke kiri. Kita butuh data yang bervariasi tapi koleksi kita terbatas.
            **Analogi:** Seperti "Latihan Anti-Teror". Pasukan dilatih di berbagai kondisi: hujan, panas, malam, siang. Data Augmentation melakukan hal yang sama: memutar dan mengubah gambar agar AI siap dengan segala kondisi.

            ### 2. Learning Objectives
            Kamu akan mampu **mengimplementasikan** teknik Augmentasi gambar (Resize, Flip, Blur) menggunakan library Pillow atau OpenCV.

            ### 3. Prerequisites
            - Memahami Dasar Computer Vision.

            ### 4. Core Material
            **Image Manipulation** membantu meningkatkan jumlah data secara buatan.
            - **Resizing**: Menyamakan ukuran (misal: 224x224).
            - **Flipping**: Membalik gambar (Horizontal/Vertical).
            - **Rotation**: Memutar gambar.
            - **Normalization**: Mengubah rentang pixel menjadi 0-1.

            ### 5. Guided Implementation
            ```python
            from PIL import Image, ImageOps

            img = Image.open("kucing.jpg")
            
            # Augmentasi: Balik secara horizontal
            img_flipped = ImageOps.mirror(img)
            
            # Resize
            img_small = img.resize((128, 128))
            ```

            ### 6. Pro-Tips
            Hati-hati with **Resize**. Jika rasio gambar aslinya persegi panjang dan kamu paksa jadi kotak tanpa teknik *padding*, gambar akan terlihat "gepeng" dan bisa membingungkan AI.

            ### 7. Interactive Challenge
            Coba bayangkan: Apakah teknik Augmentasi "Flip Vertical" (membalik atas ke bawah) cocok digunakan untuk data training mobil otonom? Kenapa?

            ### 8. Summary & Next Steps
            Selamat! Kamu sekarang ahli visi komputer. Selanjutnya, kita akan masuk ke era AI paling modern yang bisa diajak mengobrol dan berpikir: Generative AI!
          codeExample: |-
            from PIL import Image
            # img = Image.open("test.jpg").convert("L") # Ubah ke Grayscale
            print("Augmentasi Data membantu AI belajar lebih baik dari data yang terbatas.")
          quiz:
            question: Teknik 'Data Augmentation' dilakukan dengan tujuan utama untuk?
            options:
              - Menghapus background gambar secara otomatis.
              - Memperbanyak variasi data training secara buatan agar model AI lebih handal (robust).
              - Membuat resolusi gambar menjadi 4K.
              - Mengubah gambar menjadi file PDF.
            correctAnswerIndex: 1
    - id: gen-ai
      title: 25. Generative AI & LLM
      lessons:
        - id: llm-intro
          title: Large Language Models (LLM)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Menulis kode atau artikel yang panjang butuh waktu berjam-jam. Bagaimana jika ada mesin yang sudah membaca seluruh isi internet dan bisa membantu kita menulis apa saja hanya dalam hitungan detik?
            **Analogi:** Seperti "Perpustakaan Hidup yang Bisa Diajak Ngobrol". LLM telah membaca miliaran buku. Ia tidak hanya menyimpan data, tapi ia paham hubungan antar kata sehingga bisa menjawab pertanyaanmu.

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** mekanisme dasar Large Language Models (LLM) dan **menganalisis** batasan context window pada model AI.

            ### 3. Prerequisites
            - Memahami Dasar Deep Learning (Neural Networks).

            ### 4. Core Material
            **LLM** adalah model AI yang dilatih dengan skala data raksasa untuk memprediksi kata berikutnya dalam sebuah kalimat.
            - **Generative**: Bisa menciptakan konten baru.
            - **Context Window**: Batas jumlah teks yang bisa diingat dalam satu sesi.
            - **Hallucination**: Saat AI mengarang informasi yang terdengar meyakinkan tapi salah.

            ### 5. Guided Implementation
            ```python
            # Konsep memanggil LLM melalui API
            # import ai_library
            # model = ai_library.load("gemini-pro")
            # response = model.chat("Apa itu Python?")
            ```

            ### 6. Pro-Tips
            Jangan pernah percaya 100% pada jawaban LLM untuk hal-hal faktual (seperti angka statistik atau hukum). Selalu lakukan *Cross-Check* karena AI bisa berhalusinasi.

            ### 7. Interactive Challenge
            Coba tanyakan ke AI (ChatGPT/Gemini/Claude): "Siapa pemenang piala dunia tahun 2030?". Perhatikan jawabannya, apakah ia jujur tidak tahu atau mulai berhalusinasi?

            ### 8. Summary & Next Steps
            LLM adalah otak dari AI modern. Selanjutnya, kita akan belajar "Seni Bertanya" agar AI memberikan jawaban yang paling akurat: Prompt Engineering!
          codeExample: |-
            # Contoh penggunaan Gemini API (Simulasi)
            # import google.generativeai as genai
            # model = genai.GenerativeModel('gemini-pro')
            # response = model.generate_content("Jelaskan Python dalam 1 kalimat")
            # print(response.text)
          quiz:
            question: Apa yang dimaksud dengan 'Hallucination' pada model AI bahasa (LLM)?
            options:
              - AI sedang melakukan proses update sistem.
              - AI memberikan jawaban yang terlihat benar namun secara fakta salah atau mengarang.
              - AI menolak menjawab karena pertanyaan terlalu sulit.
              - AI menjawab dengan bahasa yang sangat cepat.
            correctAnswerIndex: 1
        - id: prompt-engineering
          title: Prompt Engineering
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Memberikan perintah "Buat skrip Python" ke AI mungkin akan menghasilkan kode yang terlalu sederhana. Tapi dengan perintah yang detail, AI bisa membuat aplikasi lengkap. Hasil AI sangat bergantung pada caramu bertanya.
            **Analogi:** Seperti "Memesan Jahitan Baju". Jika kamu hanya bilang "Buat baju", hasilnya mungkin tidak pas. Kamu harus bilang "Buat kemeja, warna biru, bahan sutra, ukuran L".

            ### 2. Learning Objectives
            Kamu akan mampu **mengonstruksi** prompt yang efektif menggunakan teknik Few-Shot, Chain of Thought, dan Persona.

            ### 3. Prerequisites
            - Memahami konsep LLM dasar.

            ### 4. Core Material
            Teknik Prompting:
            1. **Persona**: "Bertindaklah sebagai Senior Developer".
            2. **Few-Shot**: Berikan 2-3 contoh sebelum meminta jawaban.
            3. **Chain of Thought**: "Berpikirlah selangkah demi selangkah".

            ### 5. Guided Implementation
            Prompt Buruk: "Jelaskan AI."
            Prompt Bagus: "Kamu adalah guru TK. Jelaskan konsep Artificial Intelligence menggunakan analogi mainan blok kepada anak umur 5 tahun."

            ### 6. Pro-Tips
            Gunakan **Delimiters** (seperti tanda kutip tiga `"""` atau XML tags `<text></text>`) untuk memisahkan instruksi dengan data yang ingin diolah oleh AI.

            ### 7. Interactive Challenge
            Buatlah sebuah prompt untuk meminta AI merangkum sebuah artikel berita, tapi minta AI untuk memberikan rangkuman dalam bentuk poin-poin dan nada bicara yang lucu.

            ### 8. Summary & Next Steps
            Prompting adalah kunci kendali AI. Selanjutnya, kita akan belajar cara memberikan AI akses ke data pribadimu secara aman: RAG!
          codeExample: |-
            print("Prompt Engineering: Seni memberikan instruksi presisi kepada AI.")
          quiz:
            question: Teknik prompting yang meminta AI untuk 'menjelaskan langkah-langkah penalarannya' secara berurutan disebut?
            options:
              - Few-Shot Prompting
              - Chain of Thought
              - Zero-Shot Prompting
              - Negative Prompting
            correctAnswerIndex: 1
        - id: rag-concept
          title: RAG (Retrieval Augmented Generation)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** LLM tahu banyak hal tentang dunia, tapi ia tidak tahu apa isi dokumen rahasia perusahaanmu atau update berita yang baru terjadi 5 menit yang lalu. Haruskah kita melatih ulang (fine-tune) AI tiap jam? Itu sangat mahal.
            **Analogi:** Seperti "Ujian Open Book". AI tidak perlu menghafal semua datamu. Ia cukup diberikan "Buku" (dokumenmu) saat ujian, lalu ia menjawab berdasarkan buku tersebut.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **menguraikan** alur kerja sistem RAG dan **menjelaskan** mengapa RAG meminimalkan halusinasi pada AI.

            ### 3. Prerequisites
            - Memahami LLM dan Vector Embeddings.

            ### 4. Core Material
            **RAG** menghubungkan AI dengan sumber data eksternal.
            1. **Retrieve**: Cari dokumen yang paling relevan dengan pertanyaan user.
            2. **Augment**: Gabungkan dokumen tersebut ke dalam prompt.
            3. **Generate**: AI menjawab berdasarkan data tersebut.

            ### 5. Guided Implementation
            Alur RAG:
            Pertanyaan User -> Cari di Vector DB -> Ketemu Dokumen A -> Prompt: "Jawab pertanyaan user HANYA berdasarkan Dokumen A berikut: ..."

            ### 6. Pro-Tips
            RAG jauh lebih murah dan cepat daripada *Fine-tuning*. Gunakan RAG jika datamu sering berubah (seperti berita atau database stok barang).

            ### 7. Interactive Challenge
            Sebutkan satu skenario di kantormu di mana sistem RAG akan sangat membantu produktivitas karyawan.

            ### 8. Summary & Next Steps
            RAG membuat AI menjadi ahli di bidangmu. Selanjutnya, kita akan belajar teknologi di balik pembuatan gambar spektakuler: Diffusion Models!
          codeExample: |-
            print("RAG: Memberikan konteks data terbaru/pribadi ke AI tanpa training ulang.")
          quiz:
            question: Apa keuntungan utama sistem RAG dibandingkan dengan Fine-tuning untuk data yang terus berubah?
            options:
              - RAG lebih keren tampilannya.
              - RAG jauh lebih murah dan mudah diperbarui karena tidak perlu melatih ulang bobot model.
              - RAG hanya bisa untuk file PDF.
              - RAG membuat AI menjadi lebih lambat.
            correctAnswerIndex: 1
        - id: diffusion-models
          title: Diffusion Models (Image Gen)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Membuat ilustrasi profesional dulu butuh waktu berhari-hari. Sekarang, cukup ketik "Astronot menunggang kuda di bulan", dan gambar muncul. Bagaimana AI bisa "menggambar" dari nol?
            **Analogi:** Seperti "Melihat Bentuk di Awan". Awalnya hanya gumpalan putih tidak jelas (Noise). AI belajar untuk "memahat" gumpalan tersebut sedikit demi sedikit sampai muncul bentuk yang kita inginkan.

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** konsep *Forward* dan *Reverse Diffusion* dalam proses pembuatan gambar oleh AI.

            ### 3. Prerequisites
            - Memahami Dasar Deep Learning.

            ### 4. Core Material
            - **Diffusion**: Proses menambahkan bintik-bintik (noise) ke gambar sampai gambarnya hilang.
            - **Reverse Diffusion**: AI belajar cara membersihkan bintik-bintik tersebut untuk mengembalikan gambar aslinya.

            ### 5. Guided Implementation
            Teknologi populer:
            - **Stable Diffusion**: Bisa dijalankan di komputer sendiri.
            - **Midjourney**: Paling artistik.
            - **DALL-E**: Sangat patuh pada instruksi teks.

            ### 6. Pro-Tips
            Gunakan teknik **Negative Prompt** untuk memberi tahu AI hal apa yang TIDAK boleh ada di gambar (misal: "no blurry", "no extra fingers").

            ### 7. Interactive Challenge
            Coba tebak: Kenapa AI seringkali kesulitan menggambar "Jari Tangan Manusia" dengan jumlah yang benar? (Cari tahu alasannya!).

            ### 8. Summary & Next Steps
            Gambar sudah bisa dibuat. Selanjutnya, kita akan belajar cara "Sekolah Spesialis" untuk AI: Fine-tuning LLM!
          codeExample: |-
            print("Diffusion Models: Menciptakan gambar indah dengan cara membersihkan 'noise'.")
          quiz:
            question: Dalam proses Diffusion Model, apa yang dipelajari oleh AI untuk menciptakan gambar baru?
            options:
              - Cara menyalin gambar dari internet.
              - Cara membersihkan 'noise' secara bertahap untuk membentuk pola gambar yang diminta.
              - Cara menggambar menggunakan pensil digital.
              - Cara mengirim file gambar melalui email.
            correctAnswerIndex: 1
        - id: fine-tuning-llm
          title: Fine-tuning LLM
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** AI umum seperti GPT mungkin tahu dasar-dasar hukum, tapi ia tidak tahu istilah-istilah sangat spesifik di pengadilan Indonesia atau gaya bicara formal seorang pengacara senior. Kita butuh AI yang menjadi "Pakar".
            **Analogi:** Seperti "Kuliah Spesialis". Setelah lulus kedokteran umum (Pre-trained), dokter harus mengambil spesialis Jantung (Fine-tuning) agar benar-benar ahli di satu bidang.

            ### 2. Learning Objectives
            Kamu akan mampu **membedakan** kapan harus menggunakan RAG dan kapan harus melakukan Fine-tuning serta **menjelaskan** konsep Pre-training.

            ### 3. Prerequisites
            - Memahami LLM dasar.

            ### 4. Core Material
            **Fine-tuning** adalah proses melatih kembali model yang sudah pintar (Base Model) dengan dataset yang lebih kecil dan spesifik.
            - **Dataset**: Kumpulan tanya-jawab spesifik bidangmu.
            - **Goal**: Mengubah gaya bicara atau pemahaman istilah teknis AI.

            ### 5. Guided Implementation
            Dataset Fine-tuning biasanya berformat:
            `{"instruction": "Jelaskan pasal 1", "output": "Menurut UU di Indonesia..."}`

            ### 6. Pro-Tips
            Fine-tuning sangat mahal (butuh banyak GPU). Lakukan RAG terlebih dahulu. Jika RAG tetap tidak memberikan hasil yang diinginkan, baru pertimbangkan Fine-tuning.

            ### 7. Interactive Challenge
            Sebutkan satu profesi yang menurutmu sangat butuh model AI yang sudah di-Fine-tune khusus (misal: Ahli Nuklir, Penerjemah Bahasa Kuno).

            ### 8. Summary & Next Steps
            AI sekarang sudah sangat ahli. Namun, ia masih pasif (hanya menjawab). Selanjutnya, kita akan belajar cara membuat AI yang bisa bertindak mandiri: AI Agents!
          codeExample: |-
            print("Fine-tuning: Melatih kembali model pintar untuk menjadi ahli di bidang spesifik.")
          quiz:
