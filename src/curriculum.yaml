    - id: data-prep-feature-eng
      title: 20. Data Preparation & Feature Engineering
      lessons:
        - id: data-cleaning
          title: Data Cleaning (Pembersihan Data)
          content: |-
            **Tujuan Pembelajaran:** Melakukan pra-pemrosesan data agar model AI tidak belajar dari data yang salah atau bias.

            "Garbage In, Garbage Out". Jika data masukan kotor, maka hasil prediksi AI juga akan buruk. Pembersihan data adalah tahap yang paling memakan waktu (sekitar 80%) bagi seorang praktisi data.

            **Langkah Pembersihan:**
            - **Handling Missing Values**: Menghapus baris kosong atau mengisinya dengan rata-rata (Mean Imputation).
            - **Removing Duplicates**: Menghapus data ganda yang tidak sengaja terinput dua kali.
            - **Outlier Removal**: Membuang data ekstrem yang tidak masuk akal (misal: harga barang Rp 0 atau umur -5 tahun).
            - **Data Standardization**: Menyeragamkan format (misal: mengubah "Laki-laki" dan "L" menjadi "L").
          codeExample: |-
            import pandas as pd

            df = pd.read_csv("data_kotor.csv")

            # 1. Hapus duplikat
            df = df.drop_duplicates()

            # 2. Isi nilai kosong dengan angka 0
            df["stok"] = df["stok"].fillna(0)

            # 3. Hapus baris yang nama produknya kosong
            df = df.dropna(subset=["nama_produk"])
        - id: feature-scaling
          title: Feature Scaling (Penyekalaan)
          content: |-
            **Tujuan Pembelajaran:** Menyeimbangkan rentang angka antar fitur agar algoritma AI dapat belajar dengan lebih stabil.

            Banyak algoritma (seperti KNN atau SVM) sensitif terhadap perbedaan skala. Jika fitur "Gaji" bernilai jutaan dan "Umur" bernilai puluhan, algoritma akan menganggap Gaji jauh lebih penting hanya karena angkanya lebih besar.

            **Teknik Utama:**
            - **Normalization (Min-Max)**: Mengubah angka ke rentang 0 sampai 1.
            - **Standardization (Z-Score)**: Mengubah angka agar memiliki rata-rata 0 dan standar deviasi 1 (lebih tahan terhadap outlier).
          codeExample: |-
            from sklearn.preprocessing import StandardScaler

            data = [[1000000, 25], [2000000, 30], [1500000, 28]]
            scaler = StandardScaler()

            # Menghitung dan mengubah data
            data_scaled = scaler.fit_transform(data)
            print(f"Data setelah di-scale:\n{data_scaled}")
        - id: categorical-encoding
          title: Categorical Encoding
          content: |-
            **Tujuan Pembelajaran:** Mengonversi data teks (kategori) menjadi angka agar bisa diproses secara matematis oleh komputer.

            Komputer tidak mengerti kata "Kucing" atau "Anjing". Mereka butuh angka.

            **Teknik Encoding:**
            - **One-Hot Encoding**: Membuat kolom baru untuk setiap kategori (berisi 0 atau 1). Cocok untuk data tanpa urutan (misal: Warna, Kota).
            - **Label Encoding**: Memberi angka urut (0, 1, 2...). Cocok untuk data yang memiliki tingkatan (misal: SD, SMP, SMA).
          codeExample: |-
            import pandas as pd

            df = pd.DataFrame({"warna": ["Merah", "Biru", "Hijau"]})

            # One-Hot Encoding menggunakan Pandas
            encoded = pd.get_dummies(df, columns=["warna"])
            print(encoded)
        - id: feature-engineering-detail
          title: Seni Feature Engineering
          content: |-
            **Tujuan Pembelajaran:** Menciptakan fitur baru dari data yang sudah ada untuk meningkatkan akurasi model AI.

            Feature Engineering adalah tempat kreativitas seorang Data Scientist diuji. Kita membuat variabel baru yang memberikan "petunjuk" lebih kuat kepada AI.

            **Contoh Kreatif:**
            - **Datetime**: Dari "2023-12-25", kita buat fitur baru "Hari Libur (Yes/No)".
            - **Binning**: Dari "Umur 17, 18, 19", kita kelompokkan menjadi kategori "Remaja".
            - **Kombinasi**: Menggabungkan "Luas Bangunan" dan "Jumlah Kamar" menjadi "Rasio Luas per Kamar".
          quiz:
            question: Manakah dari berikut ini yang merupakan contoh dari Feature Engineering?
            options:
              - Menghapus data yang rusak.
              - Mengubah format tanggal menjadi kolom baru 'Hari dalam Minggu'.
              - Membeli server baru yang lebih cepat.
              - Menambah jumlah data secara manual.
            correctAnswerIndex: 1
        - id: feature-selection
          title: Feature Selection (Pemilihan Fitur)
          content: |-
            **Tujuan Pembelajaran:** Memilih hanya fitur yang paling berpengaruh untuk mempercepat proses training dan mencegah overfitting.

            Tidak semua data berguna. Terlalu banyak fitur yang tidak relevan (noise) justru bisa membingungkan model AI.

            **Teknik Pemilihan:**
            - **Correlation Heatmap**: Mencari fitur yang hubungannya sangat kuat dengan target.
            - **Recursive Feature Elimination (RFE)**: Menghapus fitur satu per satu dan melihat dampaknya pada akurasi.
            - **Feature Importance**: Menggunakan model (seperti Random Forest) untuk melihat skor kontribusi tiap fitur.
          quiz:
            question: Apa tujuan utama dari Feature Selection?
            options:
              - Menambah sebanyak mungkin kolom data agar AI makin pintar.
              - Mengurangi 'noise' dan mempercepat proses training dengan hanya menggunakan fitur relevan.
              - Mengubah format file data dari CSV ke JSON.
              - Mencadangkan data ke server awan.
            correctAnswerIndex: 1
- id: ai-engineer
  title: AI Engineer
  description: Machine Learning, Deep Learning, dan AI Engineering.
  modules:
    - id: machine-learning
      title: 21. Machine Learning
      lessons:
        - id: ml-intro
          title: Apa itu Machine Learning?
          content: |-
            **Tujuan Pembelajaran:** Memahami konsep dasar bagaimana komputer "belajar" dari data tanpa instruksi pemrograman yang kaku.

            Machine Learning (ML) adalah cabang AI yang fokus pada penggunaan data dan algoritma untuk meniru cara manusia belajar, secara bertahap meningkatkan akurasinya.

            **Tipe Utama ML:**
            - **Supervised Learning**: Belajar dari data yang sudah ada labelnya (misal: memprediksi harga rumah berdasarkan data penjualan tahun lalu).
            - **Unsupervised Learning**: Mencari pola tersembunyi dari data yang tidak berlabel (misal: mengelompokkan pelanggan berdasarkan perilaku belanja).
            - **Reinforcement Learning**: Belajar melalui sistem hadiah dan hukuman (misal: AI yang belajar bermain catur).
          codeExample: |-
            # Menggunakan Scikit-Learn untuk Linear Regression (Supervised)
            from sklearn.linear_model import LinearRegression
            import numpy as np

            # Data: X (Luas Rumah), y (Harga)
            X = np.array([[50], [80], [100], [120]])
            y = np.array([500, 800, 1000, 1200])

            model = LinearRegression()
            model.fit(X, y) # Proses Belajar

            prediksi = model.predict([[150]])
            print(f"Prediksi harga rumah luas 150m2: {prediksi[0]}")
        - id: classification-deep-dive
          title: Klasifikasi (Classification)
          content: |-
            **Tujuan Pembelajaran:** Memahami tugas AI dalam mengelompokkan data ke dalam kategori-kategori tertentu.

            Klasifikasi adalah proses memprediksi label kategori (output diskrit) dari data masukan.

            **Contoh Klasifikasi:**
            - **Binary Classification**: Hanya dua pilihan (Ya/Tidak, Spam/Bukan).
            - **Multi-class Classification**: Lebih dari dua pilihan (Warna: Merah, Biru, Hijau).

            **Algoritma Populer:**
            - **Logistic Regression**: Dasar klasifikasi.
            - **Random Forest**: Kumpulan "pohon keputusan" yang sangat akurat.
            - **SVM (Support Vector Machine)**: Mencari garis pemisah terbaik antar kategori.
          codeExample: |-
            from sklearn.ensemble import RandomForestClassifier

            # Fitur: [Berat, Tekstur (0=Halus, 1=Kasar)]
            X = [[140, 0], [130, 0], [150, 1], [170, 1]]
            y = ["Apel", "Apel", "Jeruk", "Jeruk"]

            clf = RandomForestClassifier()
            clf.fit(X, y)

            print(f"Hasil tebakan: {clf.predict([[160, 1]])}") # Prediksi Jeruk
        - id: scikit-learn
          title: Scikit-Learn Dasar
          content: |-
            **Tujuan Pembelajaran:** Menguasai "Swiss Army Knife" dari library Machine Learning di Python.

            **Scikit-Learn (sklearn)** adalah library paling populer untuk ML tradisional. Ia menyediakan alat yang seragam untuk pembersihan data, pemilihan model, hingga evaluasi.

            **Alur Kerja Standar Sklearn:**
            1. **Preprocessing**: Membersihkan data.
            2. **Train/Test Split**: Membagi data (misal 80% untuk belajar, 20% untuk ujian).
            3. **Model Selection**: Memilih algoritma.
            4. **Fit**: Melatih model.
            5. **Predict & Evaluate**: Mencoba model dan melihat akurasinya.
          codeExample: |-
            from sklearn.model_selection import train_test_split
            from sklearn.metrics import accuracy_score

            # X_train, X_test, y_train, y_test = train_test_split(X, y, test_size=0.2)
            # model.fit(X_train, y_train)
            # prediksi = model.predict(X_test)
            # print(f"Akurasi: {accuracy_score(y_test, prediksi)}")
    - id: deep-learning
      title: 22. Deep Learning & Neural Networks
      lessons:
        - id: neural-networks-theory
          title: Teori Jaringan Saraf
          content: |-
            **Tujuan Pembelajaran:** Memahami arsitektur dasar Jaringan Saraf Tiruan (Artificial Neural Networks) yang terinspirasi dari otak manusia.

            Deep Learning adalah bagian dari Machine Learning yang menggunakan jaringan saraf berlapis-lapis untuk memproses data yang sangat kompleks (seperti gambar, suara, dan teks).

            **Komponen Utama:**
            - **Input Layer**: Tempat masuknya data mentah.
            - **Hidden Layers**: Lapisan-lapisan di tengah tempat AI mencari pola hubungan antar data.
            - **Output Layer**: Hasil akhir prediksi.
            - **Neuron/Node**: Unit pemroses terkecil yang melakukan perhitungan matematika sederhana.
          codeExample: |-
            # Konsep dasar perhitungan satu neuron
            # output = activation_function((input * weight) + bias)

            import numpy as np

            def sigmoid(x):
                return 1 / (1 + np.exp(-x))

            inputs = np.array([0.5, 0.8])
            weights = np.array([0.4, 0.7])
            bias = 0.1

            output = sigmoid(np.dot(inputs, weights) + bias)
            print(f"Output Neuron: {output:.4f}")
        - id: backpropagation
          title: Backpropagation & Gradient Descent
          content: |-
            **Tujuan Pembelajaran:** Memahami bagaimana AI memperbaiki dirinya sendiri saat melakukan kesalahan.

            AI tidak langsung pintar. Ia belajar melalui iterasi (perulangan) menggunakan dua mekanisme utama:

            **1. Forward Propagation:** AI mencoba menebak data.
            **2. Loss Function:** Menghitung seberapa jauh tebakan AI dari kenyataan (misal: menebak harga rumah 500jt padahal aslinya 800jt).
            **3. Backpropagation:** Menghitung kontribusi kesalahan ke setiap neuron di belakang.
            **4. Gradient Descent (Optimizer):** Mengubah nilai *weights* sedikit demi sedikit agar kesalahan di masa depan berkurang.
          quiz:
            question: Apa fungsi utama dari 'Optimizer' (seperti Gradient Descent) dalam training AI?
            options:
              - Menghapus data yang tidak terpakai.
              - Mengubah nilai weights/bobot neuron agar tingkat kesalahan (loss) mengecil.
              - Mengubah gambar menjadi teks.
              - Mempercepat koneksi internet saat training.
            correctAnswerIndex: 1
    - id: computer-vision
      title: 23. Computer Vision (Visi Komputer)
      lessons:
        - id: cv-intro
          title: Bagaimana Komputer Melihat?
          content: |-
            **Tujuan Pembelajaran:** Memahami representasi gambar digital di mata komputer.

            Bagi manusia, gambar adalah warna dan bentuk. Bagi komputer, gambar hanyalah sebuah matriks angka (array multidimensi).

            **Representasi Gambar:**
            - **Piksel**: Titik terkecil dalam gambar.
            - **Resolusi**: Jumlah piksel (Tinggi x Lebar).
            - **Saluran Warna (Channels)**: 
              - Grayscale: Hanya 1 saluran (0-255).
              - RGB: 3 saluran (Red, Green, Blue).
          codeExample: |-
            # Menggunakan library OpenCV untuk membaca gambar
            import cv2
            import numpy as np

            # Membuat "gambar" hitam kosong 100x100 piksel
            img = np.zeros((100, 100, 3), dtype="uint8")
            
            # Memberi warna merah pada satu titik
            img[50, 50] = [0, 0, 255] # BGR format
            
            print(f"Bentuk Gambar (Tinggi, Lebar, Channel): {img.shape}")
        - id: cnn-theory
          title: Convolutional Neural Networks (CNN)
          content: |-
            **Tujuan Pembelajaran:** Memahami arsitektur standar AI yang digunakan untuk mengenali objek dalam gambar.

            CNN dirancang khusus untuk menangani data spasial (gambar). Ia menggunakan konsep "Filter" untuk mendeteksi fitur secara otomatis.

            **Lapisan Utama CNN:**
            1. **Convolution Layer**: Menggunakan filter untuk mencari garis, sudut, atau tekstur.
            2. **Activation (ReLU)**: Menghilangkan nilai negatif agar model lebih stabil.
            3. **Pooling Layer**: Mengurangi ukuran matriks (downsampling) agar proses lebih cepat tanpa kehilangan informasi penting.
            4. **Fully Connected Layer**: Lapisan akhir untuk memutuskan gambar itu apa (misal: Anjing atau Kucing).
          quiz:
            question: Apa fungsi dari lapisan 'Convolution' dalam CNN?
            options:
              - Mengubah gambar menjadi teks deskripsi.
              - Menggunakan filter untuk mengekstrak fitur penting (seperti garis atau pola).
              - Menghapus seluruh warna dari gambar.
              - Mengirim gambar ke database awan.
            correctAnswerIndex: 1
        - id: object-detection
          title: Deteksi Objek & YOLO
          content: |-
            **Tujuan Pembelajaran:** Memahami perbedaan antara klasifikasi gambar dan deteksi objek.

            **Deteksi Objek** tidak hanya memberi tahu "Ada apa di gambar ini?" tapi juga "Di mana letaknya?". Ia menghasilkan kotak pembatas (*Bounding Box*).

            **YOLO (You Only Look Once):**
            Algoritma deteksi objek yang sangat revolusioner karena kecepatannya. YOLO membagi gambar menjadi kotak-kotak grid dan memprediksi objek di seluruh grid secara bersamaan dalam satu kali proses (real-time).
          quiz:
            question: Apa kelebihan utama algoritma YOLO dibandingkan algoritma deteksi objek lainnya?
            options:
              - Lebih lambat tapi sangat detail.
              - Sangat cepat sehingga bisa digunakan untuk video real-time.
              - Hanya bisa mendeteksi warna hitam putih.
              - Membutuhkan komputer tanpa GPU.
            correctAnswerIndex: 1
    - id: ai-lifecycle-image
      title: 24. AI Lifecycle & Image Processing
      lessons:
        - id: ai-lifecycle
          title: Siklus Hidup AI (Training - Inference)
          content: |-
            **Tujuan Pembelajaran:** Memahami alur kerja lengkap dari pengembangan model AI hingga digunakan oleh pengguna akhir.

            Membangun AI bukan hanya soal menulis algoritma, tapi soal mengelola data dan komputasi.

            **Tahapan Utama:**
            1. **Pre-processing**: Membersihkan data mentah agar siap "dimakan" AI.
            2. **Training**: Model AI belajar pola dari data. Tahap ini berat dan memakan waktu lama (membutuhkan GPU/TPU).
            3. **Evaluation**: Menguji model dengan data baru untuk melihat seberapa pintar dia.
            4. **Inference**: Menggunakan model yang sudah jadi untuk melayani pengguna (misal: menebak isi foto yang diunggah user). Tahap ini harus sangat cepat.
          quiz:
            question: Tahapan mana yang bertugas menggunakan model AI yang sudah terlatih untuk melayani pengguna secara real-time?
            options:
              - Pre-processing
              - Training
              - Inference
              - Data Collection
            correctAnswerIndex: 2
        - id: image-manipulation
          title: Image Manipulation (Pengolahan Gambar)
          content: |-
            **Tujuan Pembelajaran:** Memodifikasi gambar agar lebih optimal saat diproses oleh model Computer Vision.

            Sebelum gambar masuk ke model AI, kita sering melakukan modifikasi untuk meningkatkan akurasi atau menyamakan format.

            **Teknik Dasar:**
            - **Resizing**: Menyamakan ukuran gambar (misal: semua jadi 224x224 piksel).
            - **Normalization**: Mengubah rentang warna 0-255 menjadi 0-1 agar perhitungan matematika lebih stabil.
            - **Augmentation**: Memutar atau membalik gambar agar model AI belajar bahwa "Kucing terbalik pun tetap Kucing".
          codeExample: |-
            from PIL import Image, ImageOps

            # Membuka gambar
            img = Image.open("foto.jpg")

            # 1. Resize
            img_small = img.resize((128, 128))

            # 2. Convert ke Grayscale (Hitam Putih)
            img_bw = img.convert("L")

            # 3. Mirror (Augmentation)
            img_flip = ImageOps.mirror(img)
            
            img_small.save("output.jpg")
    - id: gen-ai
      title: 25. Generative AI & LLM
      lessons:
        - id: llm-intro
          title: Large Language Models (LLM)
          content: |-
            **Tujuan Pembelajaran:** Memahami cara kerja model AI bahasa berskala raksasa.

            LLM seperti Gemini, GPT-4, atau Claude adalah model yang dilatih menggunakan triliunan kata dari internet untuk memprediksi kata berikutnya dalam sebuah kalimat.

            **Karakteristik LLM:**
            - **Generatif**: Bisa membuat teks baru, kode program, hingga puisi.
            - **Multimodal**: Model terbaru bisa memahami gambar, suara, dan video sekaligus.
            - **Context Window**: Batas jumlah teks yang bisa "diingat" AI dalam satu percakapan.
          codeExample: |-
            # Contoh penggunaan Gemini API (Simulasi)
            # import google.generativeai as genai
            # model = genai.GenerativeModel('gemini-pro')
            # response = model.generate_content("Jelaskan Python dalam 1 kalimat")
            # print(response.text)
        - id: prompt-engineering
          title: Prompt Engineering
          content: |-
            **Tujuan Pembelajaran:** Teknik memberikan instruksi yang presisi agar AI memberikan hasil yang akurat.

            Prompt adalah input teks yang kita berikan ke AI. *Prompt Engineering* adalah seni merancang input tersebut.

            **Teknik Populer:**
            - **Few-Shot Prompting**: Memberikan beberapa contoh sebelum meminta hasil.
            - **Chain of Thought**: Meminta AI untuk "berpikir selangkah demi selangkah".
            - **Persona**: Meminta AI berpura-berpura menjadi ahli tertentu (misal: "Bertindaklah sebagai Senior Python Developer").
          quiz:
            question: Apa yang dimaksud dengan teknik 'Chain of Thought' dalam prompting?
            options:
              - Memberikan instruksi yang sangat pendek.
              - Meminta AI menjelaskan langkah-langkah penalarannya secara berurutan.
              - Menyuruh AI menjawab dengan bahasa asing.
              - Mengulang-ulang perintah yang sama.
            correctAnswerIndex: 1
        - id: rag-concept
          title: RAG (Retrieval Augmented Generation)
          content: |-
            **Tujuan Pembelajaran:** Menghubungkan AI dengan data internal perusahaan tanpa harus melatih ulang model.

            LLM punya pengetahuan umum, tapi tidak tahu data pribadi Anda (misal: dokumen SOP kantor). **RAG** memecahkan ini dengan cara:
            1. AI mencari dokumen relevan di database Anda.
            2. Dokumen tersebut digabungkan ke dalam prompt.
            3. AI menjawab berdasarkan dokumen tersebut.

            Ini membuat jawaban AI lebih akurat dan minim halusinasi (mengarang bebas).
          quiz:
            question: Apa manfaat utama dari sistem RAG?
            options:
              - Membuat AI menjadi lebih murah.
              - Memungkinkan AI menjawab berdasarkan data terbaru/pribadi tanpa training ulang.
              - Mengubah AI teks menjadi AI gambar.
              - Menghapus kebutuhan akan API key.
            correctAnswerIndex: 1
        - id: diffusion-models
          title: Diffusion Models (Image Gen)
          content: |-
            **Tujuan Pembelajaran:** Memahami teknologi di balik AI pembuat gambar (Midjourney, DALL-E, Stable Diffusion).

            Berbeda dengan LLM, *Diffusion Models* bekerja dengan cara:
            1. Mengambil gambar yang penuh bintik (noise).
            2. Belajar membersihkan bintik tersebut sedikit demi sedikit hingga menjadi gambar yang jelas sesuai teks deskripsi pengguna.
          quiz:
            question: Bagaimana cara kerja dasar Diffusion Models dalam pembuatan gambar?
            options:
              - Menyusun potongan foto dari internet.
              - Membersihkan 'noise' (bintik-bintik) secara bertahap hingga menjadi gambar utuh.
              - Menggambar garis satu per satu secara manual.
              - Menggunakan filter kamera biasa.
            correctAnswerIndex: 1
        - id: fine-tuning-llm
          title: Fine-tuning LLM
          content: |-
            **Tujuan Pembelajaran:** Melatih kembali model AI yang sudah pintar agar menjadi ahli di bidang yang sangat spesifik.

            Jika RAG adalah "memberikan buku referensi ke AI", maka Fine-tuning adalah "menyekolahkan AI" ke jurusan spesifik (misal: Hukum, Kedokteran, atau Logat Daerah tertentu).

            **Kapan Fine-tuning?**
            - Saat butuh gaya bicara yang sangat khusus.
            - Saat data sangat banyak dan tidak berubah-ubah.
            - Saat ingin model yang lebih kecil tapi tetap pintar di satu bidang.
          quiz:
            question: Apa perbedaan utama antara RAG dan Fine-tuning?
            options:
              - RAG lebih mahal daripada Fine-tuning.
              - Fine-tuning mengubah bobot internal model, RAG hanya memberikan konteks tambahan.
              - RAG hanya untuk gambar, Fine-tuning hanya untuk teks.
              - Tidak ada perbedaan antara keduanya.
            correctAnswerIndex: 1
        - id: ai-agents
          title: AI Agents & Tool Use
          content: |-
            **Tujuan Pembelajaran:** Memahami masa depan AI yang tidak hanya bicara, tapi juga bisa bertindak (Agentic AI).

            AI Agent adalah AI yang diberikan kemampuan untuk menggunakan alat (*Tools*).
            
            **Contoh Skenario:**
            User: "Cari harga tiket termurah ke Bali besok dan pesan satu."
            Agent akan:
            1. Menggunakan **Tool Browser** untuk cari harga.
            2. Menggunakan **Tool Kalkulator** hitung total.
            3. Menggunakan **Tool API Pembayaran** untuk transaksi.
          codeExample: |-
            # Agent menggunakan Tool (Konsep)
            # @tool
            # def cek_stok(barang):
            #     return database.query(barang)
            
            # response = agent.run("Berapa sisa stok laptop?")
    - id: embeddings
      title: 26. Vector Embeddings
      lessons:
        - id: text-embeddings
          title: Text Embeddings
          content: |-
            **Tujuan Pembelajaran:** Mengonversi makna kata menjadi koordinat angka (vektor) yang bisa dipahami komputer.

            Text Embedding adalah proses mengubah teks menjadi deretan angka berdimensi tinggi. Kata-kata yang memiliki makna serupa (misal: "Raja" dan "Ratu") akan memiliki nilai vektor yang berdekatan dalam ruang matematis tersebut.

            **Kegunaan:**
            - **Pencarian Semantik**: Mencari dokumen berdasarkan makna, bukan hanya kecocokan kata kunci.
            - **RAG**: Mengambil dokumen yang relevan untuk diberikan ke LLM.
            - **Analisis Sentimen**: Mengelompokkan teks berdasarkan nuansa bahasa.
          codeExample: |-
            # Contoh konsep (Menggunakan library simulasi)
            # model = EmbeddingModel()
            # vektor1 = model.encode("Kucing")
            # vektor2 = model.encode("Anak Kucing")
            # print(similarity(vektor1, vektor2)) # Hasil mendekati 1.0
        - id: image-embeddings
          title: Image Embeddings
          content: |-
            **Tujuan Pembelajaran:** Mengubah fitur visual gambar menjadi representasi numerik.

            Sama seperti teks, Image Embedding mengekstrak ciri khas gambar (bentuk, warna, tekstur) menjadi vektor. Ini memungkinkan komputer untuk membandingkan dua gambar secara matematis.

            **Kegunaan:**
            - **Reverse Image Search**: Mencari gambar serupa di Google Images.
            - **Deteksi Duplikat**: Menemukan foto yang sama meski ukurannya berbeda.
            - **Face Recognition**: Membandingkan wajah pengguna dengan database.
          codeExample: |-
            # Menggunakan model ResNet/CLIP untuk ekstraksi (Simulasi)
            # features = model.extract_features(image)
            # print(features.shape) # Misal: (512,)
        - id: multimodal-embeddings
          title: Multimodal Embeddings (CLIP)
          content: |-
            **Tujuan Pembelajaran:** Menghubungkan teks dan gambar ke dalam satu ruang koordinat yang sama.

            Teknik canggih seperti **CLIP** (oleh OpenAI) memungkinkan kita membandingkan teks dengan gambar secara langsung.

            **Cara Kerja:**
            AI dilatih dengan jutaan pasangan gambar dan teks deskripsinya. Hasilnya, vektor kata "Gunung Salju" akan sangat dekat dengan vektor foto gunung yang tertutup salju. Ini memungkinkan fitur "Search by Text" pada galeri foto Anda.
          quiz:
            question: Apa yang memungkinkan kita mencari gambar menggunakan deskripsi teks secara akurat?
            options:
              - Nama file gambar harus benar.
              - Multimodal Embeddings (seperti CLIP) yang menyatukan teks dan gambar dalam satu ruang vektor.
              - Gambar harus memiliki watermark teks.
              - Koneksi internet yang sangat cepat.
            correctAnswerIndex: 1
        - id: vector-databases
          title: Vector Databases
          content: |-
            **Tujuan Pembelajaran:** Memahami tempat penyimpanan khusus untuk data embedding dalam skala jutaan.

            Database tradisional (seperti MySQL) tidak efisien untuk mencari vektor terdekat. Kita butuh **Vector Database**.

            **Fitur Utama:**
            - **ANN Search (Approximate Nearest Neighbor)**: Mencari vektor paling mirip dalam hitungan milidetik.
            - **Scalability**: Mampu menyimpan miliaran embedding.
            
            **Contoh Populer**: Pinecone, Milvus, Weaviate, ChromaDB.
          quiz:
            question: Mengapa kita membutuhkan Vector Database alih-alih database SQL biasa untuk sistem RAG?
            options:
              - Karena Vector Database lebih murah.
              - Database SQL tidak bisa menyimpan angka desimal.
              - Vector Database dioptimasi untuk pencarian kemiripan vektor (similarity search) secara cepat.
              - Database SQL tidak mendukung bahasa Python.
            correctAnswerIndex: 2
    - id: reinforcement-learning
      title: 27. Reinforcement Learning (RL)
      lessons:
        - id: rl-basics
          title: Belajar dari Hadiah (Rewards)
          content: |-
            **Tujuan Pembelajaran:** Memahami paradigma belajar AI melalui interaksi dengan lingkungan.

            Berbeda dengan Supervised Learning yang butuh label, RL belajar melalui sistem "Reward" (hadiah) dan "Punishment" (hukuman). Mirip seperti melatih hewan peliharaan.

            **Elemen RL:**
            - **Agent**: Si AI yang sedang belajar.
            - **Environment**: Dunia tempat Agent berada (misal: papan catur).
            - **State**: Kondisi Agent saat ini (misal: posisi bidak catur).
            - **Action**: Apa yang dilakukan Agent (misal: melangkah ke kiri).
            - **Reward**: Hadiah yang didapat jika tindakannya benar.
          quiz:
            question: Dalam paradigma Reinforcement Learning, apa yang menjadi panduan utama bagi AI untuk belajar?
            options:
              - Label data dari manusia.
              - Sistem hadiah (reward) dan hukuman dari lingkungan.
              - Rumus matematika yang tidak bisa berubah.
              - Kecepatan internet.
            correctAnswerIndex: 1
        - id: mdp-intro
          title: Markov Decision Process (MDP)
          content: |-
            **Tujuan Pembelajaran:** Memahami kerangka matematika di balik pengambilan keputusan AI.

            MDP adalah dasar formal dari Reinforcement Learning. Ia mengasumsikan bahwa masa depan hanya bergantung pada kondisi saat ini, bukan masa lalu (Markov Property).

            **Komponen MDP:**
            - **S (States)**: Semua kemungkinan kondisi.
            - **A (Actions)**: Semua kemungkinan tindakan.
            - **P (Transition Probability)**: Peluang pindah ke state baru.
            - **R (Reward)**: Nilai hadiah yang didapat.
            - **Gamma (γ)**: Faktor diskon untuk menentukan seberapa penting hadiah di masa depan.
          quiz:
            question: Apa yang dimaksud dengan 'Markov Property' dalam MDP?
            options:
              - AI harus mengingat semua kejadian dari awal.
              - Kondisi masa depan hanya bergantung pada kondisi saat ini.
              - AI tidak boleh mengambil tindakan yang sama dua kali.
              - Hadiah selalu bernilai negatif.
            correctAnswerIndex: 1
        - id: q-learning
          title: Q-Learning & Eksplorasi
          content: |-
            **Tujuan Pembelajaran:** Memahami algoritma klasik untuk menemukan strategi terbaik.

            **Q-Learning** bertujuan untuk membangun "Q-Table", sebuah tabel petunjuk yang memberi tahu Agent: "Jika kamu di kondisi X, lakukan tindakan Y untuk dapat hadiah maksimal".

            **Eksplorasi vs Eksploitasi:**
            - **Exploration**: AI mencoba hal baru (mungkin dapat hadiah lebih besar).
            - **Exploitation**: AI melakukan apa yang sudah dia tahu berhasil.
          codeExample: |-
            # Update Nilai Q (Konsep Matematika)
            # Q(s,a) = Q(s,a) + alpha * (reward + gamma * max(Q(s',a')) - Q(s,a))
        - id: rl-applications
          title: Aplikasi RL
          content: |-
            **Tujuan Pembelajaran:** Melihat implementasi nyata RL di industri teknologi.

            RL sangat kuat untuk masalah yang membutuhkan strategi jangka panjang:
            - **Game**: AlphaGo (mengalahkan juara dunia Go), OpenAI Five (Dota 2).
            - **Robotika**: Melatih tangan robot mengambil barang yang licin.
            - **Finansial**: Trading saham otomatis yang adaptif terhadap pasar.
            - **Sistem Rekomendasi**: Menampilkan konten yang membuat user betah lebih lama.
          quiz:
            question: Bidang mana yang sangat cocok menggunakan Reinforcement Learning karena membutuhkan strategi berurutan?
            options:
              - Klasifikasi foto kucing dan anjing.
              - Robotika dan permainan strategi (game).
              - Menghitung jumlah kata dalam dokumen.
              - Mengubah format file musik.
            correctAnswerIndex: 1
        - id: ppo-theory
          title: PPO (Proximal Policy Optimization)
          content: |-
            **Tujuan Pembelajaran:** Memahami algoritma RL modern yang stabil dan efisien.

            PPO adalah standar industri saat ini (digunakan oleh OpenAI). Masalah utama RL lama adalah jika AI belajar terlalu drastis, strateginya bisa rusak total.

            **Kelebihan PPO:**
            Ia menggunakan mekanisme "Clipping" yang membatasi seberapa banyak strategi (policy) boleh berubah dalam satu langkah belajar. Ini memastikan proses belajar tetap stabil dan tidak "mogok" di tengah jalan.
          codeExample: |-
            # PPO membatasi perubahan rasio probabilitas tindakan
            # Clipped Objective Function (Konsep)
            # L = min(ratio * advantage, clipped_ratio * advantage)
        - id: marl-intro
          title: MARL (Multi-Agent RL)
          content: |-
            **Tujuan Pembelajaran:** Memahami interaksi antar banyak AI dalam satu lingkungan.

            Dalam **Multi-Agent Reinforcement Learning**, Agent tidak sendirian. Ada Agent lain yang juga sedang belajar dan berubah.

            **Jenis Interaksi:**
            - **Cooperative**: Semua Agent bekerja sama untuk satu tujuan.
            - **Competitive**: Agent saling menjatuhkan (seperti bermain catur).
            - **Mixed**: Campuran keduanya (seperti dalam sepak bola).
          quiz:
            question: Apa tantangan terbesar dalam MARL (Multi-Agent RL)?
            options:
              - Lingkungan menjadi tidak stabil (non-stationary) karena semua agent berubah secara bersamaan.
              - Harga server menjadi murah.
              - AI tidak bisa berkomunikasi dengan kabel.
              - Data menjadi terlalu sedikit.
            correctAnswerIndex: 0
    - id: forecasting
      title: 28. Time Series & Forecasting
      lessons:
        - id: time-series-intro
          title: Mengenal Time Series
          content: |-
            **Tujuan Pembelajaran:** Memahami karakteristik data yang memiliki dimensi waktu.

            Time Series (Deret Waktu) adalah sekumpulan pengamatan yang dicatat secara berurutan berdasarkan waktu (detik, jam, hari, bulan, atau tahun).

            **Komponen Time Series:**
            - **Trend**: Kenaikan atau penurunan jangka panjang (misal: harga emas).
            - **Seasonality**: Pola yang berulang pada periode tertentu (misal: penjualan es krim naik di musim panas).
            - **Cyclical**: Pola naik-turun yang durasinya tidak tetap.
            - **Noise/Residual**: Variasi acak yang tidak bisa dijelaskan.
          quiz:
            question: Apa yang dimaksud dengan 'Seasonality' dalam data Time Series?
            options:
              - Kenaikan harga secara terus menerus selama 10 tahun.
              - Pola data yang berulang secara teratur pada interval waktu tertentu (misal harian atau bulanan).
              - Kesalahan input data oleh manusia.
              - Data yang tidak memiliki urutan waktu.
            correctAnswerIndex: 1
        - id: forecasting-basics
          title: Forecasting (Peramalan)
          content: |-
            **Tujuan Pembelajaran:** Menggunakan data masa lalu untuk memprediksi nilai di masa depan.

            Forecasting sangat penting bagi bisnis untuk merencanakan stok, anggaran, atau tenaga kerja.

            **Metode Populer:**
            - **Statistik Klasik**: ARIMA (AutoRegressive Integrated Moving Average).
            - **Facebook Prophet**: Sangat handal menangani hari libur dan data yang hilang.
            - **Deep Learning**: LSTM (Long Short-Term Memory) yang mampu mengingat pola jangka panjang.
          codeExample: |-
            # Menggunakan library Prophet (Simulasi)
            # from prophet import Prophet
            # model = Prophet()
            # model.fit(df) # df berisi kolom 'ds' (waktu) dan 'y' (nilai)
            # future = model.make_future_dataframe(periods=365)
            # forecast = model.predict(future)
    - id: model-optimization
      title: 29. Model Optimization & Efficiency
      lessons:
        - id: quantization
          title: Quantization (Kuantisasi)
          content: |-
            **Tujuan Pembelajaran:** Mengecilkan ukuran model AI agar bisa berjalan di perangkat dengan spesifikasi rendah (HP atau IoT).

            Kuantisasi adalah proses mengurangi presisi angka dalam bobot (weights) model AI, misalnya dari Float32 (presisi tinggi) ke Int8 (angka bulat).

            **Manfaat:**
            - **Ukuran File**: Model bisa mengecil hingga 4x lipat.
            - **Kecepatan**: Proses tebakan (inference) menjadi jauh lebih cepat.
            - **Hemat Baterai**: Mengurangi beban kerja prosesor.
          codeExample: |-
            # Menggunakan TensorFlow Lite untuk Kuantisasi (Konsep)
            # converter = tf.lite.TFLiteConverter.from_saved_model(model_dir)
            # converter.optimizations = [tf.lite.Optimize.DEFAULT]
            # tflite_model = converter.convert()
        - id: knowledge-distillation
          title: Knowledge Distillation (Distilasi)
          content: |-
            **Tujuan Pembelajaran:** Mentransfer kecerdasan dari model raksasa ke model yang lebih kecil.

            Teknik ini melibatkan dua model:
            1. **Teacher Model**: Model besar yang sangat pintar (misal: GPT-4).
            2. **Student Model**: Model kecil yang ingin kita latih (misal: MobileBERT).

            Model Student belajar bukan hanya dari data asli, tapi juga belajar cara Model Teacher memberikan prediksi. Hasilnya, Model Student menjadi jauh lebih pintar dibanding jika ia belajar sendirian.
          quiz:
            question: Dalam Knowledge Distillation, apa peran dari 'Teacher Model'?
            options:
              - Model kecil yang sedang belajar.
              - Model besar yang sudah pintar dan berfungsi sebagai panduan bagi model student.
              - Manusia yang sedang mengetik kode.
              - Database tempat menyimpan data.
            correctAnswerIndex: 1
        - id: pruning
          title: Pruning (Pemangkasan)
          content: |-
            **Tujuan Pembelajaran:** Membuang bagian dari jaringan saraf yang tidak memberikan kontribusi signifikan.

            Jaringan saraf sering kali memiliki jutaan koneksi yang sebenarnya tidak terlalu penting. **Pruning** bekerja seperti memangkas dahan pohon yang layu:
            1. Identifikasi koneksi dengan bobot mendekati nol.
            2. Hapus koneksi tersebut.
            3. Latih ulang model sedikit (fine-tuning) agar akurasi kembali stabil.
          quiz:
            question: Apa yang dilakukan dalam proses 'Pruning' pada model AI?
            options:
              - Menambah jumlah neuron sebanyak mungkin.
              - Menghapus koneksi atau neuron yang tidak penting agar model lebih ringan.
              - Mengubah seluruh kode program ke bahasa lain.
              - Menghapus data training yang sudah lama.
            correctAnswerIndex: 1
        - id: peft-lora
          title: PEFT & LoRA
          content: |-
            **Tujuan Pembelajaran:** Melatih ulang model bahasa raksasa (LLM) dengan biaya murah dan cepat.

            **PEFT (Parameter-Efficient Fine-Tuning)** memungkinkan kita melatih model raksasa tanpa menyentuh jutaan parameter aslinya. 

            **LoRA (Low-Rank Adaptation)**:
            Teknik paling populer di mana kita menyisipkan "matriks kecil" di samping lapisan asli model. Hanya matriks kecil inilah yang kita latih. Hasilnya, kita bisa membuat AI ahli hukum hanya dengan melatih 1% dari total parameter model aslinya.
          codeExample: |-
            # Menggunakan library PEFT dari HuggingFace (Konsep)
            # from peft import LoraConfig, get_peft_model
            # config = LoraConfig(r=8, lora_alpha=32, target_modules=["q_proj", "v_proj"])
            # model = get_peft_model(base_model, config)
    - id: ai-engineering
      title: 30. AI Engineering Workflow (MLOps & Ethics)
      lessons:
        - id: mlops
          title: MLOps & Deployment
          content: |-
            **Tujuan Pembelajaran:** Memahami proses menjaga model AI agar tetap hidup dan pintar di lingkungan produksi.

            Membuat model AI hanyalah 20% dari pekerjaan. 80% sisanya adalah **MLOps** (Machine Learning Operations).

            **Siklus MLOps:**
            1. **CI/CD**: Otomatisasi pengujian dan pengiriman kode model.
            2. **Monitoring**: Memantau apakah model mulai "bodoh" seiring berjalannya waktu (Model Drift).
            3. **Retraining**: Melatih ulang model secara otomatis jika data di dunia nyata sudah berubah.
            4. **Scalability**: Memastikan model bisa melayani jutaan permintaan sekaligus menggunakan Docker atau Kubernetes.
          quiz:
            question: Apa yang dimaksud dengan 'Model Drift' dalam pemantauan MLOps?
            options:
              - Model AI yang hilang dari server.
              - Penurunan akurasi model seiring waktu karena perubahan tren data di dunia nyata.
              - Model AI yang menjadi terlalu cepat.
              - Kabel server yang tercabut.
            correctAnswerIndex: 1
        - id: ethics-ai
          title: Etika & Keamanan AI
          content: |-
            **Tujuan Pembelajaran:** Membangun AI yang bertanggung jawab, aman, dan tidak merugikan manusia.

            Sebagai AI Engineer, Anda memiliki tanggung jawab moral terhadap teknologi yang Anda buat.

            **Aspek Utama:**
            - **Bias & Fairness**: Memastikan AI tidak mendiskriminasi ras, gender, atau agama tertentu karena data yang tidak seimbang.
            - **Privacy**: Melindungi data sensitif pengguna agar tidak "terbocorkan" melalui jawaban AI.
            - **Transparency**: AI harus bisa menjelaskan mengapa ia mengambil keputusan tertentu (Explainable AI).
            - **Security**: Melindungi model dari serangan *Prompt Injection* (instruksi jahat untuk membajak AI).
          quiz:
            question: Apa yang dimaksud dengan 'Bias' dalam model AI?
            options:
              - Kecepatan model dalam memproses data.
              - Ketidakadilan atau diskriminasi hasil prediksi karena data training yang tidak representatif.
              - Warna tema dari dashboard AI.
              - Harga langganan API.
            correctAnswerIndex: 1
