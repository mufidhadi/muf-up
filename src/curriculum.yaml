        - id: tool-calling-memory
          title: Tool Calling & Memory
          content: |-
            ### 1. Hook & Context
            **Problem Statement:** AI pada dasarnya hanya tahu data masa lalu. Bagaimana jika kamu ingin AI mengecek harga saham hari ini atau mengirim email? AI butuh "Tangan" untuk menyentuh dunia luar dan "Ingatan" agar tidak lupa apa yang sudah dibicarakan.
            **Analogi:** Seperti "Koki dengan Peralatan Dapur". Koki (AI) punya resep di otak, tapi ia butuh pisau, kompor (Tools), dan catatan pesanan (Memory) untuk benar-benar bisa memasak.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **mengimplementasikan** kemampuan pemanggilan alat (Tool Calling) pada AI dan **mengelola** status ingatan (Memory) antar sesi.

            ### 3. Prerequisites
            - Memahami Dasar API.

            ### 4. Core Material
            - **Tools**: Fungsi eksternal yang diizinkan untuk dipanggil AI (misal: Search Tool, Calculator).
            - **Short-term Memory**: Mengingat konteks dalam satu percakapan.
            - **Long-term Memory**: Menyimpan informasi penting di database untuk digunakan di masa depan.

            ### 5. Guided Implementation
            AI akan memberikan output berupa nama fungsi dan argumennya, lalu sistem kita yang akan mengeksekusinya:
            `AI: I need to use 'get_weather' with city='Jakarta'`

            ### 6. Pro-Tips
            Gunakan **Vector Database** sebagai penyimpanan Long-term Memory bagi agen AI Anda agar mereka bisa melakukan pencarian semantik terhadap ingatan masa lalu.

            ### 7. Interactive Challenge
            Sebutkan satu Tool (alat) yang paling krusial bagi AI Agent yang bertugas sebagai "Asisten Penjadwalan Rapat".

            ### 8. Summary & Next Steps
            Agenmu sekarang sudah punya tangan dan ingatan. Selanjutnya, kita akan belajar cara menjalankan AI sakti ini di laptop sendiri tanpa internet: Local LLM!
          codeExample: |-
            # Konsep Tool Definition
            # @tool
            # def search_google(query: str):
            #     """Mencari informasi di internet."""
            print("Tools & Memory membuat AI menjadi agen yang benar-benar fungsional di dunia nyata.")
          quiz:
            question: "Teknologi apa yang paling cocok digunakan untuk menyimpan 'Long-term Memory' bagi agen AI?"
            options:
              - File Teks biasa
              - Variabel Global
              - Vector Database
