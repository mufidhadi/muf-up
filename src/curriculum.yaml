            ### 6. Pro-Tips
            Berikan **Persona** yang sangat spesifik pada setiap agen. Semakin detail deskripsi tugas dan karakternya, semakin minim kemungkinan agen tersebut melakukan kesalahan atau tumpang tindih tugas.

