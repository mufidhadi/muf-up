- id: python
  title: Python
  description: Dasar-dasar pemrograman Python dari nol hingga mahir.
  modules:
    - id: intro
      title: 1. Pengenalan & Filosofi Python
      lessons:
        - id: what-is-python
          title: Apa itu Python? (Sebuah Pengantar)
          content: |-
            **Tujuan Pembelajaran:** Memahami sejarah, filosofi, dan kegunaan bahasa pemrograman Python di dunia nyata.

            Python diciptakan oleh Guido van Rossum pada tahun 1991 dengan satu filosofi utama: **"Kode lebih sering dibaca daripada ditulis."** Oleh karena itu, sintaks Python dirancang agar sangat mirip dengan bahasa manusia (Bahasa Inggris), membuatnya sangat intuitif bagi pemula maupun profesional.

            **Mengapa Python Sangat Populer?**
            1. **Keterbacaan Tinggi (Readability):** Python tidak menggunakan tanda kurung kurawal `{}` atau titik koma `;` yang rumit. Ia menggunakan indentasi (spasi) untuk menstrukturkan kode, memaksa programmer menulis kode yang rapi.
            2. **"Batteries Included":** Python datang dengan pustaka standar (standard library) yang sangat besar. Kamu bisa melakukan banyak hal (membaca file, koneksi internet, matematika kompleks) tanpa perlu menginstal tambahan apa pun.
            3. **Multi-Paradigma:** Mendukung pemrograman prosedural, berorientasi objek (OOP), maupun fungsional.
            4. **Ekosistem Raksasa:** Menjadi standar industri untuk Data Science, Artificial Intelligence (AI), Machine Learning, dan Web Development (Backend).

            **Analogi Sederhana:**
            Mempelajari Python itu seperti belajar memasak menggunakan resep yang ditulis dengan bahasa sehari-hari, bukan dengan istilah kimia yang rumit. Kamu fokus pada "apa yang ingin dimasak", bukan "bagaimana cara kerja kompornya".
          codeExample: |-
            # Filosofi Python (Zen of Python) bisa dilihat dengan menjalankan perintah ini:
            # import this

            # Contoh kode sederhana:
            print("Selamat datang di dunia Python!")
        - id: setup
          title: Persiapan Lingkungan Kerja (Environment)
          content: |-
            **Tujuan Pembelajaran:** Mengetahui alat-alat yang dibutuhkan untuk menulis dan menjalankan kode Python secara profesional.

            Untuk menjadi programmer Python yang handal, kamu tidak hanya butuh bahasanya, tapi juga "bengkel" tempat kamu bekerja.

            **Komponen Utama:**
            1. **Interpreter Python:** Ini adalah mesin utama yang menerjemahkan kodemu menjadi bahasa mesin. Kamu bisa mengunduhnya secara gratis di `python.org`.
            2. **IDE (Integrated Development Environment) / Code Editor:** Tempat kamu mengetik kode.
               - **VS Code (Visual Studio Code):** Paling populer, ringan, dan gratis. Sangat direkomendasikan.
               - **PyCharm:** IDE khusus Python yang sangat kuat, cocok untuk proyek skala besar.
               - **Jupyter Notebook:** Sangat populer di kalangan Data Scientist karena memungkinkan eksekusi kode per blok beserta visualisasi grafiknya.

            **Virtual Environment (Lingkungan Virtual):**
            Praktik terbaik (best practice) dalam Python adalah menggunakan *Virtual Environment* (seperti `venv` atau `conda`). Tujuannya agar pustaka (library) yang kamu instal untuk Proyek A tidak bentrok dengan pustaka di Proyek B. Bayangkan ini seperti memiliki ruang kerja terpisah untuk setiap proyekmu.
          quiz:
            question: Apa poin utama dari materi 'Persiapan Lingkungan Kerja (Environment)'?
            options:
              - Memahami konsep dasar dan penerapannya.
              - Menghafal semua sintaks tanpa pemahaman.
              - Melewati materi ini karena tidak penting.
              - Hanya fokus pada penulisan kode yang rumit.
            correctAnswerIndex: 0
    - id: basics
      title: 2. Dasar-Dasar Pemrograman
      lessons:
        - id: variables
          title: Variabel & Tipe Data (Menyimpan Informasi)
          content: |-
            **Tujuan Pembelajaran:** Memahami cara komputer menyimpan dan membedakan berbagai jenis informasi.

            **Variabel** adalah wadah atau "kotak" di dalam memori komputer yang diberi nama untuk menyimpan data. Di Python, kamu tidak perlu mendeklarasikan tipe data secara eksplisit (Dynamic Typing). Komputer akan otomatis menebaknya.

            **Tipe Data Primitif (Dasar):**
            1. **String (`str`):** Teks. Selalu diapit oleh tanda kutip tunggal (`'`) atau ganda (`"`).
               - Contoh: `"Budi"`, `'Halo Dunia'`
            2. **Integer (`int`):** Bilangan bulat, baik positif maupun negatif, tanpa desimal.
               - Contoh: `42`, `-10`, `0`
            3. **Float (`float`):** Bilangan pecahan atau desimal. Menggunakan titik (`.`) bukan koma.
               - Contoh: `3.14`, `-0.001`
            4. **Boolean (`bool`):** Tipe data logika yang hanya memiliki dua nilai: `True` (Benar) atau `False` (Salah). Sangat penting untuk pengambilan keputusan.

            **Aturan Penamaan Variabel (Best Practice):**
            - Gunakan huruf kecil dan pisahkan kata dengan garis bawah (disebut *snake_case*). Contoh: `nama_lengkap`, `total_harga`.
            - Harus deskriptif. Jangan gunakan `x` atau `y`, gunakan `umur` atau `harga`.
          codeExample: |-
            # Contoh deklarasi variabel
            nama_pengguna = "Andi Setiawan"  # String
            umur = 25                        # Integer
            tinggi_badan = 175.5             # Float
            status_aktif = True              # Boolean

            # Menggabungkan teks dan variabel (F-String)
            print(f"Halo, nama saya {nama_pengguna}, umur {umur} tahun.")
        - id: operators
          title: Operator Matematika & Logika
          content: |-
            **Tujuan Pembelajaran:** Melakukan manipulasi data menggunakan operasi matematika dan perbandingan logika.

            Python mendukung berbagai operasi layaknya kalkulator ilmiah, ditambah operasi logika untuk membandingkan nilai.

            **1. Operator Aritmatika:**
            - `+` (Penjumlahan)
            - `-` (Pengurangan)
            - `*` (Perkalian)
            - `/` (Pembagian, hasilnya selalu Float)
            - `//` (Pembagian Bulat / Floor Division, membuang desimal)
            - `%` (Modulo / Sisa Bagi, sangat berguna untuk mengecek bilangan ganjil/genap)
            - `**` (Pangkat)

            **2. Operator Perbandingan (Menghasilkan Boolean):**
            - `==` (Sama dengan) -> Hati-hati, `=` untuk mengisi variabel, `==` untuk membandingkan!
            - `!=` (Tidak sama dengan)
            - `>`, `<`, `>=`, `<=` (Lebih besar, lebih kecil, dll)

            **3. Operator Logika:**
            Digunakan untuk menggabungkan beberapa kondisi.
            - `and`: Benar JIKA SEMUA kondisi benar.
            - `or`: Benar JIKA SALAH SATU kondisi benar.
            - `not`: Membalikkan nilai (True jadi False, False jadi True).
          codeExample: |-
            a = 10
            b = 3

            print("Pembagian:", a / b)        # 3.333...
            print("Pembagian Bulat:", a // b) # 3
            print("Sisa Bagi:", a % b)        # 1
            print("Pangkat:", a ** b)         # 1000

            # Logika
            print("Apakah a lebih besar dari b?", a > b) # True
            print("Kondisi gabungan:", (a > 5) and (b < 5)) # True
    - id: control-flow
      title: 3. Alur Kontrol (Pengambilan Keputusan)
      lessons:
        - id: if-else
          title: Percabangan (If, Elif, Else)
          content: |-
            **Tujuan Pembelajaran:** Membuat program yang bisa mengambil keputusan berdasarkan kondisi tertentu.

            Program yang pintar tidak berjalan lurus dari atas ke bawah; ia bisa memilih jalur yang berbeda tergantung pada situasi. Inilah fungsi percabangan.

            **Struktur Logika:**
            - **`if` (Jika):** Kondisi pertama yang dicek. Jika `True`, jalankan blok kodenya.
            - **`elif` (Else If / Atau Jika):** Kondisi alternatif jika `if` sebelumnya `False`. Kamu bisa menggunakan banyak `elif`.
            - **`else` (Selain itu):** Jalan terakhir jika semua kondisi `if` dan `elif` bernilai `False`.

            **Pentingnya Indentasi:**
            Di Python, blok kode yang berada di dalam `if` harus menjorok ke dalam (biasanya 4 spasi). Ini bukan sekadar estetika, tapi aturan sintaks mutlak. Jika indentasi salah, program akan error (`IndentationError`).
          codeExample: |-
            nilai_ujian = 85

            if nilai_ujian >= 90:
                print("Grade: A - Luar Biasa!")
            elif nilai_ujian >= 80:
                print("Grade: B - Kerja Bagus!")
            elif nilai_ujian >= 70:
                print("Grade: C - Cukup.")
            else:
                print("Grade: D - Kamu harus belajar lebih giat.")
        - id: loops
          title: Perulangan (For & While Loops)
          content: |-
            **Tujuan Pembelajaran:** Mengotomatisasi tugas yang berulang tanpa harus menulis kode berkali-kali.

            Prinsip utama programmer adalah DRY (*Don't Repeat Yourself*). Jika kamu harus mencetak angka 1 sampai 1000, kamu tidak menulis `print()` 1000 kali, kamu menggunakan *Loop*.

            **1. For Loop (Perulangan Pasti):**
            Digunakan ketika kamu tahu persis berapa kali kamu ingin mengulang, atau ketika kamu ingin menelusuri isi sebuah koleksi (seperti List atau String).
            - Sering dipasangkan dengan fungsi `range(start, stop, step)` untuk menghasilkan urutan angka.

            **2. While Loop (Perulangan Bersyarat):**
            Digunakan ketika kamu ingin terus mengulang *selama* suatu kondisi masih bernilai `True`. Hati-hati dengan *Infinite Loop* (perulangan tanpa henti) jika kondisinya tidak pernah berubah menjadi `False`.

            **Kontrol Tambahan:**
            - `break`: Menghentikan perulangan secara paksa dan keluar dari loop.
            - `continue`: Melewati sisa kode di iterasi saat ini dan langsung lanjut ke iterasi berikutnya.
          codeExample: |-
            # Menggunakan For Loop dengan range
            print("Hitung mundur:")
            for i in range(5, 0, -1):  # Mulai dari 5, berhenti sebelum 0, langkah -1
                print(i)

            # Menggunakan While Loop dengan break
            print("\nMencari angka rahasia:")
            angka = 1
            while True:  # Loop ini secara teori berjalan selamanya
                if angka == 3:
                    print("Angka 3 ditemukan! Berhenti.")
                    break  # Keluar dari loop
                print(f"Bukan {angka}...")
                angka += 1
    - id: functions
      title: 4. Fungsi
      lessons:
        - id: intro-functions
          title: Mengenal Fungsi
          content: |-
            **Tujuan Pembelajaran:** Memahami konsep modularitas kode dengan membungkus logika ke dalam fungsi yang dapat digunakan kembali.

            Fungsi adalah blok kode terorganisir yang digunakan untuk melakukan satu tindakan terkait. Fungsi memberikan modularitas yang lebih baik untuk aplikasi Anda dan tingkat penggunaan kembali kode yang tinggi.

            **Komponen Fungsi:**
            1. **`def`**: Kata kunci untuk mendefinisikan fungsi.
            2. **Nama Fungsi**: Harus deskriptif (menggunakan *snake_case*).
            3. **Parameter/Argumen**: Informasi yang diteruskan ke dalam fungsi (opsional).
            4. **Docstring**: Dokumentasi singkat tentang fungsi (opsional tapi sangat disarankan).
            5. **Blok Kode**: Logika yang dijalankan saat fungsi dipanggil.
          codeExample: |-
            def sapa_pengguna(nama, salam="Selamat pagi"):
                """Fungsi ini menyapa pengguna dengan salam tertentu."""
                print(f"{salam}, {nama}!")

            # Memanggil fungsi
            sapa_pengguna("Andi") 
            sapa_pengguna("Siti", "Halo")
        - id: return-values
          title: Nilai Balik (Return)
          content: |-
            **Tujuan Pembelajaran:** Memahami cara mengambil hasil pemrosesan dari sebuah fungsi untuk digunakan di bagian lain program.

            Kata kunci `return` digunakan untuk keluar dari fungsi dan mengirimkan nilai kembali ke pemanggilnya. Jika fungsi tidak memiliki `return`, ia akan secara otomatis mengembalikan `None`.

            **Kelebihan Return:**
            - Memungkinkan fungsi menjadi "murni" (mengolah input dan menghasilkan output tanpa efek samping).
            - Hasil fungsi bisa disimpan dalam variabel atau digunakan langsung sebagai argumen fungsi lain.
            - Bisa mengembalikan lebih dari satu nilai (dikembalikan sebagai Tuple).
          codeExample: |-
            def hitung_luas_persegi(sisi):
                return sisi * sisi

            def operasi_matematika(a, b):
                tambah = a + b
                kali = a * b
                return tambah, kali  # Mengembalikan dua nilai sekaligus

            luas = hitung_luas_persegi(5)
            print(f"Luas: {luas}")

            hasil_tambah, hasil_kali = operasi_matematika(10, 2)
            print(f"Tambah: {hasil_tambah}, Kali: {hasil_kali}")
    - id: data-structures
      title: 5. Struktur Data
      lessons:
        - id: lists
          title: List (Daftar)
          content: |-
            **Tujuan Pembelajaran:** Mengelola kumpulan item yang berurutan dan dapat diubah (mutable).

            List adalah tipe data yang paling fleksibel di Python. Ia dapat berisi berbagai tipe data berbeda dalam satu list. Item dalam list dipisahkan oleh koma dan diapit kurung siku `[]`.

            **Karakteristik:**
            - **Ordered**: Urutan item tetap sama kecuali diubah.
            - **Mutable**: Bisa ditambah, dihapus, atau diubah isinya.
            - **Indeks**: Dimulai dari 0 untuk item pertama.
            - **Negatif Indeks**: `-1` adalah item terakhir.
          codeExample: |-
            buah = ["Apel", "Jeruk", "Mangga"]
            
            # Akses dan Ubah
            print(f"Buah pertama: {buah[0]}")
            buah[1] = "Anggur"
            
            # Tambah dan Hapus
            buah.append("Pisang")  # Tambah di akhir
            buah.insert(1, "Kiwi") # Tambah di indeks tertentu
            buah.pop()             # Hapus item terakhir
            
            # Irisan (Slicing)
            print(f"Dua buah pertama: {buah[0:2]}")
            print(f"Seluruh buah: {buah}")
        - id: dictionaries
          title: Dictionary (Kamus)
          content: |-
            **Tujuan Pembelajaran:** Mengelola data dalam bentuk pasangan Kunci (Key) dan Nilai (Value) untuk akses cepat.

            Dictionary (`dict`) adalah kumpulan yang tidak berurutan (mulai Python 3.7+ sudah berurutan), dapat diubah, dan diindeks oleh kunci unik. Ia diapit kurung kurawal `{}`.

            **Karakteristik:**
            - **Key-Value**: Menggunakan kunci (seperti string) untuk mengambil nilai, bukan angka indeks.
            - **Kunci Unik**: Tidak boleh ada dua kunci yang sama.
            - **Efisien**: Sangat cepat dalam pencarian data.
          codeExample: |-
            user = {
                "nama": "Budi Setiawan",
                "umur": 28,
                "skor": [80, 90, 85]
            }

            # Akses dan Modifikasi
            print(f"Nama: {user['nama']}")
            user["umur"] = 29
            user["pekerjaan"] = "Programmer"  # Tambah kunci baru

            # Iterasi
            for kunci, nilai in user.items():
                print(f"{kunci}: {nilai}")
        - id: tuples-sets
          title: Tuple & Set
          content: |-
            **Tujuan Pembelajaran:** Memahami struktur data alternatif yang tidak dapat diubah (Tuple) atau tidak memperbolehkan duplikasi (Set).

            **1. Tuple (`tuple`):**
            Mirip list, tapi **Immutable** (tidak bisa diubah setelah dibuat). Menggunakan kurung biasa `()`. Cocok untuk data yang bersifat konstan (koordinat, hari dalam seminggu).

            **2. Set (`set`):**
            Kumpulan item **Unik** dan **Tidak Berurutan**. Menggunakan kurung kurawal `{}` (tanpa pasangan key-value). Sangat bagus untuk operasi himpunan (irisan, gabungan).
          codeExample: |-
            # Tuple: Tidak bisa diubah
            koordinat = (10, 20)
            print(f"X: {koordinat[0]}")

            # Set: Otomatis membuang duplikat
            hobi = {"coding", "gaming", "coding", "membaca"}
            print(f"Hobi unik: {hobi}")
            
            # Operasi Himpunan
            set_a = {1, 2, 3}
            set_b = {3, 4, 5}
            print(f"Irisan (A & B): {set_a & set_b}") # {3}
            print(f"Gabungan (A | B): {set_a | set_b}") # {1, 2, 3, 4, 5}
    - id: oop
      title: 6. Pemrograman Berorientasi Objek (OOP)
      lessons:
        - id: classes-objects
          title: Class & Object
          content: |-
            **Tujuan Pembelajaran:** Memahami paradigma pemrograman berbasis objek untuk mengorganisir kode yang kompleks.

            OOP adalah cara mengatur kode dengan membayangkan semuanya sebagai "Objek" di dunia nyata.

            **Komponen Utama:**
            1. **Class**: "Cetak Biru" (blueprint) atau kerangka kerja dari sebuah objek. Ia mendefinisikan sifat dan perilaku.
            2. **Object**: Wujud nyata (instansiasi) dari sebuah Class.
            3. **Attributes**: Data atau variabel milik objek.
            4. **Methods**: Fungsi yang dijalankan oleh objek.
            5. **`self`**: Parameter khusus yang merujuk pada instance objek itu sendiri.
          codeExample: |-
            class Mobil:
                def __init__(self, merk, model, warna):
                    # Constructor: Inisialisasi atribut objek
                    self.merk = merk
                    self.model = model
                    self.warna = warna
                    self.kecepatan = 0

                def gas(self, tambah):
                    self.kecepatan += tambah
                    print(f"Mobil {self.merk} ngebut {self.kecepatan} km/jam.")

            # Membuat objek (instansiasi)
            mobil_saya = Mobil("Toyota", "GR Supra", "Kuning")
            mobil_tetangga = Mobil("Tesla", "Model S", "Putih")

            mobil_saya.gas(50)
            print(f"Warna mobil tetangga: {mobil_tetangga.warna}")
        - id: inheritance
          title: Pewarisan (Inheritance)
          content: |-
            **Tujuan Pembelajaran:** Menggunakan kembali kode dengan mewariskan sifat dari satu kelas (Induk) ke kelas lain (Anak).

            Pewarisan memungkinkan kita mendefinisikan kelas yang mewarisi semua metode dan properti dari kelas lain.

            **Istilah:**
            - **Parent Class (Superclass)**: Kelas yang diwariskan sifatnya.
            - **Child Class (Subclass)**: Kelas yang mewarisi sifat. Ia bisa menambah atribut/metode baru atau mengubah (override) metode induk.
          codeExample: |-
            class Robot:
                def __init__(self, nama):
                    self.nama = nama

                def bersuara(self):
                    print("Beep boop!")

            class RobotTempur(Robot):
                def serang(self):
                    print(f"{self.nama} meluncurkan roket!")
                
                # Menindih (Override) metode induk
                def bersuara(self):
                    print("Target terkunci!")

            bot = RobotTempur("Omega-9")
            bot.bersuara() # Menggunakan versi RobotTempur
            bot.serang()   # Metode unik RobotTempur
    - id: advanced
      title: 7. Topik Lanjutan
      lessons:
        - id: error-handling
          title: Penanganan Error (Try Except)
          content: |-
            **Tujuan Pembelajaran:** Membuat program yang tahan banting (robust) terhadap kesalahan tak terduga.

            Error atau "Exception" adalah hal yang lumrah dalam pemrograman. Namun, alih-alih membiarkan program mati mendadak, kita bisa menangani kesalahan tersebut secara elegan menggunakan blok `try...except`.

            **Alur Kerja:**
            - **`try`**: Bagian kode yang berisiko terjadi error.
            - **`except`**: Bagian yang dijalankan JIKA error terjadi.
            - **`else`**: Dijalankan jika TIDAK ADA error di blok `try`.
            - **`finally`**: Selalu dijalankan, apapun yang terjadi (misal: untuk menutup file).
          codeExample: |-
            try:
                angka = int(input("Masukkan angka: "))
                hasil = 100 / angka
            except ValueError:
                print("Error: Kamu harus memasukkan angka!")
            except ZeroDivisionError:
                print("Error: Tidak bisa membagi dengan nol!")
            except Exception as e:
                print(f"Error tak terduga: {e}")
            else:
                print(f"Hasil: {hasil}")
            finally:
                print("Proses selesai.")
        - id: file-handling
          title: Bekerja dengan File
          content: |-
            **Tujuan Pembelajaran:** Memahami cara menyimpan data secara permanen ke dalam file.

            Python memiliki fungsi bawaan untuk membuka, membaca, dan menulis file.

            **Penting:** Praktik terbaik adalah menggunakan pernyataan `with`. Pernyataan ini memastikan file ditutup secara otomatis meskipun terjadi error, mencegah kebocoran data.

            **Mode Utama:**
            - `'r'`: Membaca (Read).
            - `'w'`: Menulis (Write) - menimpa isi lama.
            - `'a'`: Menambah (Append) - menambah data di akhir.
          codeExample: |-
            # Menulis file (Otomatis tertutup dengan 'with')
            with open("catatan.txt", "w") as f:
                f.write("Halo Python! \nBelajar Python itu asyik.")

            # Membaca file
            try:
                with open("catatan.txt", "r") as f:
                    isi = f.read()
                    print(f"Isi file:\n{isi}")
            except FileNotFoundError:
                print("File tidak ditemukan!")
        - id: decorators
          title: Decorator
          content: |-
            **Tujuan Pembelajaran:** Menggunakan fitur meta-programming untuk memodifikasi fungsi secara dinamis.

            Decorator adalah "pembungkus" fungsi. Bayangkan seperti memberi baju pada fungsi: baju itu menambah penampilan atau kegunaan fungsi tanpa mengubah tubuh aslinya.

            **Kegunaan:**
            - Logging (mencatat waktu fungsi dijalankan).
            - Autentikasi (memastikan user sudah login).
            - Caching (menyimpan hasil fungsi berat).
          codeExample: |-
            def hitung_waktu(func):
                import time
                def wrapper(*args, **kwargs):
                    start = time.time()
                    hasil = func(*args, **kwargs)
                    end = time.time()
                    print(f"Fungsi {func.__name__} memakan waktu {end-start:.4f} detik.")
                    return hasil
                return wrapper

            @hitung_waktu
            def proses_data():
                import time
                time.sleep(1)  # Simulasi proses berat
                print("Proses data selesai.")

            proses_data()
        - id: generators
          title: Generator
          content: |-
            **Tujuan Pembelajaran:** Mengolah urutan data dalam jumlah besar tanpa membebani memori RAM komputer.

            Generator adalah fungsi yang menggunakan kata kunci `yield` alih-alih `return`. Berbeda dengan fungsi biasa yang mengembalikan semua data sekaligus, generator mengembalikan data **satu per satu** (Lazy Loading).

            **Keuntungan:**
            - **Efisien**: Sangat hemat memori untuk data jutaan baris.
            - **Cepat**: Program langsung mulai berjalan tanpa menunggu seluruh data terkumpul.
          codeExample: |-
            def penghasil_angka_besar(n):
                for i in range(n):
                    yield i * 10

            # Generator tidak menyimpan data di RAM
            data = penghasil_angka_besar(1000000)

            # Kita ambil satu-satu
            print(next(data))
            print(next(data))
            
            # Atau gunakan dalam loop
            for x in range(3):
                print(next(data))
    - id: ecosystem
      title: 8. Ekosistem & Library
      lessons:
        - id: pip-modules
          title: PIP & Modul
          content: |-
            **Tujuan Pembelajaran:** Mengakses dan memanfaatkan jutaan pustaka (library) buatan komunitas global Python.

            Salah satu kekuatan terbesar Python adalah ekosistemnya. Kamu tidak perlu menulis segalanya dari nol. Kamu bisa menggunakan kode buatan orang lain dengan cara menginstalnya.

            **Komponen Utama:**
            1. **Modul**: File `.py` tunggal berisi kode Python.
            2. **Package**: Folder berisi beberapa modul.
            3. **Library**: Kumpulan package yang lebih besar.
            4. **PIP**: Manajer paket resmi Python (dipasang di Terminal).
            
            **Perintah Terminal:**
            - `pip install nama_library`: Menginstal library.
            - `pip list`: Melihat daftar library yang terinstal.
          codeExample: |-
            # Mengimpor modul bawaan Python
            import math
            import datetime

            print(f"Akar dari 16: {math.sqrt(16)}")
            print(f"Waktu sekarang: {datetime.datetime.now()}")

            # Contoh penggunaan library eksternal (misal: 'requests')
            # import requests
            # r = requests.get('https://google.com')
            # print(r.status_code)
    - id: dev-concepts
      title: 9. Konsep Pengembangan (API, MCP, SDK, dll)
      lessons:
        - id: api-concept
          title: Apa itu API?
          content: |-
            **API (Application Programming Interface)** adalah "pelayan" yang menghubungkan dua aplikasi berbeda agar bisa saling bicara dan bertukar data secara aman.
                      
            **Analogi Pelayan Restoran:**
            1. Kamu (**Client/Aplikasi A**) memesan makanan (request) ke **Pelayan (API)**.
            2. Pelayan membawa pesananmu ke **Dapur (Server/Aplikasi B)**.
            3. Dapur memasak makanan (proses data).
            4. Pelayan membawakan makanan kembali kepadamu (response).

            **Pentingnya API:**
            - Memisahkan tampilan (frontend) dari data (backend).
            - Memungkinkan integrasi antar aplikasi (misal: login dengan Google).
          quiz:
            question: Manakah pernyataan yang paling tepat menggambarkan fungsi API?
            options:
              - Antarmuka untuk pengguna akhir mengetik perintah.
              - Perantara yang menghubungkan dua aplikasi untuk bertukar data.
              - Tempat penyimpanan database utama.
              - Script untuk mempercepat koneksi internet.
            correctAnswerIndex: 1
        - id: mcp-concept
          title: Apa itu MCP?
          content: |-
            **MCP (Model Context Protocol)** adalah standar komunikasi terbuka yang memungkinkan model AI (seperti Claude, GPT, atau Gemini) untuk mengakses data dan alat (tools) dari aplikasi lain secara aman dan terstruktur.
                      
            **Mengapa Kita Butuh MCP?**
            Dulu, setiap aplikasi punya cara berbeda untuk bicara dengan AI. Sekarang, MCP memberikan "bahasa yang sama" sehingga AI bisa langsung:
            - Membaca file di komputermu.
            - Menjalankan perintah terminal.
            - Mengakses database perusahaan.
            - Mencari informasi di internet.
                      
            Semua itu dilakukan melalui kontrol ketat dari pengguna.
          quiz:
            question: Apa manfaat utama dari standarisasi MCP bagi pengembang AI?
            options:
              - Membuat AI menjadi lebih murah untuk dijalankan.
              - Memungkinkan AI mengakses berbagai alat dan data melalui satu protokol standar.
              - Meningkatkan kecepatan mengetik AI.
              - Menghapus kebutuhan akan koneksi internet.
            correctAnswerIndex: 1
        - id: sdk-concept
          title: Apa itu SDK?
          content: |-
            **SDK (Software Development Kit)** adalah "kotak peralatan" lengkap untuk membangun aplikasi di platform tertentu. Bayangkan SDK seperti sebuah kotak peralatan pertukangan yang berisi palu, paku, gergaji, dan buku petunjuk.
                      
            **Komponen di dalam SDK:**
            - **Library/Framework**: Kode siap pakai untuk fungsi tertentu.
            - **Debugger**: Alat untuk mencari dan memperbaiki kesalahan.
            - **Dokumentasi**: Petunjuk langkah-demi-langkah penggunaan.
            - **API Reference**: Daftar fungsi yang tersedia untuk dipanggil.
                      
            **Contoh:** Android SDK (untuk aplikasi Android), Flutter SDK, AWS SDK.
          quiz:
            question: Apa perbedaan mendasar antara API dan SDK?
            options:
              - API adalah bagian dari SDK yang berfungsi sebagai antarmuka komunikasi.
              - SDK hanya bisa digunakan di website, API di mana saja.
              - API lebih mahal daripada SDK.
              - SDK hanya berisi dokumentasi, API berisi kode.
            correctAnswerIndex: 0
        - id: library-framework
          title: Library vs Framework
          content: |-
            Perbedaan utama antara Library dan Framework terletak pada **Siapa yang Memegang Kendali** (Inversion of Control).

            **1. Library (Pustaka):**
            Koleksi fungsi yang bisa kamu panggil kapan saja. **Kamu yang memegang kendali**. Kamu memutuskan kapan harus memanggil fungsi tersebut.
            *Analogi: Seperti pergi ke bengkel untuk meminjam kunci inggris.*
            Contoh: `NumPy`, `Requests`, `Math`.

            **2. Framework (Kerangka Kerja):**
            Struktur aplikasi yang sudah jadi. Kamu hanya mengisi bagian-bagian kosongnya. **Framework yang memegang kendali**. Ia memanggil kodemu pada waktu yang tepat.
            *Analogi: Seperti membangun rumah di dalam perumahan yang sudah ditentukan desainnya.*
            Contoh: `Django`, `FastAPI`, `Flask`.
          quiz:
            question: Apa yang dimaksud dengan 'Inversion of Control' dalam konteks Framework?
            options:
              - Pengguna mengendalikan komputer secara penuh.
              - Framework yang menentukan kapan dan bagaimana kode Anda dijalankan.
              - Database mengendalikan alur logika aplikasi.
              - Membalikkan urutan penulisan kode.
            correctAnswerIndex: 1
    - id: data-formats
      title: 10. Format Data (JSON, YAML, XML, LaTeX)
      lessons:
        - id: json-format
          title: JSON (JavaScript Object Notation)
          content: |-
            **Tujuan Pembelajaran:** Menguasai format pertukaran data standar yang paling banyak digunakan di web.

            JSON adalah format berbasis teks yang ringan dan mudah dibaca oleh manusia maupun mesin. Strukturnya sangat mirip dengan Dictionary di Python (pasangan Key-Value).

            **Aturan Penulisan:**
            - Key harus diapit tanda kutip ganda `"`.
            - Nilai bisa berupa: String, Number, Object, Array, Boolean, atau Null.
            - Tidak boleh ada koma di akhir item terakhir.
          codeExample: |-
            import json

            # 1. Mengubah Python Dict ke String JSON (Serialization)
            data = {"nama": "Andi", "is_admin": True, "skor": [10, 20]}
            json_str = json.dumps(data, indent=4)
            print(f"JSON String:\n{json_str}")

            # 2. Membaca String JSON ke Python Dict (Deserialization)
            data_kembali = json.loads(json_str)
            print(f"Nama: {data_kembali['nama']}")
        - id: yaml-format
          title: YAML (YAML Ain't Markup Language)
          content: |-
            **Tujuan Pembelajaran:** Memahami format data yang bersih dan berorientasi pada kemudahan baca manusia.

            YAML sangat populer untuk file konfigurasi (seperti Docker, Kubernetes, dan kurikulum ini!). Ia menghilangkan kebutuhan akan tanda kurung dan menggantinya dengan indentasi spasi.

            **Karakteristik:**
            - **Indentasi**: Sangat ketat terhadap spasi (mirip Python).
            - **List**: Menggunakan tanda hubung `-`.
            - **Dictionary**: Menggunakan titik dua `:`.
          codeExample: |-
            # Contoh data YAML (dalam bentuk komentar)
            # server:
            #   port: 8080
            #   debug: true
            # database:
            #   - postgres
            #   - redis

            import yaml # Perlu instalasi: pip install pyyaml
            # data = yaml.safe_load(file_yaml)
        - id: xml-latex
          title: XML & LaTeX
          content: |-
            **1. XML (eXtensible Markup Language):**
            Format lama yang menggunakan tag pembuka dan penutup (seperti HTML). Masih sangat banyak digunakan di sistem perbankan, telekomunikasi, dan dokumen perkantoran (seperti file `.docx`).

            **2. LaTeX:**
            Bahasa markup khusus untuk penulisan dokumen ilmiah dan teknis. Keunggulan utamanya adalah kemampuannya merender rumus matematika yang sangat kompleks dengan sangat rapi dan presisi.
          quiz:
            question: Apa keunggulan utama LaTeX dibanding editor teks biasa seperti Word?
            options:
              - Lebih mudah digunakan untuk pemula.
              - Kemampuan merender rumus matematika kompleks secara profesional.
              - Ukuran file yang lebih besar.
              - Bisa digunakan untuk mengedit video.
            correctAnswerIndex: 1
    - id: web-networking
      title: 11. Web & Networking
      lessons:
        - id: http-requests
          title: HTTP Request & cURL
          content: |-
            **Tujuan Pembelajaran:** Memahami protokol dasar komunikasi internet dan cara berinteraksi dengan server.

            Bagaimana aplikasi berkomunikasi di internet? Menggunakan protokol **HTTP (Hypertext Transfer Protocol)**.

            **Konsep Utama:**
            - **URL (Uniform Resource Locator)**: Alamat tujuan (misal: `https://api.github.com`).
            - **Methods (Metode)**:
              - `GET`: Mengambil data dari server.
              - `POST`: Mengirim data baru ke server.
              - `PUT/PATCH`: Memperbarui data yang ada.
              - `DELETE`: Menghapus data.
            - **Status Codes**: 200 (OK), 201 (Created), 404 (Not Found), 500 (Internal Server Error).

            **cURL**: Alat baris perintah (command line) untuk mengirim request ke server secara cepat tanpa browser.
          codeExample: |-
            import requests # Library HTTP paling populer di Python

            # Mengambil data (GET)
            response = requests.get("https://api.github.com")
            
            if response.status_code == 200:
                print(f"Berhasil! Header Server: {response.headers['Server']}")
                print(f"Isi JSON: {response.json()['current_user_url']}")
            else:
                print(f"Gagal dengan status: {response.status_code}")
        - id: http-streaming-websocket
          title: HTTP Streaming & WebSocket
          content: |-
            **Tujuan Pembelajaran:** Membedakan berbagai metode pengiriman data secara real-time.

            **1. HTTP Streaming:**
            Koneksi satu arah yang tetap terbuka untuk mengirimkan data secara bertahap (seperti menonton video YouTube atau melihat log server yang berjalan).

            **2. WebSocket:**
            Koneksi dua arah (full-duplex) yang terus menyambung. Berbeda dengan HTTP biasa yang "tanya-jawab", di WebSocket, Server bisa mengirimkan data ke Client kapan saja tanpa diminta. Sangat cocok untuk aplikasi chat atau dashboard harga saham real-time.
          quiz:
            question: Manakah dari berikut ini yang paling cocok menggunakan WebSocket?
            options:
              - Membaca artikel blog yang statis.
              - Mengirim email mingguan.
              - Aplikasi chat real-time yang membutuhkan respon instan.
              - Mengunduh file gambar ukuran besar.
            correctAnswerIndex: 2
        - id: message-brokers
          title: Message Brokers
          content: |-
            **Tujuan Pembelajaran:** Memahami cara kerja sistem terdistribusi dalam skala besar.

            Ketika aplikasi kita sangat besar dan memiliki banyak layanan (microservices), kita butuh "perantara" pesan agar antar bagian aplikasi tidak saling menunggu (Asynchronous).

            **Analogi Kantor Pos:**
            Aplikasi A (Pengirim) mengirim surat ke **Kantor Pos (Message Broker)**. Aplikasi B (Penerima) mengambil surat tersebut kapan pun ia siap. Jika Aplikasi B sedang sibuk atau mati, surat tetap aman di Kantor Pos.

            **Contoh Teknologi:**
            - **Redis Pub/Sub**: Sangat cepat, untuk pesan sederhana.
            - **RabbitMQ**: Handal dan memiliki fitur antrean yang canggih.
            - **Apache Kafka**: Untuk data raksasa (streaming) tingkat industri.
          quiz:
            question: Apa manfaat utama menggunakan Message Broker dalam arsitektur sistem?
            options:
              - Membuat aplikasi berjalan lebih cepat di satu komputer.
              - Menghubungkan berbagai layanan secara asinkron (tidak harus menunggu satu sama lain).
              - Menghapus kebutuhan akan database.
              - Mengurangi biaya langganan internet.
            correctAnswerIndex: 1
        - id: web-frameworks
          title: Web Server Frameworks
          content: |-
            **Tujuan Pembelajaran:** Memilih alat yang tepat untuk membangun server API atau website dengan Python.

            Python memiliki beberapa framework populer untuk membangun backend:

            **1. FastAPI (Paling Modern):**
            Sangat cepat, mendukung asinkron (`async/await`), dan otomatis membuat dokumentasi API (Swagger) secara gratis. Sangat direkomendasikan untuk proyek baru.

            **2. Flask (Minimalis):**
            Sangat ringan. Kamu hanya mendapatkan apa yang kamu butuhkan. Cocok untuk aplikasi kecil atau prototype cepat.

            **3. Django (Paling Lengkap):**
            "Batteries included". Sudah punya sistem login, admin panel, dan database ORM di dalamnya. Cocok untuk proyek raksasa yang butuh keamanan tinggi.
          quiz:
            question: Framework Python mana yang dikenal memiliki fitur 'Batteries Included' (Sangat Lengkap)?
            options:
              - Flask
              - FastAPI
              - Django
              - NumPy
            correctAnswerIndex: 2
    - id: database-orm
      title: 12. Database & ORM
      lessons:
        - id: db-intro
          title: Apa itu Database?
          content: |-
            **Tujuan Pembelajaran:** Memilih sistem penyimpanan data yang tepat sesuai kebutuhan aplikasi.

            Database adalah sistem terorganisir untuk menyimpan, mengelola, dan mengambil data.

            **Dua Jenis Utama:**

            **1. SQL (Relational):**
            Data disimpan dalam tabel dengan struktur kaku (baris dan kolom). Hubungan antar tabel sangat kuat.
            - **Contoh**: PostgreSQL (Sangat populer), MySQL, SQLite (Bawaan Python).
            - **Cocok untuk**: Transaksi keuangan, sistem inventaris.

            **2. NoSQL (Non-Relational):**
            Data disimpan dalam format fleksibel seperti Dokumen (JSON), Grafik, atau Key-Value.
            - **Contoh**: MongoDB (Dokumen), Redis (In-memory), Neo4j (Grafik).
            - **Cocok untuk**: Media sosial, real-time analytics, caching.
          quiz:
            question: Kapan sebaiknya Anda memilih database SQL dibandingkan NoSQL?
            options:
              - Saat data tidak memiliki struktur yang jelas.
              - Saat membutuhkan keamanan transaksi yang sangat ketat (ACID compliance).
              - Saat ingin menyimpan data dalam format gambar saja.
              - Saat ingin database yang paling murah.
            correctAnswerIndex: 1
        - id: sql-queries
          title: Query & CRUD
          content: |-
            **Tujuan Pembelajaran:** Menguasai bahasa SQL dasar untuk berinteraksi dengan database relasional.

            Untuk bicara dengan database SQL, kita menggunakan bahasa standar bernama **SQL (Structured Query Language)**. Operasi paling mendasar disebut **CRUD**.

            **Contoh Query:**
            - **C (Create)**: `INSERT INTO users (nama, umur) VALUES ('Andi', 25);`
            - **R (Read)**: `SELECT * FROM users WHERE umur > 20;`
            - **U (Update)**: `UPDATE users SET umur = 26 WHERE nama = 'Andi';`
            - **D (Delete)**: `DELETE FROM users WHERE id = 1;`

            **JOIN**: Menggabungkan data dari dua tabel berbeda (misal: mengambil nama user beserta daftar pesanannya).
          quiz:
            question: Apa singkatan dari operasi CRUD dalam database?
            options:
              - Clear, Read, Update, Delete.
              - Create, Read, Update, Delete.
              - Create, Remove, Under, Data.
              - Change, Read, Upload, Delete.
            correctAnswerIndex: 1
        - id: orm-concept
          title: ORM (Object Relational Mapping)
          content: |-
            **Tujuan Pembelajaran:** Menghubungkan dunia Objek Python dengan dunia Tabel Database tanpa SQL manual.

            **ORM** adalah jembatan. Ia memungkinkan kamu mengelola database seolah-olah kamu sedang memanipulasi objek Python biasa. Kamu tidak perlu menulis SQL panjang di dalam kode Python-mu.

            **Keuntungan Utama:**
            - **Productivity**: Menulis kode lebih cepat.
            - **Database Agnostic**: Kamu bisa ganti database (misal dari SQLite ke PostgreSQL) tanpa mengubah banyak kode.
            - **Security**: Melindungi aplikasi dari serangan *SQL Injection*.

            **Library Populer**: `SQLAlchemy`, `Django ORM`, `Tortoise ORM`.
          codeExample: |-
            # Menggunakan SQLAlchemy (Pseudo-code)
            
            # 1. Mengambil data (SELECT)
            user = session.query(User).filter_by(nama="Andi").first()
            
            # 2. Mengubah data (UPDATE)
            user.umur = 26
            session.commit() # Simpan ke database
        - id: migration-seed
          title: Migration & Seed
          content: |-
            **Tujuan Pembelajaran:** Memahami cara mengelola perubahan struktur database secara tim.

            **1. Migration:**
            Sistem "Git" untuk struktur database. Jika kamu menambah kolom baru ("email") di tabel "users", migration mencatat perubahan ini dalam sebuah file. Teman satu timmu cukup menjalankan perintah migration agar database mereka ikut berubah secara otomatis.

            **2. Seed (Seeding):**
            Proses mengisi database dengan data awal yang dibutuhkan aplikasi agar bisa berjalan (misal: daftar kategori produk) atau data dummy untuk keperluan testing.
          quiz:
            question: Apa fungsi utama dari sistem Migration?
            options:
              - Mempercepat performa pencarian database.
              - Mencatat dan menerapkan perubahan struktur database secara terorganisir.
              - Menghapus data yang tidak penting secara otomatis.
              - Mengubah database SQL menjadi NoSQL.
            correctAnswerIndex: 1
    - id: modern-python
      title: 13. Modern Python (Type Hints & Pydantic)
      lessons:
        - id: type-hints
          title: Type Hints (Petunjuk Tipe)
          content: |-
            **Tujuan Pembelajaran:** Meningkatkan kualitas kode dengan memberikan informasi tipe data yang jelas.

            Python adalah bahasa "Dynamic Typing", artinya kita tidak harus mendeklarasikan tipe data. Namun di proyek besar, ini sering membingungkan. **Type Hints** diperkenalkan di Python 3.5 untuk memberi petunjuk tentang tipe data yang diharapkan.

            **Manfaat:**
            - **Autocompletion**: Editor (VS Code/PyCharm) memberikan saran yang lebih akurat.
            - **Error Detection**: Alat seperti `mypy` bisa mendeteksi kesalahan tipe sebelum program dijalankan.
            - **Readability**: Orang lain (atau kamu di masa depan) lebih mudah memahami maksud fungsi tersebut.
          codeExample: |-
            # Tanpa Type Hints
            def sapa(nama):
                return "Halo " + nama

            # Dengan Type Hints
            def sapa_modern(nama: str) -> str:
                return f"Halo {nama}"

            # Mendeklarasikan variabel
            umur: int = 25
            pi: float = 3.14
        - id: typing-module
          title: Modul Typing
          content: |-
            **Tujuan Pembelajaran:** Menggunakan tipe data tingkat lanjut untuk koleksi dan struktur data kompleks.

            Untuk tipe data yang lebih detail, Python menyediakan modul `typing`.

            **Tipe yang Sering Digunakan:**
            - `List[int]`: Sebuah daftar yang hanya boleh berisi angka bulat.
            - `Dict[str, float]`: Kamus dengan kunci teks dan nilai desimal.
            - `Optional[str]`: Variabel yang bisa berisi teks ATAU bisa saja kosong (`None`).
            - `Any`: Boleh tipe apa saja (gunakan ini sebagai pilihan terakhir).
          codeExample: |-
            from typing import List, Dict, Optional

            def proses_nilai(nama: str, nilai: List[int]) -> Optional[float]:
                if not nilai:
                    return None
                return sum(nilai) / len(nilai)

            data_siswa: Dict[str, List[int]] = {
                "Andi": [80, 90, 85],
                "Siti": [95, 100]
            }
        - id: pydantic-intro
          title: Mengenal Pydantic
          content: |-
            **Tujuan Pembelajaran:** Menggunakan Pydantic untuk validasi data otomatis dan parsing data JSON ke Objek Python.

            Pydantic adalah pustaka validasi data paling populer. Ia memaksa tipe data pada runtime dan memberikan pesan kesalahan yang sangat jelas jika data tidak sesuai.

            **Kapan Menggunakan Pydantic?**
            - Saat menerima data dari API (FastAPI sangat bergantung pada ini).
            - Saat membaca file konfigurasi.
            - Saat memproses data dari database.
          codeExample: |-
            from pydantic import BaseModel, EmailStr # Perlu instalasi: pip install pydantic[email]

            class User(BaseModel):
                id: int
                nama: str
                email: str # Validasi otomatis format email
                aktif: bool = True # Nilai default

            # Membuat objek dari data mentah (misal dari JSON)
            data_mentah = {"id": "1", "nama": "Budi", "email": "budi@mail.com"}
            user = User(**data_mentah)
            
            print(f"User ID: {user.id} (Tipe: {type(user.id)})") # Otomatis jadi int!
        - id: pydantic-validation
          title: Validasi Otomatis
          content: |-
            **Tujuan Pembelajaran:** Menangani kesalahan data secara elegan menggunakan mekanisme validasi Pydantic.

            Pydantic tidak hanya mengubah tipe data (coercion), tapi juga memvalidasi batasan nilai. Jika data tidak valid, Pydantic akan melempar `ValidationError`.
          codeExample: |-
            from pydantic import BaseModel, Field, ValidationError

            class Produk(BaseModel):
                nama: str
                harga: float = Field(gt=0) # Harga harus lebih besar dari 0
                stok: int = Field(default=0, ge=0) # Minimal 0

            try:
                p = Produk(nama="Laptop", harga=-100) # Pasti Error!
            except ValidationError as e:
                print("Data Tidak Valid!")
                print(e.json())
    - id: best-practices
      title: 14. Best Practices & Design Principles
      lessons:
        - id: kiss-dry-yagni
          title: KISS, DRY, & YAGNI
          content: |-
            **Tujuan Pembelajaran:** Menerapkan filosofi desain perangkat fungsional yang efisien.

            **1. KISS (Keep It Simple, Stupid):**
            Jangan membuat solusi yang terlalu rumit jika ada cara yang lebih sederhana. Kode yang sederhana jauh lebih mudah diperbaiki, diuji, dan dipahami orang lain.

            **2. DRY (Don't Repeat Yourself):**
            Hindari duplikasi kode. Jika kamu menulis logika yang sama di dua tempat berbeda, pindahkan logika tersebut ke dalam sebuah fungsi atau kelas yang bisa digunakan kembali.

            **3. YAGNI (You Ain't Gonna Need It):**
            Jangan menambahkan fitur atau kode hanya karena kamu "berpikir" akan membutuhkannya di masa depan. Fokuslah pada apa yang dibutuhkan aplikasi saat ini.
          quiz:
            question: Apa yang dimaksud dengan prinsip YAGNI?
            options:
              - Jangan menulis kode yang sama berulang kali.
              - Jangan menambahkan fitur 'jaga-jaga' yang belum dibutuhkan sekarang.
              - Selalu gunakan algoritma yang paling kompleks.
              - Pastikan semua variabel memiliki nama singkat.
            correctAnswerIndex: 1
        - id: solid-principles
          title: SOLID Principles
          content: |-
            **Tujuan Pembelajaran:** Membangun sistem OOP yang fleksibel dan mudah dipelihara dalam jangka panjang.

            SOLID adalah akronim dari lima prinsip desain:
            - **S (Single Responsibility)**: Sebuah kelas hanya boleh melakukan satu hal saja.
            - **O (Open/Closed)**: Kelas harus terbuka untuk penambahan fitur baru, tapi tertutup untuk perubahan kode aslinya.
            - **L (Liskov Substitution)**: Subclass harus bisa menggantikan parent class tanpa mengubah kebenaran program.
            - **I (Interface Segregation)**: Lebih baik punya banyak antarmuka kecil daripada satu antarmuka raksasa.
            - **D (Dependency Inversion)**: Bergantunglah pada abstraksi (konsep umum), bukan pada implementasi detail.
          quiz:
            question: Manakah pernyataan yang tepat mengenai Single Responsibility Principle?
            options:
              - Satu file hanya boleh berisi satu fungsi.
              - Satu kelas hanya boleh memiliki satu alasan untuk berubah (satu tanggung jawab).
              - Semua kode harus ditulis dalam satu baris.
              - Hanya satu orang yang boleh mengerjakan proyek tersebut.
            correctAnswerIndex: 1
        - id: tdd-concept
          title: TDD (Test Driven Development)
          content: |-
            **Tujuan Pembelajaran:** Memahami alur kerja pengembangan yang berfokus pada kualitas melalui pengujian.

            **TDD** adalah metodologi di mana tes ditulis **sebelum** kode aslinya dibuat.

            **Siklus Red-Green-Refactor:**
            1. **RED**: Tulis tes untuk fitur baru. Jalankan tes dan lihat ia gagal (karena fiturnya belum ada).
            2. **GREEN**: Tulis kode seminimal mungkin hanya agar tes tersebut berhasil (pass).
            3. **REFACTOR**: Bersihkan dan optimasi kode tersebut tanpa mengubah perilakunya. Pastikan tes tetap pass.
          quiz:
            question: Apa langkah pertama dalam siklus TDD?
            options:
              - Menulis kode aplikasi sampai selesai.
              - Menulis kode tes yang gagal (Red).
              - Melakukan deployment ke server.
              - Mencari bug secara manual.
            correctAnswerIndex: 1
        - id: clean-code-python
          title: Clean Code di Python (PEP 8)
          content: |-
            **Tujuan Pembelajaran:** Menulis kode Python yang "Pythonic" (sesuai standar industri).

            Python memiliki panduan gaya resmi bernama **PEP 8**.

            **Beberapa Aturan Emas:**
            - **Indentasi**: Gunakan 4 spasi (jangan gunakan Tab).
            - **Naming**: `snake_case` untuk variabel/fungsi, `PascalCase` untuk Kelas.
            - **Spacing**: Beri spasi di sekitar operator (`a = b + c`).
            - **Imports**: Selalu letakkan di bagian paling atas file.
          quiz:
            question: Apa standar penamaan variabel yang disarankan oleh PEP 8?
            options:
              - camelCase
              - PascalCase
              - snake_case
              - UPPERCASE
            correctAnswerIndex: 2
    - id: software-testing
      title: 15. Software Testing & Pytest
      lessons:
        - id: testing-intro
          title: Kenapa Harus Testing?
          content: |-
            **Tujuan Pembelajaran:** Memahami pentingnya pengujian otomatis untuk menjaga stabilitas perangkat lunak.

            Testing bukan hanya tentang mencari bug, tapi tentang **membangun kepercayaan** bahwa kodemu bekerja sesuai spesifikasi.

            **Manfaat Utama:**
            - **Mencegah Regresi**: Memastikan fitur lama tidak rusak saat kamu menambah kode baru.
            - **Dokumentasi**: Tes berfungsi sebagai contoh nyata bagaimana sebuah fungsi seharusnya digunakan.
            - **Refactoring Aman**: Kamu bisa merapikan kode dengan tenang karena ada tes yang menjaga perilakunya.
          quiz:
            question: Apa manfaat utama dari 'Mencegah Regresi' dalam testing?
            options:
              - Membuat aplikasi berjalan lebih cepat.
              - Memastikan fitur yang sudah ada tidak rusak setelah perubahan kode.
              - Mengurangi penggunaan memori.
              - Menghapus kode yang tidak terpakai.
            correctAnswerIndex: 1
        - id: testing-levels
          title: Level Testing (Unit, Integration, E2E)
          content: |-
            **Tujuan Pembelajaran:** Membedakan berbagai tingkat pengujian berdasarkan cakupan kodenya.

            **1. Unit Test:**
            Menguji bagian terkecil kode (misal: satu fungsi) secara terisolasi. Sangat cepat dan spesifik.
            *Contoh: Menguji fungsi `hitung_pajak()`.*

            **2. Integration Test:**
            Menguji bagaimana beberapa komponen bekerja sama.
            *Contoh: Menguji apakah fungsi login bisa menyimpan data ke database.*

            **3. End-to-End (E2E) Test:**
            Menguji seluruh alur aplikasi dari sudut pandang pengguna.
            *Contoh: Membuka browser, mengetik username, klik login, dan mengecek apakah masuk ke dashboard.*
          quiz:
            question: Level testing mana yang menguji seluruh alur aplikasi dari sudut pandang pengguna?
            options:
              - Unit Test
              - Integration Test
              - End-to-End (E2E) Test
              - Stress Test
            correctAnswerIndex: 2
        - id: specialized-testing
          title: Smoke, Regression, & Validation
          content: |-
            **Tujuan Pembelajaran:** Mengenal berbagai strategi pengujian khusus dalam siklus pengembangan.

            - **Smoke Test**: Tes "apakah ada asap?". Tes dasar dan cepat untuk memastikan fungsi paling kritis (misal: login) tidak mati total sebelum tes lain dijalankan.
            - **Regression Test**: Dijalankan setiap kali ada perubahan kode untuk memastikan tidak ada fitur lama yang rusak.
            - **Validation Test**: Memastikan produk akhir benar-benar memenuhi kebutuhan bisnis atau keinginan klien.
          quiz:
            question: Apa tujuan dari Smoke Test?
            options:
              - Menguji performa server di bawah beban berat.
              - Memastikan fungsi paling kritis aplikasi berjalan sebelum pengujian lebih dalam.
              - Menghapus bug secara otomatis.
              - Memperbaiki tampilan UI yang rusak.
            correctAnswerIndex: 1
        - id: pytest-intro
          title: Mengenal Pytest
          content: |-
            **Tujuan Pembelajaran:** Menggunakan framework pengujian standar industri untuk menulis tes yang bersih.

            **Pytest** adalah framework testing paling populer di Python. Keunggulannya adalah sintaks yang sangat sederhana dibandingkan library bawaan (`unittest`).

            **Cara Kerja:**
            - Nama file harus diawali `test_` (misal: `test_logic.py`).
            - Nama fungsi tes harus diawali `test_`.
            - Gunakan pernyataan `assert` untuk mengecek kebenaran.
          codeExample: |-
            # File: test_math.py

            def tambah(a, b):
                return a + b

            def test_tambah_positif():
                assert tambah(2, 3) == 5

            def test_tambah_negatif():
                assert tambah(-1, -1) == -2
        - id: pytest-advanced
          title: Fitur Canggih Pytest
          content: |-
            **Tujuan Pembelajaran:** Meningkatkan efisiensi penulisan tes dengan fitur lanjutan Pytest.

            **1. Fixtures:**
            Menyiapkan data atau kondisi sebelum tes (misal: membuat koneksi database sementara) dan membersihkannya setelah tes selesai.

            **2. Parametrize:**
            Menjalankan satu fungsi tes dengan banyak variasi data sekaligus tanpa harus menulis banyak fungsi.
          codeExample: |-
            import pytest

            # Contoh Parametrize
            @pytest.mark.parametrize("a, b, hasil", [
                (1, 2, 3),
                (10, 20, 30),
                (-1, 1, 0)
            ])
            def test_tambah_banyak(a, b, hasil):
                assert a + b == hasil

            # Contoh Fixture (Pseudo-code)
            @pytest.fixture
            def data_user():
                return {"nama": "Andi", "role": "admin"}

            def test_user_is_admin(data_user):
                assert data_user["role"] == "admin"
    - id: profiling-optimization
      title: 16. Profiling & Optimasi Kode
      lessons:
        - id: profiling-intro
          title: Apa itu Profiling?
          content: |-
            **Tujuan Pembelajaran:** Menemukan bagian kode yang memperlambat aplikasi atau memakan banyak memori.

            "Jangan menebak di mana letak kelambatan, ukurlah!" **Profiling** adalah proses statistik untuk mengukur waktu eksekusi fungsi dan penggunaan sumber daya.

            **Alat Profiling:**
            - **cProfile**: Profiler bawaan Python yang sangat detail.
            - **timeit**: Untuk mengukur waktu eksekusi potongan kode kecil.
            - **memory_profiler**: Untuk memantau penggunaan RAM baris demi baris.
          codeExample: |-
            import cProfile

            def fungsi_berat():
                total = 0
                for i in range(1000000):
                    total += i
                return total

            # Menjalankan profiler
            cProfile.run("fungsi_berat()")
        - id: optimization-tips
          title: Tips Optimasi Kode
          content: |-
            **Tujuan Pembelajaran:** Menerapkan teknik untuk mempercepat eksekusi kode tanpa merusak logikanya.

            **Teknik Optimasi:**
            - **Vectorization**: Gunakan NumPy daripada loop `for` manual untuk operasi matematika (bisa 100x lebih cepat).
            - **Caching**: Gunakan `@lru_cache` untuk menyimpan hasil fungsi yang berat agar tidak dihitung ulang.
            - **Generators**: Gunakan generator untuk mengolah data besar tanpa memakan banyak RAM.
            - **Bawaan Python**: Gunakan fungsi bawaan seperti `map()`, `filter()`, dan list comprehension yang dioptimasi di tingkat bahasa C.
          codeExample: |-
            from functools import lru_cache

            @lru_cache(maxsize=128)
            def hitung_fibonacci(n):
                if n < 2: return n
                return hitung_fibonacci(n-1) + hitung_fibonacci(n-2)

            print(hitung_fibonacci(50)) # Sangat cepat karena hasil disimpan!
        - id: premature-optimization
          title: Bahaya Premature Optimization
          content: |-
            **Tujuan Pembelajaran:** Memahami kapan waktu yang tepat untuk melakukan optimasi kode.

            "Premature optimization is the root of all evil." - Donald Knuth.

            Artinya: Jangan menghabiskan waktu berhari-hari untuk mempercepat kode yang sebenarnya hanya berjalan sekali sebulan atau hanya memakan waktu 0.001 detik.

            **Prioritas:**
            1. Buat kode **Benar**.
            2. Buat kode **Bersih/Mudah Dibaca**.
            3. Jika benar-benar lambat, lakukan **Profiling**.
            4. Lakukan **Optimasi** hanya pada bagian yang terbukti lambat.
          quiz:
            question: Menurut prinsip 'Premature Optimization', apa yang harus diprioritaskan pengembang?
            options:
              - Kecepatan eksekusi yang maksimal sejak awal.
              - Kebenaran dan kejelasan kode terlebih dahulu.
              - Penggunaan memori sekecil mungkin.
              - Penggunaan algoritma yang paling rumit.
            correctAnswerIndex: 1
- id: data-engineer
  title: Data Engineer
  description: Pengolahan data, matematika, dan pipeline data.
  modules:
    - id: ai-math-data
      title: 17. Data Science & Math (NumPy, Pandas)
      lessons:
        - id: numpy-basics
          title: 'NumPy: Komputasi Numerik'
          content: |-
            **Tujuan Pembelajaran:** Melakukan operasi matematika pada kumpulan data besar (vektor dan matriks) secara efisien.

            **NumPy (Numerical Python)** adalah fondasi utama AI di Python. Berbeda dengan List Python yang lambat, NumPy menggunakan Array yang dioptimasi di tingkat bahasa C.

            **Karakteristik:**
            - **Vectorization**: Bisa melakukan operasi matematika ke semua elemen sekaligus tanpa loop `for`.
            - **Fixed Type**: Semua item dalam satu array harus memiliki tipe data yang sama (misal: semua float).
            - **Multidimensi**: Sangat mudah mengelola data dalam bentuk baris dan kolom (matriks).
          codeExample: |-
            import numpy as np

            # Membuat array
            arr = np.array([1, 2, 3, 4])
            print(f"Array dikali 2: {arr * 2}")

            # Matriks (2D)
            matriks = np.array([[1, 2], [3, 4]])
            print(f"Bentuk (Shape): {matriks.shape}")
            
            # Operasi Statistik
            print(f"Rata-rata: {np.mean(arr)}")
            print(f"Nilai Maksimal: {np.max(arr)}")
        - id: pandas-basics
          title: 'Pandas: Analisis Data Dasar'
          content: |-
            **Tujuan Pembelajaran:** Mengolah data dalam bentuk tabel (tabular) seperti Excel menggunakan Python.

            **Pandas** memperkenalkan struktur data **DataFrame**. Jika NumPy adalah mesinnya, Pandas adalah antarmukanya yang sangat ramah pengguna.

            **Fitur Utama:**
            - Membaca file (CSV, Excel, SQL) dalam satu baris kode.
            - Menangani data kosong (Missing Data) dengan mudah.
            - Filter, sorting, dan grouping data secara instan.
            - Penggabungan (Merge/Join) tabel seperti di database SQL.
          codeExample: |-
            import pandas as pd

            # Membuat DataFrame sederhana
            data = {
                "Nama": ["Budi", "Siti", "Andi"],
                "Nilai": [85, 95, 78],
                "Kota": ["Jakarta", "Surabaya", "Jakarta"]
            }
            df = pd.DataFrame(data)

            # Filter data yang nilainya di atas 80
            pintar = df[df["Nilai"] > 80]
            print(f"Siswa pintar:\n{pintar}")

            # Rata-rata nilai per kota
            rata_kota = df.groupby("Kota")["Nilai"].mean()
            print(f"\nRata-rata per kota:\n{rata_kota}")
    - id: data-visualization
      title: 18. Data Visualization & Matplotlib
      lessons:
        - id: viz-intro
          title: Kenapa Visualisasi Data?
          content: |-
            **Tujuan Pembelajaran:** Memahami pentingnya menyajikan data secara visual agar pola dan tren mudah terbaca oleh otak manusia.

            Visualisasi data adalah seni mengubah angka mentah menjadi grafik yang informatif.

            **Kekuatan Visualisasi:**
            - **Mendeteksi Outlier**: Sangat mudah menemukan data yang aneh (misal: umur 500 tahun) pada sebuah grafik daripada pada tabel ribuan baris.
            - **Mencari Pola**: Melihat tren kenaikan atau penurunan dengan cepat (misal: grafik penjualan bulanan).
            - **Menceritakan Data**: Membantu orang lain (seperti klien) memahami hasil analisis kita dalam hitungan detik.
          quiz:
            question: Manakah dari berikut ini yang merupakan manfaat utama visualisasi data?
            options:
              - Mengurangi ukuran file database.
              - Mengotomatisasi proses pengambilan data.
              - Mempermudah manusia dalam mengenali pola dan anomali pada data.
              - Mengubah kode Python menjadi website secara otomatis.
            correctAnswerIndex: 2
        - id: matplotlib-basics
          title: Mengenal Matplotlib
          content: |-
            **Tujuan Pembelajaran:** Membuat grafik dasar menggunakan library standar industri di Python.

            **Matplotlib** adalah "nenek moyang" dari semua library visualisasi di Python. Hampir semua library lain (seperti Seaborn) dibangun di atas Matplotlib.

            **Komponen Grafik:**
            - **Figure**: Kanvas utama atau bingkai luar grafik.
            - **Axes**: Area di mana grafik (plot) digambar (terdiri dari sumbu X dan Y).
          codeExample: |-
            import matplotlib.pyplot as plt

            # Data sederhana
            bulan = ["Jan", "Feb", "Mar", "Apr"]
            omzet = [10, 22, 18, 25]

            # Membuat grafik
            plt.figure(figsize=(8, 4))
            plt.plot(bulan, omzet)
            plt.title("Tren Penjualan Bulanan")
            plt.show() # Menampilkan grafik
        - id: chart-types
          title: Jenis-Jenis Grafik Utama
          content: |-
            **Tujuan Pembelajaran:** Memilih grafik yang paling tepat sesuai dengan jenis data yang akan disajikan.

            **Jenis Grafik Populer:**
            - **Line Plot**: Untuk data deret waktu (Time Series).
            - **Bar Chart**: Untuk membandingkan kategori (misal: jumlah user per browser).
            - **Scatter Plot**: Untuk melihat hubungan antara dua variabel (misal: Berat Badan vs Tinggi Badan).
            - **Histogram**: Untuk melihat distribusi atau sebaran angka (misal: rentang umur pengguna).
          codeExample: |-
            import matplotlib.pyplot as plt

            # Bar Chart
            plt.bar(["Produk A", "Produk B"], [150, 200])
            plt.title("Perbandingan Stok")
            plt.show()

            # Scatter Plot
            x = [1, 2, 3, 4, 5]
            y = [2, 3, 5, 7, 11]
            plt.scatter(x, y, color="purple")
            plt.show()
        - id: customizing-plots
          title: Kustomisasi Grafik
          content: |-
            **Tujuan Pembelajaran:** Membuat grafik yang lebih profesional dengan label, legenda, dan gaya visual yang menarik.

            Grafik tanpa keterangan adalah grafik yang buruk. Matplotlib memungkinkan kita mengatur setiap detil grafik.
          codeExample: |-
            import matplotlib.pyplot as plt

            x = range(1, 11)
            y = [n**2 for n in x]

            plt.plot(x, y, color="red", linestyle="--", marker="o", label="Data Kuadrat")
            
            # Keterangan
            plt.title("Grafik Eksponensial", fontsize=14)
            plt.xlabel("Input (X)")
            plt.ylabel("Hasil (Y)")
            plt.legend() # Menampilkan label 'Data Kuadrat'
            plt.grid(True, alpha=0.3) # Memberi garis bantu
            plt.show()
    - id: data-engineering
      title: 19. Data Engineering (ETL & Pipeline)
      lessons:
        - id: de-intro
          title: Apa itu Data Engineering?
          content: |-
            **Tujuan Pembelajaran:** Membedakan peran Data Engineer dalam ekosistem pengolahan data.

            Data Engineering adalah seni membangun "pipa saluran" (infrastructure) yang mengalirkan data mentah dari sumbernya menuju tempat penyimpanan yang siap dianalisis.

            **Perbedaan Peran:**
            - **Data Engineer**: Membangun pipa, membersihkan data, memastikan data tersedia 24/7 (Infrastruktur).
            - **Data Scientist**: Mengambil data dari pipa, membuat model prediksi (Analisis).
            - **Data Analyst**: Membuat laporan dan visualisasi dari data yang sudah siap (Wawasan Bisnis).
          quiz:
            question: Apa tanggung jawab utama seorang Data Engineer?
            options:
              - Membuat grafik presentasi untuk bos.
              - Membangun dan memelihara infrastruktur data (pipeline).
              - Menemukan tren penjualan masa depan menggunakan statistik.
              - Melakukan input data manual satu per satu.
            correctAnswerIndex: 1
        - id: pandas-advanced
          title: Pandas Lanjutan
          content: |-
            **Tujuan Pembelajaran:** Melakukan manipulasi data tingkat lanjut seperti agregasi dan penggabungan tabel yang kompleks.

            Dalam data engineering, Pandas sering digunakan untuk pembersihan data (data cleaning) skala menengah.

            **Teknik Penting:**
            - **Merging**: Menggabungkan dua tabel berdasarkan kolom kunci (seperti `JOIN` di SQL).
            - **Pivoting**: Mengubah struktur baris menjadi kolom.
            - **Aggregation**: Menghitung statistik per grup (rata-rata, total, jumlah).
          codeExample: |-
            import pandas as pd

            df1 = pd.DataFrame({"id": [1, 2], "nama": ["Budi", "Andi"]})
            df2 = pd.DataFrame({"id": [1, 2], "gaji": [500, 600]})

            # Merge: Menggabungkan data
            df_gabung = pd.merge(df1, df2, on="id")
            print(f"Data Gabung:\n{df_gabung}")

            # Grouping: Menghitung total
            # df.groupby("kategori")["harga"].sum()
        - id: etl-elt-pipelines
          title: ETL & ELT Pipelines
          content: |-
            **Tujuan Pembelajaran:** Memahami alur kerja pemrosesan data dari sumber ke gudang data (Data Warehouse).

            **1. ETL (Extract, Transform, Load):**
            Data diambil, diubah (dibersihkan), lalu baru dimasukkan ke penyimpanan. (Cara tradisional).

            **2. ELT (Extract, Load, Transform):**
            Data diambil dan langsung dimasukkan ke penyimpanan raksasa, baru kemudian diubah di dalam sana. (Cara modern dengan cloud data warehouse).

            **Langkah Utama:**
            - **Extract**: Ambil data dari API, Database SQL, atau File CSV.
            - **Transform**: Mengubah format tanggal, menghapus duplikat, menghitung kolom baru.
            - **Load**: Masukkan ke BigQuery, Snowflake, atau PostgreSQL.
          quiz:
            question: Apa kepanjangan dari ETL?
            options:
              - Enter, Track, Log.
              - Extract, Transform, Load.
              - Export, Transfer, List.
              - Edit, Treat, Load.
            correctAnswerIndex: 1
        - id: data-modeling
          title: Data Modeling & Databases
          content: |-
            **Tujuan Pembelajaran:** Merancang struktur database yang efisien untuk kebutuhan analisis data (OLAP).

            Data Modeling adalah proses merancang skema database agar pengambilan data untuk laporan menjadi sangat cepat.

            **Konsep Populer:**
            - **Star Schema**: Tabel fakta di tengah dikelilingi oleh tabel dimensi. Paling sederhana dan populer.
            - **Snowflake Schema**: Versi Star Schema yang lebih normal (lebih detail).
            - **OLTP vs OLAP**: Database untuk transaksi cepat (misal: Tokopedia) vs Database untuk analisis jutaan data (misal: BigQuery).
          quiz:
            question: Skema database mana yang paling sering digunakan untuk Data Warehouse karena kecepatannya?
            options:
              - Circle Schema
              - Star Schema
              - Square Schema
              - Line Schema
            correctAnswerIndex: 1
        - id: big-data-tech
          title: Big Data & Distributed Computing
          content: |-
            **Tujuan Pembelajaran:** Mengenal teknologi yang digunakan saat data terlalu besar untuk diproses oleh satu komputer saja.

            Ketika data mencapai Terabyte atau Petabyte, kita butuh "keroyokan" banyak komputer (Distributed Computing).

            **Teknologi Utama:**
            - **Apache Spark**: Pemrosesan data super cepat di dalam memori (RAM).
            - **Hadoop (HDFS)**: Sistem penyimpanan file yang tersebar di banyak komputer.
            - **Apache Kafka**: Sistem untuk menangani aliran data real-time (misal: log ribuan klik pengguna per detik).
          quiz:
            question: Teknologi apa yang digunakan untuk memproses data besar secara cepat di dalam memori?
            options:
              - Microsoft Excel
              - Apache Spark
              - Notepad++
              - Windows Explorer
            correctAnswerIndex: 1
        - id: data-orchestration
          title: Data Orchestration (Airflow)
          content: |-
            **Tujuan Pembelajaran:** Mengatur jadwal dan ketergantungan antar pipa data secara otomatis.

            Bayangkan kamu punya 100 tugas pemrosesan data. Tugas B baru bisa jalan kalau Tugas A selesai. Menjalankan ini secara manual mustahil. **Orchestrator** melakukan ini secara otomatis.

            **Apache Airflow:**
            Menggunakan Python untuk mendefinisikan alur kerja yang disebut **DAG (Directed Acyclic Graph)**. Airflow akan memantau tugas mana yang gagal, mengulang (retry) secara otomatis, dan memberi peringatan.
          codeExample: |-
            # Contoh konsep Airflow (DAG)
            # task_a = PythonOperator(task_id='ambil_data')
            # task_b = PythonOperator(task_id='bersihkan_data')
            # task_a >> task_b  # Artinya A harus jalan sebelum B
        - id: data-warehouse-lake
          title: Data Warehouse vs Data Lake
          content: |-
            **Tujuan Pembelajaran:** Memilih tempat penyimpanan yang sesuai dengan jenis dan kegunaan data.

            **1. Data Warehouse (Gudang Data):**
            Menyimpan data yang sudah rapi, terstruktur, dan siap dianalisis untuk laporan bisnis. (Contoh: Google BigQuery).

            **2. Data Lake (Danau Data):**
            Menyimpan segala jenis data mentah (gambar, teks, log, video) tanpa perlu dirapikan dulu. Sangat murah dan bisa menampung data skala raksasa. (Contoh: AWS S3).

            **3. Data Lakehouse:**
            Teknologi terbaru yang menggabungkan kemampuan Data Lake yang murah dengan Data Warehouse yang cepat.
          quiz:
            question: Di mana Anda sebaiknya menyimpan data mentah (seperti file gambar atau log mentah) dalam skala besar?
            options:
              - Data Warehouse
              - Data Lake
              - File Excel
              - Database SQL
            correctAnswerIndex: 1
        - id: pandas-advanced
          title: Pandas Lanjutan
          content: |-
            **Pandas** adalah library paling populer di Python untuk manipulasi dan analisis data. Ia memperkenalkan struktur data **DataFrame** yang mirip seperti tabel Excel.
                      
            Kegunaan Utama:
            - Membaca file CSV, Excel, JSON, dan SQL.
            - Membersihkan data (menangani data kosong/hilang).
            - Melakukan filter, sorting, dan grouping data dengan sangat cepat.
          codeExample: |-
            import pandas as pd

            df = pd.read_csv("data.csv")
            # Filter data
            df_filtered = df[df["umur"] > 20]
            # Grouping
            df_grouped = df.groupby("kota").mean()
        - id: etl-elt-pipelines
          title: ETL & ELT Pipelines
