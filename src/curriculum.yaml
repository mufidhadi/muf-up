        - id: multimodal-embeddings
          title: Multimodal Embeddings (CLIP)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Dulu, teks dan gambar adalah dua dunia berbeda bagi komputer. Komputer tidak tahu kalau tulisan "Kucing" merujuk pada foto kucing. Kita butuh "Jembatan" yang menyatukan keduanya.
            **Analogi:** Seperti "Peta Dua Bahasa". Di sisi kiri ada kata-kata, di sisi kanan ada gambar. CLIP memastikan lokasi "Teks Kucing" dan "Foto Kucing" berada di titik koordinat yang sama persis di peta tersebut.

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** cara kerja model CLIP (Contrastive Language-Image Pre-training) dalam menyatukan ruang vektor teks dan gambar.

            ### 3. Prerequisites
            - Memahami Text & Image Embeddings.

            ### 4. Core Material
            **CLIP** (oleh OpenAI) dilatih dengan jutaan pasangan teks dan gambar dari internet. Ia belajar bahwa:
            - Vektor Teks "Pantai" ≈ Vektor Foto Pantai.
            - Ini memungkinkan fitur: **Text-to-Image Search** (Cari foto di galeri HP-mu hanya dengan mengetik).

            ### 5. Guided Implementation
            Jika kamu mengetik "Gunung Berapi" di Google Photos, CLIP akan mencari foto yang vektor visualnya paling mirip dengan vektor teks "Gunung Berapi".

            ### 6. Pro-Tips
            Model multimodal seperti CLIP adalah dasar dari pembuatan AI seperti **DALL-E** (yang mengubah teks jadi gambar) dan model AI yang bisa "melihat" dan "menjelaskan" foto.

            ### 7. Interactive Challenge
            Coba buka galeri foto di HP-mu, lalu gunakan fitur pencarian teks untuk mencari benda yang spesifik (misal: "makanan", "mobil"). Itulah CLIP bekerja!

            ### 8. Summary & Next Steps
            Dunia data sekarang sudah menyatu. Namun, di mana kita menyimpan jutaan koordinat angka ini? Yuk belajar tentang Vector Databases!
          codeExample: |-
            print("CLIP: Menyatukan dunia teks dan gambar ke dalam satu ruang vektor yang sama.")
          quiz:
            question: "Teknologi apa yang memungkinkan kita mencari foto di smartphone hanya dengan mengetikkan deskripsi teks (misal: 'foto di pantai')?"
            options:
              - Nama file harus diganti manual.
              - Multimodal Embeddings (seperti CLIP).
              - Koneksi satelit.
              - Kapasitas baterai yang besar.
            correctAnswerIndex: 1
        - id: vector-databases
          title: Vector Databases
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Jika kamu punya 100 juta foto, mencari satu foto yang paling mirip dengan foto target akan sangat lambat jika menggunakan database SQL biasa. Kamu butuh database yang didesain khusus untuk mencari "Tetangga Terdekat" dalam ruang vektor.
            **Analogi:** Seperti "Gudang dengan Robot Pintar". Di gudang biasa (SQL), robot mencari berdasarkan nomor rak. Di gudang vektor, robot mencari barang yang bentuk/fungsinya paling mirip dengan barang yang kamu bawa.

            ### 2. Learning Objectives
            Kamu akan mampu **mengintegrasikan** Vector Database (Pinecone/Chroma) ke dalam sistem AI dan **menerapkan** pencarian kemiripan (*Similarity Search*).

            ### 3. Prerequisites
            - Memahami Dasar Embeddings.

            ### 4. Core Material
            **Vector Database** menyimpan embeddings dan mencari kemiripan menggunakan algoritma **ANN (Approximate Nearest Neighbor)**.
            - **Contoh**: Pinecone (Cloud), ChromaDB (Local/Open Source), Milvus.

            ### 5. Guided Implementation
            Langkah pakai Vector DB:
            1. Ubah Data -> Vektor.
            2. Simpan Vektor ke DB.
            3. User tanya -> Ubah Pertanyaan jadi Vektor.
            4. Cari Vektor terdekat di DB -> Tampilkan Hasil.

            ### 6. Pro-Tips
            Pilih Vector DB yang mendukung **Metadata Filtering**. Jadi kamu bisa cari "Vektor baju yang mirip" TAPI hanya yang "Harganya di bawah 100rb".

            ### 7. Interactive Challenge
            Cari tahu: Apa perbedaan utama antara database **ChromaDB** dan **Pinecone**? Kapan kamu harus pilih salah satunya?

            ### 8. Summary & Next Steps
            Selamat! Arsitektur AI modern sudah kamu kuasai. Selanjutnya, kita akan belajar cara melatih AI agar jago mengambil keputusan melalui hadiah dan hukuman: Reinforcement Learning!
          codeExample: |-
            # Konsep Pencarian Vektor
            # results = vector_db.search(query_vector, top_k=5)
            print("Vector Database: Dioptimasi untuk mencari kemiripan data dalam skala jutaan.")
          quiz:
            question: Mengapa kita butuh Vector Database untuk membangun sistem RAG?
            options:
              - Karena lebih murah harganya.
              - Karena database biasa (SQL) tidak dirancang untuk pencarian kemiripan vektor secara cepat pada data raksasa.
              - Karena Vector Database bisa menghapus virus.
              - Karena Vector Database tidak butuh internet.
            correctAnswerIndex: 1
    - id: reinforcement-learning
      title: 27. Reinforcement Learning (RL)
      lessons:
        - id: rl-basics
          title: Belajar dari Hadiah (Rewards)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bagaimana cara melatih robot untuk berjalan atau AI untuk bermain catur? Kamu tidak bisa memberinya jutaan contoh "langkah benar" karena pilihannya tak terbatas. AI harus mencoba sendiri dan belajar dari pengalamannya.
            **Analogi:** Seperti "Melatih Anak Anjing". Jika ia melakukan trik yang benar, kamu beri biskuit (Reward). Jika ia buang air sembarangan, ia tidak dapat apa-apa atau ditegur (Punishment).

            ### 2. Learning Objectives
            Kamu akan mampu **menguraikan** elemen-elemen utama Reinforcement Learning (Agent, Environment, State, Action, Reward).

            ### 3. Prerequisites
            - Memahami Dasar Machine Learning.

            ### 4. Core Material
            **Reinforcement Learning (RL)** adalah belajar melalui interaksi.
            - **Agent**: Si AI.
            - **Environment**: Dunianya AI.
            - **State**: Kondisi saat ini.
            - **Action**: Tindakan AI.
            - **Reward**: Nilai umpan balik.

            ### 5. Guided Implementation
            Siklus RL:
            1. Lihat kondisi (State).
            2. Ambil tindakan (Action).
            3. Dapat hadiah (Reward) + kondisi baru (New State).
            4. Ulangi sampai jago.

            ### 6. Pro-Tips
            Kunci sukses RL ada pada perancangan **Reward Function**. Jika kamu memberi hadiah hanya saat robot sampai tujuan, proses belajarnya lama. Beri hadiah kecil setiap kali ia melangkah ke arah yang benar.

            ### 7. Interactive Challenge
            Bayangkan AI yang belajar main game "Super Mario". Sebutkan apa yang menjadi `Reward` positif dan apa yang menjadi `Punishment`-nya.

            ### 8. Summary & Next Steps
            Konsep dasar RL sudah paham. Selanjutnya, kita akan belajar kerangka matematika yang mendasari proses pengambilan keputusan ini: MDP!
          codeExample: |-
            print("RL: Belajar melalui sistem hadiah (Reward) dan hukuman (Punishment).")
          quiz:
            question: Dalam paradigma Reinforcement Learning, siapa yang bertindak sebagai pengambil keputusan?
            options:
              - Environment
              - Agent
              - Reward
              - Programmer
            correctAnswerIndex: 1
        - id: mdp-intro
          title: Markov Decision Process (MDP)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bagaimana AI menghitung apakah tindakannya sekarang akan berakibat baik di 10 langkah kemudian? Kita butuh rumus matematika untuk memodelkan ketidakpastian dunia.
            **Analogi:** Seperti "Bermain Ular Tangga". Posisi kamu sekarang menentukan peluangmu menang, terlepas dari bagaimana caramu sampai ke posisi tersebut sebelumnya.

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** konsep Markov Property dan **menganalisis** peran Discount Factor dalam pengambilan keputusan jangka panjang.

            ### 3. Prerequisites
            - Memahami Elemen RL Dasar.

            ### 4. Core Material
            **MDP** adalah fondasi formal RL.
            - **Markov Property**: Masa depan hanya tergantung pada saat ini, bukan sejarah masa lalu.
            - **Gamma (γ)**: Faktor diskon (0 sampai 1). Menentukan seberapa penting hadiah di masa depan dibanding sekarang.

            ### 5. Guided Implementation
            Jika Gamma = 0, AI jadi sangat "rakus" (hanya mau hadiah sekarang). Jika Gamma mendekati 1, AI jadi sangat "visioner" (rela nunggu lama demi hadiah besar).

            ### 6. Pro-Tips
            Gunakan Gamma sekitar 0.9 atau 0.99 untuk sebagian besar kasus agar AI tetap memikirkan dampak jangka panjang kodenya.

            ### 7. Interactive Challenge
            Cari tahu: Apa yang terjadi jika Gamma diatur tepat di angka 1 pada lingkungan yang bisa berjalan selamanya (infinite task)?

            ### 8. Summary & Next Steps
            Matematikanya sudah. Sekarang saatnya mengenal algoritma legendaris untuk mencari strategi terbaik: Q-Learning!
          codeExample: |-
            print("MDP: Kerangka matematika untuk pengambilan keputusan dalam kondisi tidak pasti.")
          quiz:
            question: Apa yang dimaksud dengan 'Markov Property' dalam MDP?
            options:
              - AI harus mengingat seluruh langkah dari awal permainan.
              - Keputusan masa depan hanya bergantung pada kondisi (state) saat ini.
              - Hadiah selalu bernilai tetap.
              - AI tidak boleh kalah.
            correctAnswerIndex: 1
        - id: q-learning
          title: Q-Learning & Eksplorasi
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bagaimana cara mencatat semua pengalaman AI? AI butuh "Buku Catatan" yang berisi skor untuk setiap tindakan di setiap situasi.
            **Analogi:** Seperti "Buku Panduan Strategi Game". Buku ini memberi tahu: "Kalau musuh di depan, loncat skornya +10, kalau diam skornya -5".

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **mendemonstrasikan** konsep Q-Table dan **membedakan** antara strategi Eksplorasi dan Eksploitasi.

            ### 3. Prerequisites
            - Memahami MDP.

            ### 4. Core Material
            - **Q-Table**: Tabel yang menyimpan nilai "kualitas" (Q-Value) setiap pasangan State-Action.
            - **Exploration**: Mencoba hal baru (mungkin ketemu jalan pintas).
            - **Exploitation**: Melakukan apa yang sudah terbukti berhasil.

            ### 5. Guided Implementation
            Strategi **Epsilon-Greedy**:
            - 90% waktu AI melakukan yang terbaik (Eksploitasi).
            - 10% waktu AI mencoba hal acak (Eksplorasi).

            ### 6. Pro-Tips
            Di awal training, buatlah AI lebih banyak bereksplorasi. Seiring berjalannya waktu, kurangi eksplorasinya agar AI fokus menggunakan ilmu yang sudah ia dapatkan.

            ### 7. Interactive Challenge
            Apa risikonya jika AI 100% melakukan Eksploitasi sejak hari pertama latihan?

            ### 8. Summary & Next Steps
            Strategi sudah mantap. Selanjutnya, kita akan melihat di mana saja teknologi canggih ini digunakan di dunia nyata!
          codeExample: |-
            # Q(s,a) = nilai 'kebaikan' tindakan a di state s
            print("Q-Learning: Membangun tabel strategi untuk hadiah maksimal.")
          quiz:
            question: Apa istilah untuk tindakan AI mencoba hal baru yang belum pernah dicoba sebelumnya?
            options:
              - Exploitation
              - Exploration
              - Execution
              - Evaluation
            correctAnswerIndex: 1
        - id: rl-applications
          title: Aplikasi RL
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Apakah RL hanya untuk main game? Tidak. RL digunakan untuk masalah tersulit manusia yang melibatkan urutan keputusan yang presisi.
            **Analogi:** Seperti "Pelatih Atlet". RL melatih sistem untuk memiliki refleks dan strategi yang adaptif terhadap perubahan lawan atau lingkungan.

            ### 2. Learning Objectives
            Kamu akan mampu **mengidentifikasi** implementasi nyata Reinforcement Learning di bidang Robotika, Finansial, dan Gaming.

            ### 3. Prerequisites
            - Memahami Alur Kerja RL.

            ### 4. Core Material
            Aplikasi Utama:
            1. **Gaming**: AlphaGo, OpenAI Five (Dota 2).
            2. **Robotika**: Kaki robot yang bisa menyeimbangkan diri di medan kasar.
            3. **Finansial**: Algoritma trading yang adaptif terhadap pasar saham.
            4. **Data Center**: Google menggunakan RL untuk menghemat listrik pendingin server secara otomatis.

            ### 5. Guided Implementation
            RL sangat cocok untuk masalah yang memiliki target akhir yang jelas tapi langkah-langkah menuju ke sananya sangat kompleks dan dinamis.

            ### 6. Pro-Tips
            Jika masalahmu bisa diselesaikan dengan Supervised Learning (punya label data), jangan gunakan RL. RL jauh lebih sulit dilatih dan butuh waktu lebih lama.

            ### 7. Interactive Challenge
            Cari tahu: Bagaimana AI "AlphaGo" bisa mengalahkan juara dunia manusia? Apakah ia menghafal langkah atau punya strategi kreatif?

            ### 8. Summary & Next Steps
            Aplikasi RL sangat luas. Selanjutnya, kita akan mempelajari algoritma RL modern yang paling stabil dan banyak digunakan saat ini: PPO!
          codeExample: |-
            print("RL digunakan oleh Google untuk mengoptimalkan efisiensi energi di pusat data mereka.")
          quiz:
            question: Bidang mana yang paling diuntungkan dari kemampuan RL dalam merencanakan strategi berurutan?
            options:
              - Klasifikasi teks sederhana.
              - Robotika dan Game Strategi.
              - Edit foto jadi hitam putih.
              - Menghitung jumlah huruf di dokumen.
            correctAnswerIndex: 1
        - id: ppo-theory
          title: PPO (Proximal Policy Optimization)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Algoritma RL lama seringkali "rusak" di tengah jalan. AI belajar terlalu drastis, sehingga strategi yang sudah bagus tiba-tiba hilang dan AI jadi bodoh kembali.
            **Analogi:** Seperti "Belajar Menyetir Mobil". Jika kamu membanting setir terlalu keras (update drastis), mobil akan terbalik. Kamu butuh batasan agar setir hanya bisa digerakkan sedikit demi sedikit.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **menjelaskan** konsep *Clipping* pada PPO dan mengapa ia lebih stabil dibanding algoritma pendahulunya.

            ### 3. Prerequisites
            - Memahami dasar optimasi AI.

            ### 4. Core Material
            **PPO** adalah algoritma standar industri (OpenAI):
            - **Clipped Objective**: Membatasi seberapa besar perubahan strategi (Policy) dalam satu langkah belajar.
            - **Stability**: Proses belajar yang lebih mulus dan anti-gagal.

            ### 5. Guided Implementation
            PPO memastikan bahwa rasio antara strategi baru dan strategi lama tetap berada di rentang yang aman (misal antara 0.8 sampai 1.2).

            ### 6. Pro-Tips
            Jika kamu ingin melatih AI untuk game atau simulasi hari ini, mulailah dengan PPO. Ia adalah algoritma yang paling "ramah pengguna" dan memiliki hasil paling stabil.

            ### 7. Interactive Challenge
            Cari tahu: Mengapa OpenAI memilih menggunakan PPO untuk melatih tangan robot "Dactyl" mereka?

            ### 8. Summary & Next Steps
            Algoritma satu AI sudah dikuasai. Selanjutnya, bagaimana jika ada banyak AI yang saling bekerja sama atau bersaing? Yuk bahas Multi-Agent RL!
          codeExample: |-
            print("PPO: Menjaga proses belajar AI tetap stabil dengan membatasi perubahan strategi.")
          quiz:
            question: Apa keunggulan utama algoritma PPO sehingga menjadi standar industri saat ini?
            options:
              - Paling cepat kodenya.
              - Menghasilkan proses training yang stabil dan tidak mudah rusak (anti-crash).
              - Bisa jalan tanpa komputer.
              - Tidak membutuhkan hadiah (reward).
            correctAnswerIndex: 1
        - id: marl-intro
          title: MARL (Multi-Agent RL)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Dunia nyata tidak berisi satu orang saja. Ada mobil lain di jalan, ada pemain lain di game. AI harus belajar berinteraksi dengan agen lain yang sama-sama pintar dan sama-sama belajar.
            **Analogi:** Seperti "Bermain Sepak Bola". Kamu bukan cuma harus jago nendang, tapi kamu harus paham pergerakan teman setim dan musuhmu yang juga terus berubah strateginya.

            ### 2. Learning Objectives
            Kamu akan mampu **menguraikan** tantangan *Non-stationarity* dalam lingkungan Multi-Agent dan **membedakan** tipe interaksi antar agen.

            ### 3. Prerequisites
            - Memahami Dasar RL dan PPO.

            ### 4. Core Material
            **MARL** melibatkan banyak AI dalam satu lingkungan.
            - **Cooperative**: Kerjasama (misal: robot gudang).
            - **Competitive**: Bersaing (misal: catur, trading).
            - **Mixed**: Campuran (misal: game tim).

            ### 5. Guided Implementation
            Tantangan terbesar: **Non-stationarity**. Karena semua agen belajar bersamaan, lingkungan bagi Agen A terus berubah karena tindakan Agen B, membuat proses belajar jadi sangat sulit.

            ### 6. Pro-Tips
            Gunakan teknik **Centralized Training, Decentralized Execution**. Biarkan agen belajar bersama (tahu rahasia satu sama lain saat latihan), tapi saat bertugas, mereka bekerja sendiri-sendiri.

            ### 7. Interactive Challenge
            Bayangkan sistem lampu lalu lintas di seluruh Jakarta dikendalikan oleh AI. Apakah ini tugas Cooperative atau Competitive? Kenapa?

            ### 8. Summary & Next Steps
            Selamat! Kamu sudah menguasai puncak ilmu Reinforcement Learning. Selanjutnya, kita akan belajar data yang punya dimensi waktu: Time Series & Forecasting!
          codeExample: |-
            print("MARL: Melatih kolaborasi dan kompetisi antar banyak kecerdasan buatan.")
          quiz:
            question: Apa tantangan teknis terbesar dalam Multi-Agent Reinforcement Learning?
            options:
              - Data terlalu sedikit.
              - Lingkungan yang tidak stabil (Non-stationarity) karena semua agen berubah secara bersamaan.
              - Kabel server sering putus.
              - AI tidak bisa melihat warna.
            correctAnswerIndex: 1
    - id: forecasting
      title: 28. Time Series & Forecasting
      lessons:
        - id: time-series-intro
          title: Mengenal Time Series
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Bagaimana cara memprediksi apakah harga saham besok akan naik? Atau berapa banyak stok barang yang harus disiapkan supermarket menjelang lebaran? Data ini spesial karena urutan waktunya sangat menentukan.
            **Analogi:** Seperti "Melihat Jejak Kaki". Kamu bisa tahu ke mana arah lari seseorang dengan melihat urutan jejak kakinya dari yang lama ke yang baru.

            ### 2. Learning Objectives
            Kamu akan mampu **mengidentifikasi** komponen data deret waktu (Trend, Seasonality, Noise) dan **menjelaskan** karakteristik data Time Series.

            ### 3. Prerequisites
            - Memahami Dasar Pandas.

            ### 4. Core Material
            **Time Series** adalah data yang dicatat secara berurutan berdasarkan waktu.
            - **Trend**: Arah kenaikan/penurunan jangka panjang.
            - **Seasonality**: Pola berulang (misal: tiap weekend, tiap tahun).
            - **Noise**: Gangguan acak yang tidak berpola.

            ### 5. Guided Implementation
            Dalam Pandas, kita menggunakan tipe data `datetime64` agar bisa melakukan pengolahan waktu dengan mudah.

            ### 6. Pro-Tips
            Selalu cek apakah ada data yang hilang (*missing values*) dalam urutan waktu. Satu hari yang hilang saja bisa merusak hasil prediksi model statistik seperti ARIMA.

            ### 7. Interactive Challenge
            Sebutkan satu contoh data di sekitarmu yang memiliki komponen "Seasonality" (pola musiman).

            ### 8. Summary & Next Steps
            Konsep waktu sudah paham. Selanjutnya, kita akan belajar teknik meramal masa depan: Forecasting!
          codeExample: |-
            print("Time Series: Data yang sangat bergantung pada urutan kronologis waktu.")
          quiz:
            question: Apa yang dimaksud dengan 'Seasonality' dalam data Time Series?
            options:
              - Kenaikan data yang terus menerus tanpa henti.
              - Pola data yang berulang secara teratur pada interval waktu tertentu (misal: mingguan atau tahunan).
              - Data yang salah ketik oleh pengguna.
              - Perbedaan antara nilai tertinggi dan terendah.
            correctAnswerIndex: 1
        - id: forecasting-basics
          title: Forecasting (Peramalan)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Perusahaan listrik harus tahu berapa beban listrik besok pagi agar tidak terjadi mati lampu massal. Peramalan yang salah bisa berakibat kerugian miliaran rupiah atau kekacauan publik.
            **Analogi:** Seperti "Melihat Kaca Spion". Kamu menggunakan apa yang terjadi di belakang (masa lalu) untuk memandu arah kemudi ke depan (masa depan).

            ### 2. Learning Objectives
            Kamu akan mampu **membandingkan** berbagai metode peramalan mulai dari statistik klasik hingga Deep Learning.

            ### 3. Prerequisites
            - Memahami Komponen Time Series.

            ### 4. Core Material
            Metode Populer:
            1. **ARIMA**: Standar statistik untuk data yang polanya stabil.
            2. **FB Prophet**: Library dari Meta yang jago menangani hari libur.
            3. **LSTM**: Deep Learning yang bisa mengingat pola waktu yang sangat panjang.

            ### 5. Guided Implementation
            ```python
            # Konsep FB Prophet
            # model = Prophet()
            # model.fit(df_history)
            # future = model.make_future_dataframe(periods=30)
            # forecast = model.predict(future)
            ```

            ### 6. Pro-Tips
            Selalu gunakan **Backtesting**. Coba ramal data bulan lalu yang sudah kamu tahu hasilnya, lalu bandingkan seberapa akurat ramalanmu dengan kenyataan aslinya.

            ### 7. Interactive Challenge
            Kapan kamu harus menggunakan LSTM (Deep Learning) daripada ARIMA (Statistik)? Cari tahu faktor utamanya!

            ### 8. Summary & Next Steps
            Prediksi masa depan sudah bisa. Selanjutnya, kita akan belajar cara membuat AI kita bekerja super efisien di HP atau perangkat kecil: Model Optimization!
          codeExample: |-
            print("Forecasting: Menggunakan pola masa lalu untuk memprediksi nilai di masa depan.")
          quiz:
            question: Library populer dari Meta (Facebook) yang sangat handal untuk melakukan forecasting dengan mempertimbangkan hari libur adalah?
            options:
              - Scikit-Learn
              - Matplotlib
              - Prophet
              - PyTorch
            correctAnswerIndex: 2
    - id: model-optimization
      title: 29. Model Optimization & Efficiency
      lessons:
        - id: quantization
          title: Quantization (Kuantisasi)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Model AI modern ukurannya raksasa (GigaByte). Bagaimana cara memasukkan AI sepintar itu ke dalam Jam Tangan Pintar (Smartwatch) atau kamera CCTV yang memorinya sangat kecil?
            **Analogi:** Seperti "Mengompres File Video". Kamu mengurangi kualitas gambarnya sedikit saja agar ukuran filenya mengecil drastis dan bisa dikirim lewat WhatsApp dengan cepat.

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** konsep reduksi presisi bobot (Quantization) dan **menganalisis** trade-off antara ukuran model dan akurasi.

            ### 3. Prerequisites
            - Memahami Bobot (Weights) dalam Neural Networks.

            ### 4. Core Material
            **Quantization** mengubah angka bobot yang sangat detail (Float32) menjadi angka bulat yang lebih simpel (Int8).
            - **Manfaat**: Model jadi 4x lebih kecil dan proses tebakan jadi 2-3x lebih cepat.

            ### 5. Guided Implementation
            Biasanya menggunakan tool seperti **TensorFlow Lite** atau **TensorRT** untuk melakukan konversi otomatis.

            ### 6. Pro-Tips
            Gunakan **Quantization-Aware Training (QAT)** jika akurasi modelmu turun drastis saat dikompres. Dengan QAT, AI dilatih sambil "menyadari" bahwa ia akan dikompres nanti.

            ### 7. Interactive Challenge
            Jika model AI aslimu berukuran 400MB, kira-kira akan jadi berapa ukurannya setelah dilakukan kuantisasi dari Float32 ke Int8?

            ### 8. Summary & Next Steps
            Model sudah kecil. Selanjutnya, kita akan belajar cara "Mentransfer Ilmu" dari guru ke murid: Knowledge Distillation!
          codeExample: |-
            print("Quantization: Mengurangi presisi angka bobot model agar lebih ringan dan cepat.")
          quiz:
            question: Apa tujuan utama dari proses Kuantisasi pada model AI?
            options:
              - Membuat AI menjadi lebih berwarna.
              - Mengecilkan ukuran model dan mempercepat eksekusi pada perangkat dengan resource terbatas.
              - Menambah jumlah data secara otomatis.
              - Menghubungkan model ke internet.
            correctAnswerIndex: 1
        - id: knowledge-distillation
          title: Knowledge Distillation (Distilasi)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Kamu punya model raksasa yang sangat pintar tapi sangat lambat (Teacher). Kamu ingin model yang kecil dan cepat (Student) tapi punya kepintaran yang hampir sama dengan si raksasa.
            **Analogi:** Seperti "Guru dan Murid". Sang Guru (Model Besar) sudah belajar segalanya. Ia merangkum ilmunya dan mengajarkannya ke si Murid (Model Kecil) agar si Murid tidak perlu belajar dari nol lagi.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **menguraikan** mekanisme transfer pengetahuan antara model Teacher dan model Student.

            ### 3. Prerequisites
            - Memahami Dasar Deep Learning.

            ### 4. Core Material
            - **Teacher Model**: Model besar, akurat, berat.
            - **Student Model**: Model kecil, ringan, cepat.
            - **Proses**: Student belajar untuk menghasilkan output yang mirip dengan Teacher.

            ### 5. Guided Implementation
            Si Student tidak hanya belajar mana jawaban yang "Benar", tapi ia juga belajar "Seberapa yakin" si Teacher terhadap pilihan-pilihannya yang lain.

            ### 6. Pro-Tips
            Gunakan Distilasi jika kamu ingin membuat AI Chatbot yang bisa berjalan di browser (Client-side) tanpa perlu server mahal di belakangnya.

            ### 7. Interactive Challenge
            Cari tahu: Apa nama model LLM populer yang merupakan hasil "Distilasi" dari model Llama atau GPT? (Hint: Seringkali ada kata 'Tiny' atau 'Small').

            ### 8. Summary & Next Steps
            Ilmu sudah ditransfer. Selanjutnya, kita akan belajar cara "Memangkas" bagian AI yang tidak berguna: Pruning!
          codeExample: |-
            print("Distilasi: Melatih model kecil (Student) untuk meniru kecerdasan model besar (Teacher).")
          quiz:
            question: Dalam konsep Knowledge Distillation, model yang sudah pintar dan berfungsi memberikan panduan disebut?
            options:
              - Student Model
              - Teacher Model
              - Data Model
              - Proxy Model
            correctAnswerIndex: 1
        - id: pruning
          title: Pruning (Pemangkasan)
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Jaringan saraf AI punya jutaan koneksi. Tapi tahukah kamu bahwa banyak koneksi yang sebenarnya "menganggur" atau tidak memberikan kontribusi apa-apa pada hasil akhir?
            **Analogi:** Seperti "Memangkas Pohon Bonsai". Kamu memotong dahan-dahan yang layu atau tidak perlu agar nutrisi (komputasi) fokus ke dahan yang kuat dan menghasilkan buah (prediksi) yang bagus.

            ### 2. Learning Objectives
            Kamu akan mampu **menjelaskan** cara kerja pemangkasan koneksi neuron dan **mengidentifikasi** peningkatan efisiensi yang dihasilkan.

            ### 3. Prerequisites
            - Memahami Arsitektur Neuron.

            ### 4. Core Material
            **Pruning** bekerja dengan cara:
            1. Mencari bobot (weights) yang nilainya mendekati nol.
            2. Menghapus koneksi tersebut secara permanen.
            3. Melakukan *Fine-tuning* agar model stabil kembali.

            ### 5. Guided Implementation
            Ada dua jenis:
            - **Unstructured Pruning**: Menghapus koneksi acak di mana saja.
            - **Structured Pruning**: Menghapus seluruh kelompok neuron sekaligus (lebih efisien untuk hardware).

            ### 6. Pro-Tips
            Hati-hati, jangan memangkas terlalu banyak (misal > 50%) dalam satu waktu. Lakukan secara bertahap agar akurasi AI kamu tidak terjun bebas.

            ### 7. Interactive Challenge
            Apa yang terjadi pada kecepatan CPU saat memproses model yang sudah dipangkas (sparse model) dibandingkan model padat (dense model)?

            ### 8. Summary & Next Steps
            AI sudah ramping dan kencang. Selanjutnya, kita akan belajar teknik paling populer untuk melatih ulang LLM raksasa dengan biaya murah: LoRA!
          codeExample: |-
            print("Pruning: Menghapus bagian jaringan saraf yang tidak penting untuk efisiensi maksimal.")
          quiz:
            question: Apa yang dilakukan pada dahan/koneksi jaringan saraf saat proses Pruning?
            options:
              - Dipertebal bobotnya.
              - Dihapus atau dinolkan jika tidak memberikan kontribusi signifikan pada hasil.
              - Diubah menjadi file teks.
              - Digandakan jumlahnya.
            correctAnswerIndex: 1
        - id: peft-lora
          title: PEFT & LoRA
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Melatih ulang (fine-tune) seluruh bagian model LLM (seperti GPT atau Llama) butuh uang miliaran rupiah untuk menyewa ribuan GPU. Bagaimana cara perusahaan kecil bisa punya AI spesialis tanpa bangkrut?
            **Analogi:** Seperti "Menambah Stiker pada Helm". Kamu tidak membuat helm baru dari nol. Kamu hanya menempelkan stiker khusus (lapisan kecil) yang memberikan identitas atau fungsi baru pada helm tersebut.

            ### 2. Learning Objectives
            Kamu akan mampu **menguraikan** mekanisme Low-Rank Adaptation (LoRA) dan **menyimpulkan** efisiensi penggunaan memori pada teknik PEFT.

            ### 3. Prerequisites
            - Memahami Dasar Fine-tuning LLM.

            ### 4. Core Material
            - **PEFT**: Parameter-Efficient Fine-Tuning.
            - **LoRA**: Teknik menyisipkan matriks kecil di setiap lapisan AI. Hanya matriks kecil ini yang dilatih, lapisan aslinya "dikunci" (frozen).
            - **Hasil**: Kamu bisa melatih model raksasa hanya dengan 1% dari total kekuatan komputer yang biasanya dibutuhkan.

            ### 5. Guided Implementation
            LoRA memungkinkan kita menyimpan hasil latihan AI dalam file yang sangat kecil (Adapter), biasanya hanya berukuran 10MB sampai 100MB, padahal model aslinya berukuran 15GB.

            ### 6. Pro-Tips
            Jika kamu menggunakan library **HuggingFace**, cukup tambahkan beberapa baris kode `get_peft_model` untuk mengubah model biasa menjadi model yang siap dilatih dengan teknik LoRA.

            ### 7. Interactive Challenge
            Cari tahu: Apa kelebihan utama "QLoRA" (Quantized LoRA) dibandingkan LoRA biasa?

            ### 8. Summary & Next Steps
            Luar biasa! Kamu sudah menguasai teknik tercanggih di industri AI saat ini. Terakhir, mari kita pelajari alur kerja profesional untuk menjaga sistem AI tetap hidup: MLOps!
          codeExample: |-
            # Adapter LoRA: Ukuran kecil, kecerdasan besar.
            print("LoRA: Melatih lapisan kecil tambahan tanpa mengubah model asli yang raksasa.")
          quiz:
            question: Mengapa teknik LoRA sangat disukai oleh developer AI saat ini?
            options:
              - Karena membuat jawaban AI lebih lucu.
              - Karena memungkinkan melatih model raksasa dengan biaya murah dan hardware yang terbatas.
              - Karena LoRA tidak membutuhkan data training.
              - Karena LoRA adalah bahasa pemrograman baru.
            correctAnswerIndex: 1
    - id: ai-engineering
      title: 30. AI Engineering Workflow (MLOps & Ethics)
      lessons:
        - id: mlops
          title: MLOps & Deployment
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** Banyak model AI hebat berakhir tragis karena hanya tersimpan di laptop developer dan tidak pernah sampai ke tangan user. Atau lebih parah: AI yang tadinya pintar, tiba-tiba jadi "error" setelah 1 bulan berjalan di server.
            **Analogi:** Seperti "Restoran yang Buka 24 Jam". Kamu bukan cuma harus jago masak (training), tapi kamu harus punya sistem suplai bahan (data), kebersihan dapur (testing), dan pelayan yang sigap (deployment).

            ### 2. Learning Objectives
            Kamu akan mampu **merancang** siklus hidup MLOps yang berkelanjutan dan **menjelaskan** konsep Model Drift.

            ### 3. Prerequisites
            - Memahami Siklus Hidup AI (Training-Inference).

            ### 4. Core Material
            **MLOps** adalah gabungan Machine Learning + DevOps.
            - **CI/CD**: Otomatisasi update model.
            - **Monitoring**: Cek akurasi model setiap hari.
            - **Model Drift**: Penurunan kualitas AI karena dunia sudah berubah (misal: AI toko baju yang tidak kenal tren fashion terbaru).

            ### 5. Guided Implementation
            Gunakan **Docker** untuk membungkus model AI-mu agar ia bisa berjalan di server manapun tanpa ada masalah "tapi di laptop saya jalan".

            ### 6. Pro-Tips
            Selalu sediakan tombol **Rollback**. Jika kamu mengupdate model baru dan tiba-tiba user komplain jawabannya ngawur, kamu harus bisa mengembalikan ke model versi lama dalam hitungan detik.

            ### 7. Interactive Challenge
            Sebutkan satu hal yang bisa menyebabkan "Model Drift" pada AI pendeteksi berita hoax (misal: kemunculan istilah politik baru).

            ### 8. Summary & Next Steps
            Sistem sudah berjalan stabil. Namun, ada satu hal terakhir yang paling penting dari sekadar teknis: Etika dan Tanggung Jawab!
          codeExample: |-
            print("MLOps: Memastikan AI tetap pintar, stabil, dan bermanfaat di dunia nyata.")
          quiz:
            question: Apa yang dimaksud dengan 'Model Drift' dalam sistem MLOps?
            options:
              - Server AI yang berpindah lokasi fisik.
              - Penurunan performa model seiring waktu karena data di dunia nyata sudah berubah polanya.
              - Kecepatan training yang semakin kencang.
              - Model AI yang hilang dari memori.
            correctAnswerIndex: 1
        - id: ethics-ai
          title: Etika & Keamanan AI
          content: |-
            ### 1. Pendahuluan
            **Problem Statement:** AI bisa sangat berbahaya jika jatuh ke tangan yang salah atau jika dibuat dengan niat buruk. AI bisa menciptakan hoaks yang sangat nyata, mendiskriminasi kelompok tertentu, atau membocorkan rahasia pribadi orang lain.
            **Analogi:** Seperti "Membuat Pisau". Pisau bisa dipakai koki untuk masak enak (AI bermanfaat), tapi bisa juga dipakai untuk melukai orang (AI berbahaya). Kamu adalah pembuat pisaunya, kamu bertanggung jawab!

            ### 2. Learning Objectives
            Kamu akan mampu **mengevaluasi** potensi bias pada dataset dan **merancang** sistem AI yang aman dari serangan Prompt Injection.

            ### 3. Prerequisites
            - Memahami Alur Kerja AI Lengkap.

            ### 4. Core Material
            Aspek Penting:
            1. **Fairness**: AI tidak boleh pilih kasih (misal: hanya meluluskan lamaran pria).
            2. **Privacy**: AI tidak boleh menyebarkan data KTP atau rahasia user.
            3. **Explainability**: Kita harus tahu ALASAN AI mengambil keputusan tersebut.
            4. **Safety**: Melindungi AI dari instruksi jahat user (*Jailbreak*).

            ### 5. Guided Implementation
            Selalu lakukan **Red Teaming**. Cobalah untuk "menyerang" AI buatanmu sendiri dengan pertanyaan menjebak atau instruksi jahat untuk melihat apakah pertahanannya sudah kuat.

            ### 6. Pro-Tips
            Etika bukan penghambat inovasi. Justru AI yang aman dan etis akan lebih dipercaya oleh masyarakat dan memiliki nilai jual yang jauh lebih tinggi.

            ### 7. Interactive Challenge
            Bayangkan AI penyeleksi beasiswa. Apa yang harus kamu lakukan jika ternyata 90% penerima beasiswa yang dipilih AI hanya dari satu suku tertentu?

            ### 8. Summary & Next Steps
            Selamat! Kamu telah menyelesaikan seluruh perjalanan belajar di Muf-Up. Kamu kini memiliki bekal yang sangat kuat untuk menjadi AI Engineer yang hebat dan bertanggung jawab. Teruslah berkarya!
          codeExample: |-
            print("Ethics in AI: Membangun masa depan teknologi yang aman, adil, dan manusiawi.")
          quiz:
            question: Apa yang dimaksud dengan 'Bias' dalam pengembangan model AI?
            options:
              - Kecepatan model dalam menjawab.
              - Ketidakadilan hasil prediksi yang mendiskriminasi kelompok tertentu akibat data training yang tidak seimbang.
              - Harga server yang mahal.
              - Versi terbaru dari Python.
            correctAnswerIndex: 1

- id: prof-specialist
  title: Professional & Advanced Specialist
  description: Menguasai teknologi mutakhir AI Agents, Local LLM, dan Cloud Native Python.
  modules:
    - id: agentic-ai
      title: 31. Agentic AI (CrewAI & LangGraph)
      lessons:
        - id: intro-crewai
          title: Pengenalan CrewAI
          content: |-
            ### 1. Hook & Context
            **Problem Statement:** Chatbot biasa hanya bisa menjawab pertanyaan satu per satu. Namun, untuk mengerjakan proyek besar seperti "Riset Pasar Lengkap", satu AI tidak cukup. Kita butuh banyak AI yang bekerja sama seperti tim di dunia nyata.
            **Analogi:** Seperti "Kru Film". Ada Sutradara, Penulis Naskah, dan Kameramen. Masing-masing punya tugas spesifik, tapi bekerja untuk satu tujuan: membuat film yang bagus.

            ### 2. Learning Objectives
            Kamu akan mampu **merancang** sistem multi-agent menggunakan CrewAI dan **mengintegrasikan** peran (Role) serta tugas (Task) yang berbeda antar agen.

            ### 3. Prerequisites
            - Memahami Dasar Python dan konsep LLM.

            ### 4. Core Material
            **CrewAI** adalah framework untuk melatih tim AI agar bekerja secara kolaboratif.
            - **Agent**: Entitas AI dengan peran tertentu (misal: 'Researcher').
            - **Task**: Tugas spesifik yang harus dikerjakan agen.
            - **Crew**: Wadah yang menyatukan agen dan tugas dalam alur kerja tertentu.

            ### 5. Guided Implementation
            ```python
            # Konsep dasar CrewAI (Simulasi)
