            correctAnswerIndex: 2
    - id: local-ai
      title: 32. Local AI & Edge Deployment
      lessons:
        - id: ollama-local-llm
          title: Ollama & Local LLM
          content: |-
            ### 1. Hook & Context
            **Problem Statement:** Mengirim data rahasia perusahaan ke server cloud AI (seperti OpenAI) berisiko membocorkan rahasia negara atau bisnis. Bagaimana cara menikmati kecanggihan AI secara gratis dan 100% rahasia di laptop sendiri?
            **Analogi:** Seperti "Punya Perpustakaan Sendiri di Rumah". Kamu tidak perlu pergi ke perpustakaan umum (Cloud) dan lapor ke petugas buku apa yang kamu baca. Semuanya ada di rak bukumu sendiri (Laptop).

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **mengoperasikan** LLM secara lokal menggunakan Ollama dan **menganalisis** kebutuhan hardware untuk menjalankan model AI.

            ### 3. Prerequisites
            - Memahami konsep dasar LLM.

            ### 4. Core Material
            **Ollama** adalah alat paling populer untuk menjalankan model AI (seperti Llama 3 atau Mistral) di laptop tanpa internet.
            - **The "What":** Runtime ringan untuk LLM lokal.
            - **The "Why":** Privasi total, tanpa biaya API, dan bisa jalan tanpa internet.

            ### 5. Guided Implementation
            Perintah Dasar di Terminal:
            ```bash
            ollama run llama3
            ```
            Lalu kirim prompt seperti biasa di terminal.

            ### 6. Pro-Tips
            Jika laptopmu tidak punya GPU (kartu grafis) yang kuat, gunakan model versi **"Quantized"** (misal: 4-bit) agar AI berjalan lebih lancar tanpa membuat laptop panas.

            ### 7. Interactive Challenge
            Coba download Ollama dan jalankan model "Phi-3" (model ringan dari Microsoft). Rasakan perbedaannya dengan model yang berjalan di Cloud!

            ### 8. Summary & Next Steps
            Privasi data sudah aman di tanganmu. Selanjutnya, kita akan belajar tentang model AI super mungil yang didesain khusus untuk perangkat kecil: SLM!
          codeExample: |-
            print("Local AI: Menjalankan model bahasa raksasa di atas hardware pribadi Anda secara aman.")
          quiz:
            question: "Apa keuntungan utama menjalankan LLM secara lokal menggunakan Ollama dibandingkan melalui API Cloud?"
            options:
              - Lebih lambat responnya.
              - Membutuhkan internet yang sangat kencang.
              - Privasi data 100% terjaga dan tidak ada biaya langganan API.
              - Tampilan aplikasinya lebih bagus.
            correctAnswerIndex: 2
        - id: slm-edge
          title: Small Language Models (SLM)
          content: |-
            ### 1. Hook & Context
            **Problem Statement:** Tidak semua orang punya laptop gaming dengan RAM 64GB. Banyak perangkat seperti HP murah atau alat IoT yang butuh kecerdasan AI tapi tenaganya sangat lemah.
            **Analogi:** Seperti "Sepeda Motor vs Truk Kontainer". Model raksasa (GPT-4) adalah Truk yang kuat tapi boros bensin. SLM adalah Sepeda Motor yang lincah, irit, dan bisa lewat jalan tikus (perangkat kecil).

            ### 2. Learning Objectives
            Kamu akan mampu **membedakan** karakteristik SLM dengan LLM raksasa dan **mengevaluasi** kasus penggunaan yang tepat untuk model ringan.

            ### 3. Prerequisites
            - Memahami konsep Parameter dalam model AI.

            ### 4. Core Material
            **SLM (Small Language Models)** adalah model AI dengan jumlah parameter relatif kecil (dibawah 7 Miliar) tapi tetap sangat pintar untuk tugas spesifik.
            - **Contoh:** Phi-3 (Microsoft), Gemma (Google), TinyLlama.
            - **Keunggulan:** Sangat cepat, hemat baterai, bisa jalan di browser.

            ### 5. Guided Implementation
            SLM biasanya digunakan untuk tugas-tugas terfokus seperti:
            - Merangkum teks pendek.
            - Cek tata bahasa (Grammar).
            - Klasifikasi sentimen.

            ### 6. Pro-Tips
            Jangan gunakan SLM untuk penalaran matematika yang sangat kompleks atau menulis novel panjang. Gunakan SLM sebagai "asisten spesialis" yang mengerjakan satu tugas berulang secara cepat.

            ### 7. Interactive Challenge
            Sebutkan satu perangkat elektronik di rumahmu yang menurutmu akan sangat berguna jika ditanami teknologi SLM (misal: Kulkas Pintar).

            ### 8. Summary & Next Steps
            Selamat! Kamu sudah menguasai cara membawa AI ke perangkat manapun. Selanjutnya, kita akan belajar cara menguji kualitas jawaban AI kita: AI Evaluation!
          codeExample: |-
            print("SLM: Membawa kecerdasan buatan ke perangkat terkecil di tangan Anda.")
          quiz:
            question: "Manakah di bawah ini yang merupakan contoh dari Small Language Model (SLM)?"
            options:
              - GPT-4
              - Llama-3-70B
              - Microsoft Phi-3
              - Claude 3 Opus
            correctAnswerIndex: 2

    - id: ai-evaluation
      title: 33. AI Evaluation & Quality Assurance
      lessons:
        - id: llm-as-a-judge
          title: LLM-as-a-Judge
          content: |-
            ### 1. Hook & Context
            **Problem Statement:** Menilai apakah jawaban AI itu "bagus" atau "salah" secara manual untuk 1000 data sangat membosankan dan tidak konsisten. Manusia bisa lelah, tapi AI tidak.
            **Analogi:** Seperti "Guru Senior Menilai Guru Muda". Kamu menggunakan AI yang paling pintar dan mahal (GPT-4o atau Claude 3.5 Sonnet) untuk memeriksa hasil kerja AI yang lebih kecil dan murah.

            ### 2. Learning Objectives
            Kamu akan mampu **merancang** sistem evaluasi otomatis menggunakan teknik LLM-as-a-Judge dan **menyusun** kriteria penilaian (Rubric) yang objektif.

            ### 3. Prerequisites
            - Memahami konsep Prompt Engineering.

            ### 4. Core Material
            **LLM-as-a-Judge** adalah metode di mana sebuah model bahasa digunakan sebagai evaluator.
            - **Rubric**: Daftar kriteria penilaian (misal: Keakuratan, Nada Bicara, Kesantunan).
            - **Scale**: Memberikan nilai (misal: 1-5) atau perbandingan (A lebih baik dari B).

            ### 5. Guided Implementation
            Prompt Evaluator:
            """
            Tugasmu adalah menilai jawaban AI berdasarkan kriteria berikut:
            1. Apakah kode Python yang dihasilkan bisa dijalankan?
            2. Apakah penjelasannya mudah dimengerti?
            Berikan nilai 1-10.
            """

            ### 6. Pro-Tips
            Hati-hati dengan **Positional Bias**. LLM cenderung memilih jawaban pertama sebagai yang terbaik. Selalu tukar posisi jawaban saat melakukan perbandingan (A vs B dan B vs A) untuk hasil yang adil.

            ### 7. Interactive Challenge
            Jika kamu ingin menilai AI yang bertugas sebagai "Penerjemah Bahasa Gaul", kriteria apa saja yang akan kamu masukkan ke dalam Rubrik penilaianmu?

            ### 8. Summary & Next Steps
            Evaluasi membuat pengembangan AI jadi terukur. Selanjutnya, kita akan belajar framework khusus untuk menguji sistem pencarian data AI: RAGAS!
          codeExample: |-
            print("LLM-as-a-Judge: Mengotomatisasi kendali mutu AI menggunakan AI itu sendiri.")
          quiz:
            question: "Apa risiko utama yang harus diwaspadai saat menggunakan LLM sebagai juri (evaluator)?"
            options:
              - AI menjadi terlalu cepat.
              - Positional Bias (kecenderungan memilih urutan tertentu) dan bias terhadap model yang searah dengannya.
              - Harga listrik yang naik.
              - AI akan menghapus data aslinya.
            correctAnswerIndex: 1
        - id: rag-evaluation
          title: RAG Evaluation (RAGAS)
          content: |-
            ### 1. Hook & Context
            **Problem Statement:** Sistem RAG seringkali memberikan jawaban yang terlihat benar tapi sebenarnya tidak ada di dokumen (Halusinasi) atau gagal menemukan dokumen yang tepat. Bagaimana cara mengukurnya secara angka?
            **Analogi:** Seperti "Ujian Mencari Informasi". Bukan cuma jawaban akhirnya yang dinilai, tapi juga seberapa pintar siswa tersebut menemukan halaman buku yang tepat (Retrieval) dan seberapa jujur ia menyalin isinya (Faithfulness).

            ### 2. Learning Objectives
            Kamu akan mampu **mengukur** performa sistem RAG menggunakan metrik RAGAS (Faithfulness, Answer Relevance, Context Precision).

            ### 3. Prerequisites
            - Memahami alur kerja RAG.

            ### 4. Core Material
            **RAGAS** adalah framework evaluasi RAG yang fokus pada 3 pilar:
            1. **Faithfulness**: Apakah jawaban berasal dari dokumen (bukan ngarang)?
            2. **Answer Relevance**: Apakah jawaban menjawab pertanyaan user?
            3. **Context Precision**: Apakah dokumen yang dipanggil memang relevan?

            ### 5. Guided Implementation
            RAGAS akan memberikan skor antara 0 sampai 1 untuk setiap pilar tersebut, sehingga kamu tahu bagian mana yang harus diperbaiki: apakah database-nya (Retrieval) atau cara AI menjawab-nya (Generation).

            ### 6. Pro-Tips
            Jika skor *Faithfulness* rendah, berarti AI-mu sering berhalusinasi. Solusinya: Perketat prompt instruksi agar AI dilarang menjawab di luar konteks dokumen.

            ### 7. Interactive Challenge
            Cari tahu metrik "Context Recall". Apa bedanya dengan "Context Precision" dalam evaluasi RAG?

            ### 8. Summary & Next Steps
            Sistem AI-mu sekarang sudah teruji secara saintifik. Selanjutnya, kita akan belajar cara mengotomatiskan tugas-tugas dunia nyata: Real-world Automation!
          codeExample: |-
            print("RAGAS: Framework standar untuk memberikan nilai rapor pada sistem RAG Anda.")
          quiz:
            question: "Metrik dalam RAGAS yang mengukur sejauh mana jawaban AI benar-benar didasarkan pada dokumen yang diberikan disebut?"
            options:
              - Answer Relevancy
              - Context Precision
              - Faithfulness
              - System Latency
            correctAnswerIndex: 2

    - id: automation-specialist
      title: 34. Real-world Automation Specialist
      lessons:
        - id: modern-web-scraping
          title: Web Scraping dengan Playwright
          content: |-
            ### 1. Hook & Context
            **Problem Statement:** Banyak data berharga terkunci di dalam website yang butuh login atau memiliki proteksi tinggi. Library lama seperti BeautifulSoup seringkali gagal mengambil data yang di-generate oleh JavaScript.
            **Analogi:** Seperti "Membaca Koran". Bukannya cuma memotong artikel yang kamu suka (BeautifulSoup), kamu menyewa robot yang bisa buka pintu kantor redaksi, masuk ke dalam, dan memotret halaman koran yang sedang dicetak (Playwright).

            ### 2. Learning Objectives
            Kamu akan mampu **mengotomatisasi** interaksi browser dan **mengekstrak** data dari website dinamis menggunakan library Playwright.

            ### 3. Prerequisites
            - Memahami Dasar HTML dan CSS Selector.

            ### 4. Core Material
            **Playwright** adalah alat automasi browser modern yang sangat cepat.
            - **Headless Mode**: Menjalankan browser tanpa jendela yang terlihat (hemat resource).
            - **Selectors**: Cara menunjuk elemen web (id, class, text).
            - **Auto-wait**: Menunggu website selesai loading sebelum mengambil data.

            ### 5. Guided Implementation
            ```python
            # Konsep Playwright
            # from playwright.sync_api import sync_playwright
            # with sync_api() as p:
            #     browser = p.chromium.launch()
            #     page = browser.new_page()
            #     page.goto("https://google.com")
            #     print(page.title())
            ```

            ### 6. Pro-Tips
            Selalu cek file `robots.txt` pada website target. Jangan melakukan scraping pada data pribadi atau website yang secara eksplisit melarang otomasi demi etika dan hukum.

            ### 7. Interactive Challenge
            Bayangkan kamu ingin memantau harga tiket pesawat setiap hari. Sebutkan urutan klik yang harus dilakukan robotmu di website maskapai!

            ### 8. Summary & Next Steps
            Web scraping membuka akses ke jutaan data. Selanjutnya, kita akan belajar cara mengolah data tersebut ke dalam format perkantoran secara otomatis: Office Automation!
          codeExample: |-
            print("Playwright: Mengendalikan browser secara otomatis untuk pengambilan data skala besar.")
          quiz:
            question: "Apa keunggulan utama Playwright dibandingkan library scraping tradisional seperti BeautifulSoup?"
            options:
              - Ukurannya lebih kecil.
              - Tidak membutuhkan Python.
              - Bisa berinteraksi dengan website yang menggunakan JavaScript dinamis (seperti klik tombol dan mengisi form).
              - Bisa berjalan tanpa listrik.
            correctAnswerIndex: 2
        - id: office-automation
          title: Otomasi Office (Excel, PDF, Email)
          content: |-
            ### 1. Hook & Context
            **Problem Statement:** Menghabiskan waktu 3 jam setiap hari hanya untuk memindahkan data dari 100 file Excel ke satu laporan PDF dan mengirimnya lewat email adalah pemborosan hidup. Biarkan Python melakukannya dalam 3 detik.
            **Analogi:** Seperti "Asisten Administrasi yang Tidak Pernah Tidur". Kamu memberinya tumpukan dokumen, dan ia akan menyusun, menjilid, serta mengirimkannya ke alamat yang tepat tanpa salah ketik.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **menggabungkan** data dari berbagai file Excel dan **menghasilkan** dokumen laporan otomatis dalam format PDF.

            ### 3. Prerequisites
            - Memahami Dasar Pandas.

            ### 4. Core Material
            Library Populer:
            - **openpyxl**: Membaca dan menulis file Excel (`.xlsx`).
            - **reportlab / fpdf**: Membuat dokumen PDF dari nol.
            - **smtplib**: Mengirim email secara otomatis.

            ### 5. Guided Implementation
            Alur Otomasi:
            1. Loop semua file di folder.
            2. Baca data pakai Pandas.
            3. Gabungkan data.
            4. Tulis ke file hasil.
            5. Kirim email notifikasi.

            ### 6. Pro-Tips
            Gunakan library `yagmail` jika kamu ingin cara mengirim email yang lebih simpel dan modern daripada menggunakan `smtplib` standar.

            ### 7. Interactive Challenge
            Jika kamu punya 1000 file PDF hasil scan, tantangan apa yang paling sulit dihadapi saat ingin mengambil data teks dari dalamnya? (Hint: OCR).

            ### 8. Summary & Next Steps
            Sekarang kamu adalah pahlawan produktivitas! Terakhir, kita akan belajar cara meletakkan sistem cerdas ini di server cloud: Cloud Native Python!
          codeExample: |-
            print("Office Automation: Menghapus tugas administratif yang membosankan dengan skrip Python.")
          quiz:
            question: "Library Python mana yang paling sering digunakan untuk membaca dan memanipulasi file Excel (.xlsx) secara mendalam?"
            options:
              - Pillow
              - Openpyxl
              - Requests
              - Pytest
            correctAnswerIndex: 1
    - id: cloud-native-python
      title: 35. Cloud Native & Production AI
      lessons:
        - id: serverless-python
          title: Serverless Python (AWS Lambda)
          content: |-
            ### 1. Hook & Context
            **Problem Statement:** Menyewa server 24 jam hanya untuk menjalankan skrip yang bekerja selama 5 menit setiap hari adalah pemborosan biaya. Bagaimana jika kita hanya bayar saat skrip kita benar-benar berjalan?
            **Analogi:** Seperti "Lampu Kamar Mandi Otomatis". Lampu hanya menyala (server jalan) saat ada orang masuk (ada request), dan otomatis mati saat tidak ada orang. Kamu hanya bayar listrik yang terpakai.

            ### 2. Learning Objectives
            Kamu akan mampu **merancang** fungsi serverless sederhana dan **menganalisis** keuntungan arsitektur event-driven di cloud.

            ### 3. Prerequisites
            - Memahami Dasar API.

            ### 4. Core Material
            **Serverless** (seperti AWS Lambda atau Google Cloud Functions) memungkinkan kamu menjalankan kode tanpa harus memikirkan maintenance server.
            - **Cold Start**: Waktu yang dibutuhkan server untuk "bangun" pertama kali.
            - **Stateless**: Setiap eksekusi bersifat mandiri dan tidak menyimpan status sebelumnya.

            ### 5. Guided Implementation
            Kamu cukup mengunggah fungsi Python:
            ```python
            def lambda_handler(event, context):
                return {
                    'statusCode': 200,
                    'body': 'Halo dari Cloud!'
                }
            ```

            ### 6. Pro-Tips
            Jangan taruh model AI yang ukurannya berukuran giga-byte ke dalam AWS Lambda biasa karena akan terkena limit memori dan waktu eksekusi. Gunakan serverless untuk tugas ringan saja.

            ### 7. Interactive Challenge
            Bayangkan sebuah sistem yang otomatis meresize foto profil setelah user mengunggahnya. Tugas mana yang cocok dikerjakan oleh fungsi Serverless?

            ### 8. Summary & Next Steps
            Serverless sangat hemat biaya. Selanjutnya, kita akan belajar cara membungkus model AI yang berat ke dalam kontainer agar siap tayang di internet: Production Containers!
          codeExample: |-
            print("Serverless: Menjalankan kode Python di cloud tanpa perlu pusing mengurus server fisik.")
          quiz:
            question: "Apa keuntungan utama arsitektur Serverless dalam hal biaya?"
            options:
              - Selalu gratis selamanya.
              - Kamu hanya membayar untuk waktu eksekusi kode yang benar-benar terpakai (Pay-per-use).
              - Kamu dibayar oleh penyedia cloud.
              - Biayanya tetap sama setiap bulan apapun yang terjadi.
            correctAnswerIndex: 1
        - id: production-containers
          title: Production Containers for AI
          content: |-
            ### 1. Hook & Context
            **Problem Statement:** "Tapi di laptop saya jalan!". Masalah ini sering muncul saat kamu mengirim model AI ke server produksi namun ternyata versi library-nya berbeda. Kita butuh cara untuk membungkus seluruh lingkungan kerja kita ke dalam satu kotak yang pasti jalan di mana saja.
            **Analogi:** Seperti "Kargo Kontainer Kapal". Apapun isinya (AI, Database, Web), kontainernya memiliki ukuran standar yang bisa diangkut oleh kapal (Server) manapun di dunia tanpa masalah.

            ### 2. Learning Objectives
            Setelah materi ini, kamu akan mampu **mengonstruksi** Dockerfile khusus untuk aplikasi AI dan **mengoptimalkan** ukuran image kontainer untuk deployment cepat.

            ### 3. Prerequisites
            - Memahami Dasar Docker.

            ### 4. Core Material
            Deployment AI berbeda dengan web biasa karena butuh dependensi berat (PyTorch/TensorFlow).
            - **Base Image**: Gunakan versi `-slim` atau `-alpine` agar ringan.
            - **Layering**: Mengatur urutan perintah agar proses build Docker lebih cepat.
            - **GPU Support**: Menggunakan image khusus dari NVIDIA jika butuh akselerasi grafis.

            ### 5. Guided Implementation
            Contoh Dockerfile AI:
            ```dockerfile
            FROM python:3.9-slim
            WORKDIR /app
            COPY requirements.txt .
            RUN pip install --no-cache-dir -r requirements.txt
            COPY . .
            CMD ["python", "app.py"]
            ```

            ### 6. Pro-Tips
            Gunakan **Multi-stage Build**. Tahap pertama untuk menginstal semua kebutuhan build, tahap kedua hanya mengambil file hasil akhirnya saja. Hasilnya: Image Docker yang tadinya 2GB bisa menyusut jadi 500MB!

            ### 7. Interactive Challenge
            Kenapa kita sangat disarankan menggunakan perintah `--no-cache-dir` saat menginstal library Python di dalam Dockerfile?

            ### 8. Summary & Next Steps
            Selamat! Perjalanan belajarmu di Muf-Up telah mencapai puncak tertinggi. Kamu sekarang memiliki keahlian yang lengkap: mulai dari logika dasar, pengolahan data, pembuatan AI, hingga pengirimannya ke server dunia nyata. Teruslah bereksperimen dan ciptakan inovasi masa depan!
          codeExample: |-
            print("Production Containers: Menjamin aplikasi AI Anda berjalan konsisten dari laptop hingga ke server global.")
          quiz:
            question: "Mengapa penggunaan base image versi 'slim' atau 'alpine' sangat disarankan untuk deployment di produksi?"
            options:
              - Agar warna terminal lebih bagus.
              - Untuk mengurangi ukuran image Docker sehingga proses download dan deployment menjadi lebih cepat.
              - Agar AI menjadi lebih pintar secara otomatis.
              - Karena image yang besar dilarang oleh penyedia cloud.
            correctAnswerIndex: 1
